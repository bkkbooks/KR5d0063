王李克用淮南吳王楊渥劎南蜀王王建山南秦王李茂貞兩浙越王錢鏐荆南渤海王高季昌湖南楚王馬泉南閩王王審知廣南南海王劉隱並行唐年戊辰梁攻河東用于兢張榮為相殺濟隂王于曹州荆南高季昌湖南馬殷兩浙錢鏐附于梁是年劎南王建稱帝成都國曰蜀元曰武成河東李克用淮南楊渥山南李茂貞泉南王審知南海劉隱行唐年河東李克用卒子存勗繼誅亂命李克寧李存皓敗梁軍于潞之三垂岡淮南楊渥為部將張皓所殺代立大將徐溫自金陵入誅皓立渥弟渭溫專制己巳梁自汴徙都洛陽郊祀天地趙光逢杜曉為相張奉以沙州亂劉知俊以同州叛丹襄軍亂泉南王審知南海劉隱附于梁劉隱卒弟巖立河東李存勗淮南楊渭山南李茂貞行唐年庚午梁之鎮州王鎔定州王處直請附于晉河東李存勗東下河北辛未梁改元乾祐北攻鎮定軍敗于柏鄉蜀改元永平是年李存勗將劉守光稱帝幽州壬申梁北攻鎮定屠棗強乃復六月郢王友圭行弒代立改元鳳曆殺博王友文于汴冀王友謙以河中入于晉許州軍亂晉王李存勗敗燕軍于龍岡進圍幽州癸酉梁六軍殺友圭立均王友貞于汴復乾祐三年晉李存勗平幽州獲劉守光及父仁恭以歸甲戌梁將王殷以徐叛附于吳晉李存勗開霸府于太原乙亥梁改元貞明鄴王楊師厚卒分其地六州為兩鎮魏軍遂亂囚其帥賀德倫以六州入于晉蜀拔山南之秦鳳階成宫大火晉李存勗東下大會兵于魏郊丙子梁之河北皆入于晉趙光逢鄭珏為相攻晉不利蜀改元通正拔山南之隴州晉李存勗敗梁軍于故元城吳封相徐溫為齊國公屬之以金陵丹陽毗陵宣城新安池陽六郡鎮金陵丁丑梁册兩浙錢鏐為天下兵馬元帥是年劉涉以南海稱帝國曰漢元曰乾亨蜀改元天漢誅降將劉知俊于炭市晉李存勗拔梁之楊劉城戊寅梁之鄆濮陷于晉蜀改元天光建遇毒死子衍立晉李存勗擁太原魏博幽滄鎮定邢洛麟勝雲朔十鎮之師大閲于魏郊敗梁軍于胡柳己卯梁張守進以兖入于晉蜀改元乾德晉逼梁之河南是年楊渭稱帝淮南國曰吳元曰武義徐溫為大丞相都督中外封東海王庚辰梁李琪為相陳州妖寇亂晉兵入寇吳楊渭卒弟溥立晉存勗拔梁之同州辛巳梁改元龍德惠王友能以陳叛吳改元順義晉鎮定亂契丹犯幽州壬午晉李存勗平鎮定又敗契丹于易水癸未河東晉王李存勗稱帝魏州是謂莊宗國曰唐元曰同光是謂後唐以豆蘆革為相郭崇韜樞密使自魏由鄆而南敗梁將王彥章于中都長驅入汴殺友貞于建國樓降之為庶人潞州軍亂淮南楊溥兩浙錢鏐山南李茂貞湖南馬請附吳楊溥去帝號稱王荆南高季興泉南王審知行梁年甲申唐自汴徙都洛陽平上黨乙酉唐帝存勗北巡魏郊以樞密使郭崇韜同魏王繼岌伐蜀七旬平之獲其主王衍以歸至秦川驛族殺之以孟知祥鎮成都荆南高季興請附蜀改元咸康國亡漢改元白龍泉南王審知為子延翰所殺代立丙戌唐內命亂皇后劉氏使人殺樞密使郭崇韜于蜀魏軍變以鎮帥李嗣源伐之嗣源至魏軍又變二軍奉李嗣源入汴唐帝存勗東征至萬勝乃復內軍又變殺存勗于絳霄殿嗣源入洛稱帝是謂明宗改元天成誅宰相豆蘆革韋説以鄭珏任圜為相安重誨為樞密使魏王繼岌自成都入至渭橋殺之荆南逆命泉南稱附泉南王延翰為弟延鈞所殺代立丁亥唐以馮道崔協為相盧臺及浚儀軍亂淮南楊溥復稱帝改元乾貞宰相徐溫卒養子知誥繼事于金陵稱王是年北狄耶律德光稱帝潢水國曰契丹元曰天顯戊子唐以王建立為相王都以定叛高季興以荆南入于吳漢改元大有己丑唐以趙鳳為相安重誨專政吳改元大和庚寅唐改元長興河中軍亂西川孟知祥東川董璋連叛辛卯唐以李愚為相罷安重誨樞密以趙延壽范延光為樞密使東西二川相攻壬辰唐孟知祥平東川獲董璋稱表封知祥為蜀王吳王錢鏐卒子元瓘繼福州王延鈞稱帝國曰閩元曰光啓癸巳唐以劉煦為相潞王從珂出尹鳳翔石敬塘移鎮太原帝嗣源病秦王從榮以河南府兵攻端門不克敗死明宗終立宋王從厚是謂閔帝馮道李愚為相專政朱弘昭馮贇為樞密使經世之酉二千二百六十六甲午後唐閔帝從厚元年改元應順以鳳翔潞王從珂移鎮太原從珂自岐入逐從厚代立于洛宫改元清泰從厚出奔衛州就殺之是年孟知祥以兩川稱帝成都國曰蜀元曰明德知祥卒子昶繼乙未唐以韓昭胤為相欣州戍軍亂吳改元天祚閩改元永和臣李倣弒其君延鈞立其子昶丙申唐以馬裔孫為相以太原石敬塘移鎮汶陽石敬塘自太原入以北狄耶律德光稱帝入洛代唐命改國為晉元曰天福以并州從事桑維翰趙瑩為相馮道依舊相輸冀代之北入于狄從珂火死于玄武樓荆南兩浙稱附閩王昶誅李倣改元通文丁酉晉以李嵩為相河陽張從賔魏州范延光滑州符彥饒袁州盧文進不從命悉平之吳大將徐知誥代吳命于金陵改國曰齊易號為唐元曰升元復姓李氏易名為升以宋齊丘徐玠為左右相徙其君于丹徒殺之戊戌晉徙都汴魏州范延光順命封高平王移鎮汶陽北狄耶律德光改元會同己亥閩亂連重遇殺其君昶立其叔父延羲改元永隆庚子晉用和凝為相李金全以安叛命馬安節以十郡之師平之辛丑晉帝石敬塘北過鄴安從進以襄叛安重榮以鎮洛兩浙錢鏐卒子弘佐繼壬寅晉帝石敬塘終于鄴從子齊王重貴立侍衛將軍景延廣專政始二于狄漢劉巖卒子玢繼改元光大癸卯晉楊光遠以青叛北狄入寇漢亂弟晟殺其君玢代立改元應乾再改元乾和江南李升卒子璟繼改元保大宋齊丘周京為相平白雲蠻于虔州閩王延羲弟延政亦稱帝建州國曰元曰天德甲辰晉改元開運北狄入寇至于魏博封晉陽劉知遠為太原王劉頴為相閩亂大將朱文進殺其君延羲代立以福州稱附于晉乙巳北狄大入寇晉河朔至于磁相封劉知遠北平王罷和凝桑維翰相以馮玉為相李嵩知樞密院事丙午晉大將杜重威李守貞及禆將張彥澤以軍降狄于中渡彥澤以兵五百人入汴為狄清路幽其君重貴于開封府南唐平閩之建州滅王延政丁未正月契丹耶律德光入汴滅晉改國為遼誅張彥澤徙其君重貴于北荒致之龍城二月北平王劉知逺稱帝晉陽年用天福是謂高祖五月契丹潰于汴耶律德光留相蕭翰守汴翰求後唐明宗子從益立之而去六月劉知遠留子崇于太原南入汴代命建國曰漢用蘇逢吉蘇禹圭為相又以竇貞固李濤為相楊贇郭威為樞密使相馮道李嵩自欒城至杜重威以魏州拒命閩國分為三荆南兩浙稱附于漢吳越錢弘佐卒弟弘倧立狄契丹耶律德光還至欒城卒兄之子几欲代立歸國廢德光母改元天祿戊申漢改元乾祐帝知逺終子周王承祐繼罷李濤相以楊贇為相平鄴誅杜重威李守貞以河中阻命王景崇以鳳翔叛趙思綰以永興抗命郭威以樞密使西伐之浙東亂大將胡思進廢其君弘倧立其弟俶己酉漢之蒲雍岐三叛平契丹寇河北命郭威以樞密使北伐鎮鄴庚戌漢夷宰相楊贇侍衛將軍史肇三司使王章賜澶州王殷魏州郭威王峻死十二月樞密使郭威以魏兵入渡河敗內軍于劉子陂其主承祐野死郭威至汴請宰相馮道迎其君之弟承圭于徐州還至澶淵軍變入汴太后命威監國降承圭為湘陰公誅宰相蘇逢吉及劉銖辛亥正月監國郭威代漢命于汴是謂太祖改國曰周元曰應順王峻范質馮道為相湘隂公死于宋州兖州慕容彥超不命荆南兩浙稱附太原劉崇稱帝河東國曰漢年用乾祐江南唐平湖南徙其屬于金陵北狄亂契丹瓦欲為其族述乾所殺德光子述律平其亂代立改元應曆易名為明壬子周平兖州癸丑周以皇后弟柴榮為皇太子封晉王尹開封府流王峻于商州王于登州皆殺之李穀馮道為相甲寅周鄭仁誨王溥為相改元顯德太祖威終晉王榮紹位于汴宫河東劉崇以契丹之師入寇周主榮親征大破劉崇于高平誅不用命者將校七十人進攻太原不克澤潞汾遼欣代嵐石迎降宰相馮道卒于州乙卯周大伐江南及蜀漢劉崇卒子承鈞繼丙辰周廣汴之外城南伐取唐之滁和敗其君于渦口漢劉承鈞改元天會丁巳周李穀罷相王朴為樞密使伐江南有功唐改元交泰軍敗于紫金山請以江北地求和于周戊午周受唐江北地南海漢劉晟卒子鋹繼改元大寶唐請附于周殺宰相宋齊丘及陳覺李知古己未周北征契丹至于瓦橋寧雄瀛莫迎降周帝榮有疾乃復榮妃符氏為皇后子崇訓為皇太子封梁王周魏仁溥范質為相趙匡胤進位檢校太傅充殿前都黠檢使世宗榮終皇太子崇訓嗣位庚申辛酉壬戌癸亥經世之戌二千二百六十七經世之亥二千二百六十八皇極經世卷第六之下
