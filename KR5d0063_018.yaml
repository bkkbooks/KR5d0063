body:
  text: 三川邵堯夫撰運經世之十觀物篇之三十四經元之甲一經會之午七經運之壬一百八十九經世之子二千二百五十七經世之子二千二百五十七甲子唐弘孝皇帝十五年殺西臺侍中上官儀又殺庶人忠于流所竇德玄為左相劉祥道為右相乙丑帝同皇后巡東海封泰山陸敦信為右相丙寅帝同皇后至自泰山改元乾封劉仁軌為右相丁卯禁工商乘馬戴至德李安期張文瓘並同東西臺三品戊辰李績平高麗執其王祀明堂改元總章己巳帝同皇后幸九成宫郝處俊同東西臺三品李績卒庚午改元咸亨辛未帝同皇后幸東都及許昌皇太子監國閻立本為中書令壬申帝及皇后至自東都癸酉帝及皇后幸九成宫甲戌皇后稱天后帝為天皇改元上元帝同皇后幸東都帝有疾乙亥皇太子弘卒以雍王賢為皇太子丙子帝及皇后自東都還改元儀鳳來恆薛元超李義琰高智周並同中書門下三品李敬玄劉仁軌為中書令丁丑戊寅改來年為通乾己卯甘露降改元調露帝同皇后幸東都裴行儉大伐突厥庚辰廢皇太子賢為庶人立英王哲烏皇太子帝同皇后幸汝州及嵩山裴琰崔知溫王德真並同中書門下三品改元永隆帝及皇后至自東都辛巳裴行儉平突厥虜其王伏念改元開耀裴炎進侍中崔知溫薛元超進中書令壬午改元永淳帝及皇后幸東都起奉天觀于嵩之陽劉景先郭待舉郭正一岑長倩魏玄同並同中書門下平章事癸未改元弘道帝崩于東都皇太子哲嗣位是謂昭孝皇帝天后稱制劉仁軌進尚書左僕射岑長倩進兵部尚書魏玄同進黃門侍郎劉齊賢進侍中裴炎進中書令甲申改元嗣聖皇后廢帝為廬陵王遷之均立豫王旦改元文明侍中裴炎進爵為侯王德真進侍中劉禕之武承嗣進中書平章事葬高宗于乾陵再改元光宅徐敬業以揚州舉兵南攻潤州平之殺宰相裴炎又改來年為垂拱來俊臣周興大行誙構謂之羅織乙酉武后徙帝居房陵改中書為鳳閣鸞臺丙戌蘇良嗣為文昌左相韋待價為文昌右相並同鳳閣鸞臺三品丁亥武后賜宰相劉禕之死張公輔為鳳閣侍郎戊子武后稱聖母關寡琅琊王沖及父越王貞舉兵以討亂不克大夷王室己丑武后改元永昌稱聖皇大殺王族又殺納言魏玄同及內史張光輔引王本立范履冰邢文偉為相庚寅武后改元載初以建子月為歲首祀明堂以曌為名以詔為制大殺王族改國為周元曰天授稱皇帝降豫王旦為皇嗣立武氏七廟封武氏三人為王引傅遊藝為相改魚為龜辛卯武后祀明堂格輔元樂思晦並同鳳閣鸞臺平章事歐陽通為納言殺宰相岑長倩格輔元及納言歐陽通用狄仁傑為相壬辰武后祀明堂改元如意再改元長壽楊執柔崔元琮李昭德姚璹李元素為相狄仁傑下獄癸巳武后祀明堂稱金輪皇帝引豆盧欽望韋巨源陸元方為相婁師德亦相經世之丑二千二百五十八甲午唐昭孝皇帝十一年在房陵武后祀明堂改元延載引蘇味道王孝傑楊再思杜景儉李元素周允元相繼為相乙未武后改元證聖明堂火稱天册再改元天册萬歲丙申武后封中嶽改元萬歲登封祀新明堂再改元萬歲通天契丹李盡忠以孫萬榮叛陷營冀命二十八將討之不利引王方慶李道廣為相丁酉武后祀明堂河朔平再用婁師德為相魏王武承嗣梁王武三思並同鳳閣鸞臺三品改元神功狄仁傑杜景儉復相誅司業少卿來俊臣遂及內史李昭德戊戌武后祀明堂改元聖曆召帝于房陵返政突厥執武延秀及行人閻知微以破媯檀寇趙定姚元崇李嶠為相己亥武后幸嵩山封皇嗣旦為相王引魏元忠吉頊為相又引王及善豆盧欽望為左右相庚子武后幸汝陽建三陽宫于嵩山之陽改元久視復舊正朔張錫韋安石為相武三思罷特進相吉瑱配流嶺表內史狄仁傑卒辛丑改元大足武后幸嵩之三陽官又而還長安李懷遠顧琮李逈為相壬寅武后祀南郊癸卯武后幸東都朱敬則為相甲辰張柬之同平章事韋安石納言李嶠內史乙巳武后改元神龍張柬之崔玄暐桓彥範敬暉袁恕己平張易之及昌宗之亂徙武后于上陽宫除周號以相王旦為安國王太平公主為鎮國公主賞定亂功也韋氏復正皇后位武王思進位司空相武后崩于東都之上陽宫祝欽明唐休璟為相丙午帝還長安附武后于乾陵以宫人上官苑兒為昭容武三思居中用事封張柬之桓彥範崔玄暐彭恕己敬暉五人為王復貶為州司馬殺之于流所進魏元忠李嶠為中書令李懷遠同中書平章事册衛王重俊為皇太子開長寧安樂二公主府大行斜封墨制于惟謙為相蘇環進侍中丁未李多祚以羽林兵討武三思又討皇后韋氏不克敗死太子重俊出奔野死宗楚客蕭至忠為相改元景龍戊申安樂公主假皇后車服出遊張仁亶為相己酉作宫市韋嗣立崔湜為相庚戌殺諫臣燕欽融于殿庭皇后韋氏及安樂公主行弒于內寢立溫王重茂為嗣改元唐隆以裴談張錫張嘉福岑羲為相臨淄王隆基以劉幽求薛崇簡鍾紹京麻嗣宗兵入誅韋溫紀處訥宗楚客武延秀馬秦客葉靜能趙履溫楊均及皇后韋氏安樂公主上官昭容葬中宗于定陵臨淄王隆基稱平王降重茂嗣尊父相王旦為帝是謂興孝皇帝既踐位以鍾紹京劉幽求薛崇簡崔日用為相立平王隆基為皇太子改元景雲進廢皇后韋氏安樂公主為庶人姚元之為相辛亥皇太子隆基監國郭元振張説竇懷貞陸象先魏知古為相劉幽求進侍中相壬子祀南郊改元太極祀北郊改元延和帝傳位于皇太子隆基是謂明孝皇帝既踐位改元先天黜劉幽求鍾紹京張暉官癸丑太平公主竇懷貞岑羲蕭至忠常元楷薛稷賈膺福李慈李欽李猷崔湜盧藏用傅孝忠僧惠範作逆伏誅進薑皎李令問王毛仲王守一官復劉幽求鍾紹京張暉官令知政事講武于驪山改元開元用盧懷愼姚崇為相改中書為紫微甲寅乙卯册郢王嗣謙為皇太子丙辰太上皇崩葬睿宗于喬陵源乾曜蘇頲為相姚崇讓宋璟為相丁巳幸洛陽嬪永樂公主于契丹戊午至自東都己未庚申張嘉貞為相辛酉相姚崇卒壬戌幸東都癸亥經世之寅二千二百五十九甲子唐明孝皇帝十三年廢皇后王氏為庶人幸東都宋璟守長安乙丑封泰山用源乾曜張説烏左右相丙寅李元絃杜暹為相還東都丁卯至自東都戊辰蕭嵩為相己巳張説宋璟為左右相謁喬定獻昭乾五陵裴光庭為相庚午北討契丹辛未幸東都壬申至自東都宋璟免相癸酉韓休張九齡裴耀卿為相甲戌幸東都李林甫為相乙亥丙子至自東都牛仙客為相是年太真楊氏入宫李林甫用事丁丑廢皇太子瑛為庶人罷張九齡相仍黜之相宋璟卒監察御史周子諒言牛仙客事殺死于朝戊寅册忠王璵為皇太子相李林甫領隴右河西節度牛仙客領河東節度己卯平突厥獲其王追封孔宣父為文宣王顔回為梵國公餘哲並為侯庚辰辛巳命安祿山為平盧軍節度使壬午改元天寶李通之為相開莊文列庚桑子四學裴耀卿進尚書右僕射癸未甲申改元為載命安祿山為范陽節度使作太真妃楊氏養子乙酉册太真妃楊氏為貴妃契丹殺公主叛丙戌陳希烈為左相右相李林甫大行誣構首陷韋堅丁亥改溫泉為華清宫戊子以宦人高力士為驃騎大將軍關總中外賜安祿山鐵券幸華清宫己丑幸華清宫庚寅幸華清宫權歸韓國虢國秦國三夫人及鴻臚卿楊銛宰相楊國忠五家安祿山進封東平郡王辛卯幸華清宫安祿山入朝乞兼河東討雲南不利壬辰幸華清宫李林甫卒楊國忠為右相癸巳幸華清宫楊國忠大行誣構進封哥舒翰西平郡王經世之卯二千二百六十甲午唐明孝皇帝四十三年受朝于華清宫韋見素為相始以詩賦取士楊國忠進位守司空乙未安祿山以范陽叛兵陷東都皇太子璵為元帥監國高仙芝封常清軍敗以哥舒翰將兵二十萬守潼關丙申潼關不守帝西幸蜀至馬嵬兵亂殺宰相楊國忠及貴妃楊氏祿山陷長安稱帝東都國曰燕元曰聖武皇太子西至靈武即皇帝位是謂宣孝皇帝改元至德以廣平王俶為元帥裴冕為相尊蜀中帝為太上皇移軍彭原安恆祿陷顔杲卿死于東都丁酉朔方節度使郭子儀太原節度使李光弼兵入逐安祿山將大敗之于香積遂復兩京帝還長安太上皇至自成都封廣平王俶為成王苗晉卿代韋見素為左相安祿山為子慶緒所殺代立退保相州改元天成戊戌唐改元乾元以成王俶為皇太子李揆王璵為相九節度圍安慶緒于相州軍潰祿山將史思明殺安慶緒稱帝魏州己亥唐改元順天李峴吕諲第五琦為相史思明復陷東都庚子唐改元上元宦人李輔國逼太上皇入西宫劉展以揚州叛辛丑太上皇崩于西宫帝亦不豫皇太子俶監國苗晉卿行冢宰史思明為子朝義所殺代立保東都壬寅改元寶應皇后張氏謀立越王係內臣李輔國程元振幽皇后張氏于别殿殺之帝崩皇太子俶踐位是謂孝武皇帝以雍王適為元帥元載為相程元振為驃騎大將軍居中用事復東都及河朔史朝義走幽州幽人殺之以獻癸卯吐蕃犯長安别立武王宏帝出居陜郭子儀收京城帝還長安放武王宏于華州葬玄宗于泰陵葬肅宗于建陵改元廣德僕固懷恩以汾州叛罷苗晉卿裴遵度相以李峴為相甲辰以雍王為皇太子吐蕃寇邠及奉天王縉杜鴻漸代劉晏李峴為相乙巳改元永泰吐蕃大掠畿甸帝御六軍屯于苑命九節度以本軍討賊吐蕃又會回紇寇奉天僕固懷恩啓之也郭子儀復以回紇隨白元光討吐蕃于靈武崔旰以西川亂丙午改元大曆周智光以華叛丁未吐蕃大寇靈武郭子儀鎮涇陽戊申吐蕃再寇靈武己酉裴冕為相庚戌臧玠以潭州叛辛亥壬子回紇掠京城朱沘節度幽州癸丑郭子儀大敗吐蕃于靈武甲寅乙卯魏博節度使田承嗣擅取洺衛磁相四州河陽及陜州軍亂丙辰淄青李正己擅取齊海登萊沂密德棣曹濮兖鄆請命封隴西王李寶臣封隴西王李忠臣封西平王假秀實封張掖王崔寧破吐蕃河陽軍亂丁巳誅宰相元載并夷其族貶相王縉括州刺史楊綰常衮為相戊午回紇寇太原吐蕃寇靈武己未汴州軍亂皇太子適監國帝崩皇太子適踐位是謂孝文皇帝葬代宗于元陵貶相常衮以崔祐甫為相郭子儀為尚父庚申改元建中朱泚領四鎮節度使劉文喜以涇亂册宣王誦為皇太子楊炎為相劉晏貶忠州尋賜死辛酉盧杞為相貶相楊炎崖州司馬尚父郭子儀卒淄青李正己卒其子納自立梁崇義反淮西帥李希烈討斬之田悅圍邢州馬燧救之田悅敗走壬戌癸亥李希烈陷汝州執刺史李元平東都行營節度使哥舒曜討李希烈兵馬使劉德信及李希烈戰于扈澗敗績命涇州姚令言以本軍救東都兵至作亂入長安立朱泚為帝于含元殿渾瑊奉帝出居奉天朱泚兵頓乾陵朔方節度使李懷光以本軍救奉天朱泚退保京城李懷光以本軍叛李希烈陷襄陽許鄭及汴州哥舒曜走洛陽貶宰相盧杞新州司馬經世之辰二千二百六十一甲子唐孝文皇帝五年在奉天改元興元王武俊格命李懷光走河中帝移軍梁州渾瑊及吐蕃敗朱泚于武功李晟收京師涇原兵馬使田希鑑殺馮河清以涇州叛李抱真王武俊敗朱滔于涇城淄青李納亦歸款田希鑑殺姚令言以涇州降李晟平涇亂殺朱泚李希烈將李澄以滑州格命劉洽曲環敗李希烈于陳州盧翰為相乙丑改元貞元李希烈陷南陽渾瑊平李懷光于河中丙寅李勉相繼為相陳仙奇殺李希烈以蔡州降以為豫州刺史吳少誠又殺陳仙奇以蔡州請命以吳少誠為蔡州刺史吐蕃寇涇隴丁卯會吐蕃于平涼吐蕃竊兵發于會渾瑊逃歸馬燧請之謬也戊辰福建軍亂邠寧亦軍亂李晟馬燧李泌連相國徵