body:
  text: 三川邵堯夫撰運經世之十觀物篇之三十四經元之甲一經會之午七經運之壬一百八十九經世之子二千二百五十七經世之子二千二百五十七甲子唐弘孝皇帝十五年殺西臺侍中上官儀又殺庶人忠于流所竇德玄爲左相劉祥道爲右相乙丑帝同皇后巡東海封泰山陸敦信爲右相丙寅帝同皇后至自泰山改元乾封劉仁軌爲右相丁卯禁工商乘馬戴至德李安期張文瓘並同東西臺三品戊辰李勣平高麗執其王祀明堂改元總章己巳帝同皇后幸九成宫郝處俊同東西臺三品李勣卒庚午改元咸亨辛未帝同皇后幸東都及許昌皇太子監國閻立本爲中書令壬申帝及皇后至自東都癸酉帝及皇后幸九成宫甲戌皇后稱天后帝爲天皇改元上元帝同皇后幸東都帝有疾乙亥皇太子弘卒以雍王賢爲皇太子丙子帝及皇后自東都還改元儀鳳來恒薛元超李義琰高智周並同中書門下三品李敬玄劉仁軌爲中書令丁丑戊寅改來年爲通乾己卯甘露降改元調露帝同皇后幸東都裴行儉大伐突厥庚辰廢皇太子賢爲庶人立英王哲烏皇太子帝同皇后幸汝州及嵩山裴琰崔知温王德眞並同中書門下三品改元永隆帝及皇后至自東都辛巳裴行儉平突厥虜其王伏念改元開耀裴炎進侍中崔知温薛元超進中書令壬午改元永淳帝及皇后幸東都起奉天觀于嵩之陽劉景先郭待舉郭正一岑長倩魏玄同並同中書門下平章事癸未改元弘道帝崩于東都皇太子哲嗣位是謂昭孝皇帝天后稱制劉仁軌進尚書左僕射岑長倩進兵部尚書魏玄同進黄門侍郎劉齊賢進侍中裴炎進中書令甲申改元嗣聖皇后廢帝爲廬陵王遷之均立豫王旦改元文明侍中裴炎進爵爲侯王德眞進侍中劉禕之武承嗣進中書平章事葬高宗于乾陵再改元光宅徐敬業以揚州舉兵南攻潤州平之殺宰相裴炎又改來年爲垂拱來俊臣周興大行誙構謂之羅織乙酉武后徙帝居房陵改中書爲鳳閣鸞臺丙戌蘇良嗣爲文昌左相韋待價爲文昌右相並同鳳閣鸞臺三品丁亥武后賜宰相劉禕之死張公輔爲鳳閣侍郎戊子武后稱聖母關寡瑯琊王冲及父越王貞舉兵以討亂不克大夷王室己丑武后改元永昌稱聖皇大殺王族又殺納言魏玄同及内史張光輔引王本立范履冰邢文偉爲相庚寅武后改元載初以建子月爲歲首祀明堂以曌爲名以詔爲制大殺王族改國爲周元曰天授稱皇帝降豫王旦爲皇嗣立武氏七廟封武氏三人爲王引傅游藝爲相改魚爲龜辛卯武后祀明堂格輔元樂思晦並同鳳閣鸞臺平章事歐陽通爲納言殺宰相岑長倩格輔元及納言歐陽通用狄仁傑爲相壬辰武后祀明堂改元如意再改元長壽楊執柔崔元琮李昭德姚璹李元素爲相狄仁傑下獄癸巳武后祀明堂稱金輪皇帝引豆盧欽望韋巨源陸元方爲相婁師德亦相經世之丑二千二百五十八甲午唐昭孝皇帝十一年在房陵武后祀明堂改元延載引蘇味道王孝傑楊再思杜景儉李元素周允元相繼爲相乙未武后改元證聖明堂火稱天𠕋再改元天𠕋萬歲丙申武后封中岳改元萬歲登封祀新明堂再改元萬歲通天契丹李盡忠以孫萬榮叛䧟營冀命二十八將討之不利引王方慶李道廣爲相丁酉武后祀明堂河朔平再用婁師德爲相魏王武承嗣梁王武三思並同鳳閣鸞臺三品改元神功狄仁傑杜景儉復相誅司業少卿來俊臣遂及内史李昭德戊戌武后祀明堂改元聖曆召帝于房陵返政突厥執武延秀及行人閻知㣲以破嬀檀寇趙定姚元崇李嶠爲相己亥武后幸嵩山封皇嗣旦爲相王引魏元忠吉頊爲相又引王及善豆盧欽望爲左右相庚子武后幸汝陽建三陽宫于嵩山之陽改元久視復舊正朔張錫韋安石爲相武三思罷特進相吉瑱配流嶺表内史狄仁傑卒辛丑改元大足武后幸嵩之三陽官又而還長安李懷遠顧琮李逈爲相壬寅武后祀南郊癸卯武后幸東都朱敬則爲相甲辰張柬之同平章事韋安石納言李嶠内史乙巳武后改元神龍張柬之崔玄暐桓彦範敬暉袁恕己平張易之及昌宗之亂徙武后于上陽宫除周號以相王旦爲安國王太平公主爲鎮國公主賞定亂功也韋氏復正皇后位武王思進位司空相武后崩于東都之上陽宫祝欽明唐休璟爲相丙午帝還長安附武后于乾陵以宫人上官苑兒爲昭容武三思居中用事封張柬之桓彦範崔玄暐彭恕己敬暉五人爲王復貶爲州司馬殺之于流所進魏元忠李嶠爲中書令李懷遠同中書平章事𠕋衛王重俊爲皇太子開長寧安樂二公主府大行斜封墨制于惟謙爲相蘇環進侍中丁未李多祚以羽林兵討武三思又討皇后韋氏不克敗死太子重俊出奔野死宗楚客蕭至忠爲相改元景龍戊申安樂公主假皇后車服出遊張仁亶爲相己酉作宫市韋嗣立崔湜爲相庚戌殺諫臣燕欽融于殿庭皇后韋氏及安樂公主行弑于内寢立温王重茂爲嗣改元唐隆以裴談張錫張嘉福岑羲爲相臨淄王隆基以劉幽求薛崇簡鍾紹京麻嗣宗兵入誅韋温紀處訥宗楚客武延秀馬秦客葉靜能趙履温楊均及皇后韋氏安樂公主上官昭容葬中宗于定陵臨淄王隆基稱平王降重茂嗣尊父相王旦爲帝是謂興孝皇帝既踐位以鍾紹京劉幽求薛崇簡崔日用爲相立平王隆基爲皇太子改元景雲進廢皇后韋氏安樂公主爲庶人姚元之爲相辛亥皇太子隆基監國郭元振張說竇懷貞陸象先魏知古爲相劉幽求進侍中相壬子祀南郊改元太極祀北郊改元延和帝傳位于皇太子隆基是謂明孝皇帝既踐位改元先天黜劉幽求鍾紹京張暉官癸丑太平公主竇懷貞岑羲蕭至忠常元楷薛稷賈膺福李慈李欽李猷崔湜盧蔵用傅孝忠僧惠範作逆伏誅進姜皎李令問王毛仲王守一官復劉幽求鍾紹京張暉官令知政事講武于驪山改元開元用盧懷愼姚崇爲相改中書爲紫微甲寅乙卯𠕋郢王嗣謙爲皇太子丙辰太上皇崩葬睿宗于喬陵源乾曜蘇頲爲相姚崇讓宋璟爲相丁巳幸洛陽嬪永樂公主于契丹戊午至自東都己未庚申張嘉貞爲相辛酉相姚崇卒壬戌幸東都癸亥經世之寅二千二百五十九甲子唐明孝皇帝十三年廢皇后王氏爲庶人幸東都宋璟守長安乙丑封泰山用源乾曜張說烏左右相丙寅李元絃杜暹爲相還東都丁卯至自東都戊辰蕭嵩爲相己巳張說宋璟爲左右相謁喬定獻昭乾五陵裴光庭爲相庚午北討契丹辛未幸東都壬申至自東都宋璟免相癸酉韓休張九齡裴耀卿爲相甲戌幸東都李林甫爲相乙亥丙子至自東都牛仙客爲相是年太眞楊氏入宫李林甫用事丁丑廢皇太子瑛爲庶人罷張九齡相仍黜之相宋璟卒監察御史周子諒言牛仙客事殺死于朝戊寅𠕋忠王璵爲皇太子相李林甫領隴右河西節度牛仙客領河東節度己卯平突厥獲其王追封孔宣父爲文宣王顔回爲梵國公餘哲並爲侯庚辰辛巳命安禄山爲平盧軍節度使壬午改元天寶李通之爲相開莊文列庚桑子四學裴耀卿進尚書右僕射癸未甲申改元爲載命安禄山爲范陽節度使作太眞妃楊氏養子乙酉𠕋太眞妃楊氏爲貴妃契丹殺公主叛丙戌陳希烈爲左相右相李林甫大行誣構首陷韋堅丁亥改温泉爲華清宫戊子以宦人高力士爲驃騎大將軍關總中外賜安禄山鐵券幸華清宫己丑幸華清宫庚寅幸華清宫權歸韓國虢國秦國三夫人及鴻臚卿楊銛宰相楊國忠五家安禄山進封東平郡王辛卯幸華清宫安禄山入朝乞兼河東討雲南不利壬辰幸華清宫李林甫卒楊國忠爲右相癸巳幸華清宫楊國忠大行誣構進封哥舒翰西平郡王經世之卯二千二百六十甲午唐明孝皇帝四十三年受朝于華清宫韋見素爲相始以詩賦取士楊國忠進位守司空乙未安禄山以范陽叛兵䧟東都皇太子璵爲元帥監國高仙芝封常清軍敗以哥舒翰將兵二十萬守潼關丙申潼關不守帝西幸蜀至馬嵬兵亂殺宰相楊國忠及貴妃楊氏禄山䧟長安稱帝東都國曰燕元曰聖武皇太子西至靈武即皇帝位是謂宣孝皇帝改元至德以廣平王俶爲元帥裴冕爲相尊蜀中帝爲太上皇移軍彭原安恒禄䧟顔杲卿死于東都丁酉朔方節度使郭子儀太原節度使李光弼兵入逐安禄山將大敗之于香積遂復兩京帝還長安太上皇至自成都封廣平王俶爲成王苗晋卿代韋見素爲左相安禄山爲子慶緒所殺代立退保相州改元天成戊戌唐改元乾元以成王俶爲皇太子李揆王璵爲相九節度圍安慶緒于相州軍潰禄山將史思明殺安慶緒稱帝魏州己亥唐改元順天李峴吕諲第五琦爲相史思明復䧟東都庚子唐改元上元宦人李輔國逼太上皇入西宫劉展以揚州叛辛丑太上皇崩于西宫帝亦不豫皇太子俶監國苗晋卿行冢宰史思明爲子朝義所殺代立保東都壬寅改元寶應皇后張氏謀立越王係内臣李輔國程元振幽皇后張氏于别殿殺之帝崩皇太子俶踐位是謂孝武皇帝以雍王适爲元帥元載爲相程元振爲驃騎大將軍居中用事復東都及河朔史朝義走幽州幽人殺之以獻癸卯吐蕃犯長安别立武王宏帝出居陜郭子儀收京城帝還長安放武王宏于華州葬玄宗于泰陵葬肅宗于建陵改元廣德僕固懷恩以汾州叛罷苗晋卿裴遵度相以李峴爲相甲辰以雍王爲皇太子吐蕃𡨥邠及奉天王縉杜鴻漸代劉晏李峴爲相乙巳改元永泰吐蕃大掠畿甸帝御六軍屯于苑命九節度以本軍討賊吐蕃又會回紇寇奉天僕固懷恩啓之也郭子儀復以回紇隨白元光討吐蕃于靈武崔旰以西川亂丙午改元大曆周智光以華叛丁未吐蕃大𡨥靈武郭子儀鎭涇陽戊申吐蕃再𡨥靈武己酉裴冕爲相庚戌臧玠以潭州叛辛亥壬子回紇掠京城朱沘節度幽州癸丑郭子儀大敗吐蕃于靈武甲寅乙卯魏博節度使田承嗣擅取洺衛磁相四州河陽及陜州軍亂丙辰淄青李正己擅取齊海登萊沂宻德棣曹濮兖鄆請命封隴西王李寶臣封隴西王李忠臣封西平王叚秀實封張掖王崔寧破吐蕃河陽軍亂丁巳誅宰相元載并夷其族貶相王縉括州刺史楊綰常衮爲相戊午回紇寇太原吐蕃寇靈武己未汴州軍亂皇太子适監國帝崩皇太子适踐位是謂孝文皇帝葬代宗于元陵貶相常衮以崔祐甫爲相郭子儀爲尚父庚申改元建中朱泚領四鎭節度使劉文喜以涇亂𠕋宣王誦爲皇太子楊炎爲相劉晏貶忠州尋賜死辛酉盧杞爲相貶相楊炎崖州司馬尚父郭子儀卒淄青李正己卒其子納自立梁崇義反淮西帥李希烈討斬之田悅圍邢州馬燧救之田悅敗走壬戌癸亥李希烈䧟汝州執刺史李元平東都行營節度使哥舒曜討李希烈兵馬使劉德信及李希烈戰于扈澗敗績命涇州姚令言以本軍救東都兵至作亂入長安立朱泚爲帝于含元殿渾瑊奉帝出居奉天朱泚兵頓乾陵朔方節度使李懷光以本軍救奉天朱泚退保京城李懷光以本軍叛李希烈䧟襄陽許鄭及汴州哥舒曜走洛陽貶宰相盧杞新州司馬經世之辰二千二百六十一甲子唐孝文皇帝五年在奉天改元興元王武俊格命李懷光走河中帝移軍梁州渾瑊及吐蕃敗朱泚于武功李晟收京師涇原兵馬使田希鑑殺馮河清以涇州叛李抱眞王武俊敗朱滔于涇城淄青李納亦歸款田希鑑殺姚令言以涇州降李晟平涇亂殺朱泚李希烈將李澄以滑州格命劉洽曲環敗李希烈于陳州盧翰爲相乙丑改元貞元李希烈䧟南陽渾瑊平李懷光于河中丙寅李勉相繼爲相陳仙奇殺李希烈以蔡州降以爲豫州刺史吴少誠又殺陳仙奇以蔡州請命以吴少誠爲蔡州刺史吐蕃寇涇隴丁卯會吐蕃于平涼吐蕃竊兵發于會渾瑊逃歸馬燧請之謬也戊辰福建軍亂邠寧亦軍亂李晟馬燧李泌連相國徵