body:
  text: 三川邵堯夫撰觀物篇四十七昔者孔子語堯舜則曰垂衣裳而天下治語湯武則曰順乎天而應乎人斯言可以該古今帝王受命之理也堯禪舜以德舜禪禹以功以德帝也以功亦帝也然而德下一等則入于功矣湯伐桀以放武伐紂以殺以放王也以殺亦王也然而放下一等則入于殺矣是知時有消長事有因革前聖後聖非出于一途哉天與人相為表裏天有陰陽人有邪正邪正之由繫乎上之所好也上好德則民用正上好佞則民用邪邪正之由有自來矣雖聖君在上不能無小人是難其為小人雖庸君在上不能無君子是難其為君子自古聖君之盛未有如唐堯之世君子何其多耶時非無小人也是難其為小人故君子多也所以雖有四凶不能肆其惡自古庸君之盛未有如商紂之世小人何其多耶時非無君子也是難其為君子故小人多也所以雖有三仁不能遂其善是知君擇臣臣擇君者是繫乎人也君得臣臣得君者是非繫乎人也繫乎天者也賢愚人之本性利害民之常情虞舜陶于河濱傅說築于巖下天下皆知其賢而百執事不為之舉者利害使之然也吁利害叢丁中而矛戟森于外又安知有虞舜之聖而傅說之賢哉河濱非禪位之所巖下非求相之方昔也在億萬人之下而今也在億萬人之上相去一何逺之甚也然而必此云者貴有名者也易曰坎有孚維心亨行有尚中正行險往且有功雖危無咎能自信故也伊尹以之是知古之人患名過實者有之矣其間有幸與不幸者雖聖人力有不及者矣伊尹行冡宰居責成之地借使避放君之名豈曰不忠乎則天下之事去矣又安能正嗣君成終始之大忠者乎吁若委寄于匪人三年之間其如嗣君何則天下之事亦去矣又安有伊尹也坎有孚維心亨不亦近之乎易曰由豫大有得勿疑朋盍簪剛健主豫動而有應群疑乃亡能自强故也周公以之是知聖人不能使人無謗能處謗者也周公居總已當任重之地借使避滅親之名豈曰不孝乎則天下之事去矣又安能保嗣君成終始之大孝者乎吁若委寄于匪人七年之間其如嗣君何則天下之事亦去矣又安有周公也由豫大有得勿疑朋盍簮不亦近之乎夫天下將治則人必尚行也天下將亂則人必尚言也尚行則篤實之風行焉尚言則詭譎之風行焉天下將治則人必尚義也天下將亂則人必尚利也尚義則謙讓之風行焉尚利則攘奪之風行焉三王尚行者也五伯尚言者也尚行者必入于義也尚言者必入于利也義利之相去一何逺之如是耶是知言之于口不若行之于身行之于身不若盡之于心言之于口人得而聞之行之于身人得而見之盡之于心神得而知之人之聰明猶不可欺况神之聰明乎是知無愧于口不若無愧于身無愧于身不若無愧于心無口過易無身過難無身過易無心過難既無心過何難之有吁安得無心過之人而與之語心哉是故知聖人所以能立乎無過之地者謂其善事于心者也觀物篇四十八仲尼曰韶盡美矣又盡善也武盡美矣未盡善也又曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左袵矣是知武王雖不逮舜之盡善盡美以其解天下之倒懸則下于舜一等耳桓公雖不逮武之應天順人以其霸諸侯一匡天下則高于狄亦逺矣以武比舜則不能無過比桓則不能無功以桓比狄則不能無功比武則不能無過漢氏宜立乎其武桓之間矣是時也非會天下民厭秦之暴且甚雖十劉季百子房其如人心之未易何且古今之時則異也而民好生惡死之心非異也自古殺人之多未有如秦之甚天下安有不厭之乎夫殺人之多不必以刃謂天下之人無生路可趍也而又况以刃多殺天下之人乎秦二世萬乘也求為黔首而不能得漢劉季匹夫也免為元首而不能已萬乘與匹夫相去有間矣然而有時而代之者謂其天下之利害有所懸之耳天之道非禍萬乘而福匹夫也謂其禍無道而福有道也人之情非去萬乘而就匹夫也謂其去無道而就有道也萬乘與匹夫相去有間矣然而有時而代之者謂其直以天下之利害有所懸之耳日既沒矣月既望矣星不能不希矣非星之希是星難乎為其光矣能為其光者不亦希乎漢唐既創業矣吕武既擅權矣臣不能不希矣非臣之希是臣難乎為其忠矣能為其忠者不亦希乎是知從天下事易死天下事難死天下事易成天下事難苟能成之又何計乎死與生也如其不成雖死奚益况其有正與不正者乎與其死于不正孰若生于正與其生于不正孰若死于正在乎忠與智者之一擇焉死固可惜貴乎成天下之事也如其敗天下之事一死奚以塞責生固可愛貴乎成天下之事也如其敗天下之事一生何以收功噫能成天下之事又能不失其正而生者非漢之留侯唐之梁公而何微斯二人則漢唐之祚或幾乎移矣豈若虛生虛死者焉夫虛生虛死者譬之蕭艾忠于智者不由乎其間矣觀物篇四十九仲尼曰善人為邦百年亦可以勝殘去殺誠哉是言也自極亂至于極治必三變矣三皇之法無殺五伯之法無生伯一變至于王矣王一變至于帝矣帝一變至于皇矣其于生也非百年而何是知三皇之世如春五帝之世如夏三王之世如秋五伯之世如冬如春溫如也如夏燠如也如秋凄如也如冬冽如也春夏秋冬者昊天之時也易書詩春秋者聖人之經也天時不差則歲功成矣聖經不忒則君德成矣天有常時聖有常經行之正則正矣行之邪則邪矣邪正之間有道在焉行之正則謂之正道行之邪則謂之邪道邪正由人乎由天乎天由道而生地由道而成物由道而形人由道而行天地人物則異也其于由道一也夫道也者道也道無形行之則見于事矣如道路之道坦然使千億萬年行之人知其歸者也或曰君子道長則小人道消君子道消則小人道長長者是則消者非也消者是則長者非也何以知正道邪道之然乎吁賊夫人之論也不曰君行君事臣行臣事父行父事子行子事夫行夫事妻行妻事君子行君子事小人行小人事中國行中國事夷狄行夷狄事謂之正道君行臣事臣行君事父行子事子行父事夫行妻事妻行夫事君子行小人事小人行君子事中國行夷狄事夷狄行中國事謂之邪道至于三代之世治未有不治人倫之為道也三代之世亂未有不亂人倫之為道也後世之慕三代之治世者未有不正人倫者也後世之慕三代之亂世者未有不亂人倫者也自三代而下漢唐為盛未始不由治而興亂而亡况其不盛于漢唐者乎其興也又未始不由君道盛父道盛夫道盛君子之道盛中國之道盛其亡也又未始不由臣道盛子道盛妻道盛小人之道盛夷狄之道盛噫二道對行何故治世少而亂世多耶君子少而小人多耶曰豈不知陽一而陰二乎天地尚由是道而生况其人與物乎人者物之至靈者也物之靈未若人之靈尚由是道而生又况人靈于物者乎是知人亦物也以其至靈故特謂之人也觀物篇之五十日經天之元月經天之會星經天之運辰經天之世以日經日則元之元可知之矣以日經月則元之會可知之矣以日經星則元之運可知之矣以日經辰則元之世可知之矣以月經日則會之元可知之矣以月經月則會之會可知之矣以月經星則會之運可知之矣以月經辰則會之世可知之矣以星經日則運之元可知之矣以星經月則運之會可知之矣以星經星則運之運可知之矣以星經辰則運之世可知之矣以辰經日則世之元可知之矣以辰經月則世之會可知之矣以辰經星則世之運可知之矣以辰經辰則世之世可知之矣元之元一元之會十二元之運三百六十元之世四千三百二十會之元十二會之會一百四十四會之運四千三百二十會之世五萬一千八百四十運之元三百六十運之會四千三百二十運之運一十二萬九千六百運之世一百五十五萬五千二百世之元四千三百二十世之會五萬一千八百四十世之運一百五十五萬五千二百世之世一千八百六十六萬二千四百元之元以春行春之時也元之會以春行夏之時也元之運以春行秋之時也元之世以春行冬之時也會之元以夏行春之時也會之會以夏行夏之時也會之運以夏行秋之時也會之世以夏行冬之時也運之元以秋行春之時也運之會以秋行夏之時也運之運以秋行秋之時也運之世以秋行冬之時也世之元以冬行春之時也世之會以冬行夏之時也世之運以冬行秋之時也世之世以冬行冬之時也皇之皇以道行道之事也皇之帝以道行德之事也皇之王以道行功之事也皇之伯以道行力之事也帝之皇以德行道之事也帝之帝以德行德之事也帝之王以德行功之事也帝之伯以德行力之事也王之皇以功行道之事也王之帝以功行德之事也王之王以功行功之事也王之伯以功行力之事也伯之皇以力行道之事也伯之帝以力行德之事也伯之王以力行功之事也伯之伯以力行力之事也時有消長事有因革非聖人無以盡之所以仲尼曰可與共學未可與適道可與適道未可與立可與立未可與權是知千萬世之時千萬世之經豈可畫地而輕言也哉三皇春也五帝夏也三王秋也五伯冬也七國冬之餘冽也漢王而不足𣈆伯而有餘三國伯之雄者也十六國伯之叢者也南五代伯之借乘也北五朝伯之傳舍也隋晋之子也唐漢之弟也隋季諸郡之伯江漢之餘波也唐季諸鎮之伯日月之餘光也後五代之伯日未出之星也自帝堯至于今上下三千餘年前後百有餘世書傳可明紀者四海之內九州之間其間或合或離或治或隳或强或羸或唱或隨未始有兼世而能一其風俗者吁古者謂三十年為一世豈徒然哉俟化之必洽教之必浹民之情始可一變矣苟有命世之人繼世而興焉則雖民如夷狄三變而帝道可舉惜乎時無百年之世世無百年之人比其有代則賢之與不肖何止于相半也時之難不其然乎人之難不其然乎觀物篇之五十一太陽之體數十太陰之體數十二少陽之體數十少陰之體數十二少剛之體數十少柔之體數十二太剛之體數十太柔之體數十二進太陽少陽太剛少剛之體數退太陰少陰太柔少柔之體數是謂太陽少陽太剛少剛之用數進太陰少陰太柔少柔之體數退太陽少陽太剛少剛之體數是謂太陰少陰太柔少柔之用數太陽少陽太剛少剛之體數一百六十太陰少陰太柔少柔之體數一百九十二太陽少陽太剛少剛之用數一百一十二太陰少陰太柔少柔之用數一百五十二以太陽少陽太剛少剛之用數唱太陰少陰太柔少柔之用數是謂日月星辰之變數以太陰少陰太柔少柔之用數和太陽少陽太剛少剛之用數是謂水火土石之化數日月星辰之變數一萬七千二十四謂之動數水火土石之化數一萬七千二十四謂之植數再唱和日月星辰水火土石之變化通數二萬八千九百八十一萬六千五百七十六謂之動植通數日月星辰者變乎暑寒晝夜者也水火土石者化乎雨風露雷者也暑寒書夜者變乎性情形體者也雨風露雷者化乎走飛草木者也暑變飛走木草之性寒變飛走木草之情晝變飛走木草之形夜變飛走木草之體雨化性情形體之走風化性情形體之飛露化性情形體之草雷化性情形體之木性情形體者本乎天者也飛走木草者本乎地者也本乎天者分陰分陽之謂也本乎地者分柔分剛之謂也夫分陰分陽分柔分剛者天地萬物之謂也備天地萬物者人之謂也觀物篇之五十二有日日之物者也有日月之物者也有日星之物者也有日辰之物者也有月日之物者也有月月之物者也有月星之物者也有月辰之物者也有星日之物者也有星月之物者也有星星之物者也有星辰之物者也有辰日之物者也有辰月之物者也有辰星之物者也有辰辰之物者也日日物者飛飛也日月物者飛走也日星物者飛木也日辰物者飛草也月日物者走飛也月月物者走走也月星物者走木也月辰物者走草也星日物者木飛也星月物者木走也星星物者木木也星辰物者木草也辰日物者草飛也辰月物者草走也辰星物者草木也辰辰物者草草也有皇皇之民者也有皇帝之民者也有皇王之民者也有皇伯之民者也有帝皇之民者也有帝帝之民者也有帝王之民者也有帝伯之民者也有王皇之民者也有王帝之民者也有王王之民者也有王伯之民者也有伯皇之民者也有伯帝之民者也有伯王之民者也有伯伯之民者也皇皇民者士士也皇帝民者士農也皇王民者士工也皇伯民者士商也帝皇民者農士也帝帝民者農農也帝王民者農工也帝伯民者農商也王皇民者工士也王帝民者工農也王王民者工工也王伯民者工商也伯皇民者商士也伯帝民者商農也伯王民者商工也伯伯民者商商也飛飛物者性性也飛走物者性情也飛木物者性形也飛草物者性體也走飛物者情性也走走物者情情也走木物者情形也走草物者情體也木飛物者形性也木走物者形情也木木物者形形也木草物者形體也草飛物者體性也草走物者體情也草木物者體形也草草物者體體也士士民者仁仁也士農民者仁禮也士工民者仁義也士商民者仁智也農士民者禮仁也農農民者禮禮也農工民者禮義也農商民者禮智也工士民者義仁也工農民者義禮也工工民者義義也工商民者義智也商士民者智仁也商農民者智禮也商工民者智義也商商民者智智也飛飛之物一之一飛走之物一之十飛木之物一之百飛草之物一之千走飛之物十之一走走之物十之十走木之物十之百走草之物十之千木飛之物百之一木走之物百之十木木之物百之百木草之物百之千草飛之物千之一草走之物千之十草木之物千之百草草之物千之千士士之民一之一士農之民一之十士工之民一之百士商之民一之千農士之民十之一農農之民十之十農工之民十之百農商之民十之千工士之民百之一工農之民百之十工工之民百之百工商之民百之千商士之民千之一商農之民千之十商工之民千之百商商之民千之千一一之飛當兆物一十之飛當億物一百之飛當萬物一千之飛當千物十一之走當億物十十之走當萬物十百之走當千物十千之走當百物百一之木當萬物百十之木當千物百百之木當百物百千之木當十物千一之草當千物千十之草當百物千百之草當十物千千之草當一物一一之士當兆民一十之士當億民一百之士當萬民一千之士當千民十一之農當億民十十之農當萬民十百之農當千民十千之農當百民百一之工當萬民百十之工當千民百百之工當百民百千之工當十民千一之商當千民千十之商當百民千百之商當十民千千之商當一民為一一物之能當兆物者非巨物而何為一一之民能當兆民者非巨民而何為千千之物能分一物者非細物而何為千千之民能分一民者非細民而何固知物有大小民有賢愚移昊天生兆物之德而生兆民則豈不謂至神者乎移昊天養兆物之功而養兆民則豈不謂至聖者乎吾而今而後知踐形為大非大聖大神之人豈有不負于天地者矣夫所以謂之觀物者非以目觀之也非觀之以目而觀之以心也非觀之以心而觀之以理也天下之物莫不有理焉莫不有性焉莫不有命焉所以謂之理者窮之而後可知也所以謂之性者盡之而後可知也所以謂之命者至之而後可知也此三知者天下之真知也雖聖人無以過之也而過之者非所以謂之聖人也夫鑑之所以能為明者謂其能不隱萬物之形也雖然鑑之能不隱萬物之形未若水之能一萬物之形也雖然水之能一萬物之形又未若聖人之能一萬物之情也聖人之所以能一萬物之情者謂其聖人之能反觀也所以謂之反觀者不以我觀物也不以我觀物者以物觀物之謂也既能以物觀物又安有我于其間哉是知我亦人也人亦我也我與人皆物也此所以能用天下之目為己之目其目無所不觀矣用天下之耳為已之耳其耳無所不聽矣用天下之口為己之口其口無所不言矣用天下之心為已之心其心無所不謀矣夫天下之觀其于見也不亦廣乎天下之聽其于聞也不亦逺乎天下之言其于論也不亦高乎天下之謀其于樂也不亦大乎夫其見至廣其聞至逺其論至高其樂至大能為至廣至逺至高至大之事而中無一為焉豈不謂至神至聖者乎非唯吾謂之至神至聖者乎而天下謂之至神至聖者乎非唯一時之天下謂之至神至聖者乎而千萬世之天下謂之至神至聖者乎過此以往未之或知也已皇極經世卷第十一之下
