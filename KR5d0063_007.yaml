body:
  text: 三川邵堯夫撰以會經運之一觀物篇之十三以會經運之二觀物篇之十四以會經運之三觀物篇之十五以會經運之四觀物篇之十六以會經運之五觀物篇之十七以會經運之六觀物篇之十八皇極經世之三以會經運之一觀物篇之十三開物始月寅之中經星之己七十六經星之己七十六經星之庚七十七經星之辛七十八經星之壬七十九經星之癸八十經星之甲八十一經星之乙八十二經星之丙八十三經星之丁八十四經星之戊八十五經星之己八十六經星之庚八十七經星之辛八十八經星之壬八十九經星之癸九十經日之甲一經月之卯四經星之甲九十一經星之甲九十一經星之乙九十二經星之丙九十三經星之丁九十四經星之戊九十五經星之己九十六經星之庚九十七經星之辛九十八經星之壬九十九經星之癸一百經星之甲一百一經星之乙一百二經星之丙一百三經星之丁一百四經星之戊一百五經星之己一百六經星之庚一百七經星之辛一百八經星之壬一百九經星之癸一百十經星之甲一百一十一經星之乙一百一十二經星之丙一百一十三經星之丁一百一十四經星之戊一百一十五經星之己一百一十六經星之庚一百一十七經星之辛一百一十八經星之壬一百一十九經星之癸一百二十經日之甲一經月之辰五經星之甲一百二十一經星之甲一百二十一經星之乙一百二十二經星之丙一百二十三經星之丁一百二十四經星之戊一百二十五經星之己一百二十六經星之庚一百二十七經星之辛一百二十八經星之壬一百二十九經星之癸一百三十經星之甲一百三十一經星之乙一百三十二經星之丙一百三十三經星之丁一百三十四經星之戊一百三十五經星之己一百三十六經星之庚一百三十七經星之辛一百三十八經星之壬一百三十九經星之癸一百四十經星之甲一百四十一經星之乙一百四十二經星之丙一百四十三經星之丁一百四十四經星之戊一百四十五經星之己一百四十六經星之庚一百四十七經星之辛一百四十八經星之壬一百四十九經星之癸一百五十經日之甲一經月之巳六經星之甲一百五十一經星之甲一百五十一經星之乙一百五十二經星之丙一百五十三經星之丁一百五十四經星之戊一百五十五經星之己一百五十六經星之庚一百五十七經星之辛一百五十八經星之壬一百五十九經星之癸一百六十經星之甲一百六十一經星之乙一百六十二經星之丙一百六十三經星之丁一百六十四經星之戊一百六十五經星之己一百六十六經星之庚一百六十七經星之辛一百六十八經星之壬一百六十九經星之癸一百七十經星之甲一百七十一經星之乙一百七十二經星之丙一百七十三經星之丁一百七十四經星之戊一百七十五經星之己一百七十六經星之庚一百七十七經星之辛一百七十八經星之壬一百七十九經星之癸一百八十經日之甲一經月之巳六經星之癸一百八十經辰之子二千一百四十九經辰之子二千一百四十九經辰之丑二千一百五十經辰之寅二千一百五十一經辰之卯二千一百五十二經辰之辰二千一百五十三經辰之巳二千一百五十四經辰之午二千一百五十五經辰之未二千一百五十六經辰之申二千一百五十七經辰之酉二千一百五十八經辰之戌二千一百五十九經辰之亥二千一百六十皇極經世之三以會經運之一觀物篇之十四經日之甲一經月之巳六經星之癸一百八十經辰之子二千一百四十九甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之丑二千一百五十甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之寅二千一百五十一甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之卯二千一百五十二甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之辰二千一百五十三甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之巳二千一百五十四甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之午二千一百五十五甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之未二千一百五十六甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰唐堯乙巳二丙午三丁未四戊申五己酉六庚戌七辛亥八壬子九癸丑十甲寅十一乙卯十二丙辰十三丁巳十四戊午十五己未十六庚申十七辛酉十八壬戌十九癸亥二十經辰之申二千一百五十七甲子二十一乙丑二十二丙寅二十三丁卯二十四戊辰二十五己巳二十六庚午二十七辛未二十八壬申二十九癸酉三十甲戌三十一乙亥三十二丙子三十三丁丑三十四戊寅三十五己卯三十六庚辰三十七辛巳三十八壬午三十九癸未四十甲申四十一乙酉四十二丙戌四十三丁亥四十四戊子四十五己丑四十六庚寅四十七辛卯四十八壬辰四十九癸巳五十經辰之酉二千一百五十八