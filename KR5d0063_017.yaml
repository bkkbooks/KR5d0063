象高歡大破西魏宇文泰兵于洛陽己未東魏改元興和庚申辛酉壬戌癸亥東魏改元武定高歡大破西魏宇文泰軍于邙山遂拔洛陽經世之申二千二百五十三甲子梁武帝四十三年西魏文帝十一年東魏靜帝十一年乙丑丙寅梁武帝三失身于同泰寺改元中大同羣臣及皇太子畢會于同泰寺是夜同泰大火丁卯梁改元太清東魏勃海王高歡卒于晋陽子澄繼事侯景以河南十三州叛慕容紹宗敗侯景於長社景南走壽春附于梁封為河南王戊辰侯景兵犯梁建業立蕭王德于南關己巳侯景破梁臺城殺衍立太子綱是謂文帝景稱大丞相都督中外軍事專制湘東王繹開府江陵將王僧辨陳霸先率兵攻侯景東魏盜殺高澄于晋陽弟洋自鄴還晋陽繼事庚午梁改元大寶侯景稱相國漢王逼綱走西州西魏拔梁之安陸取漢中地東魏高洋入總百揆進爵為齊王五月洋代東魏命是謂宣帝改國為齊元曰天保降其君善見為中山王辛未侯景廢梁帝綱又殺之立豫章王棟改元天正又廢之代立改國為漢元曰太始西魏文帝寶炬卒子欽繼壬申梁湘東王繹平侯景使將朱買臣殺棟稱帝江陵是謂元帝改元承聖以陳霸先為征北大將軍王僧辨為揚州刺史武陵王紀稱帝成都年用天正西魏稱元年癸酉梁平武陵王子蜀西魏宇文泰殺尚書元烈甲戌梁蕭察引西魏兵陷江陵殺緯及諸王大將軍陳霸先揚州刺史王僧辨立緯之子晋安王方智于潯陽是謂恭帝還都建業王僧辨為太尉居內陳霸先為司空鎮丹徒西魏宇文泰弒其君欽立齊王廓改元元年泰用蕭察南征拔江陵殺緯徙其民于長安乙亥梁貞陽侯蕭明自齊入至東關太尉王僧辨拒之不勝遂迎蕭明入建業立之降方智為太子改元天成司空陳霸先自丹徒入殺王僧辨廢蕭明為司徒封建安公復立方智改元紹泰霸先為尚書都督中外專制是年蕭察稱帝江陵改元大定北附于宇文氏是謂後南梁丙子梁改元太平陳霸先稱相國敗齊軍于江上西魏宇文泰卒子覺繼事是年覺代西魏命于長安是謂閔帝改國為周是謂後周元稱元年降其君廓為宋國公丁丑梁相國陳霸先進爵為陳王十月陳霸先代梁命于建業是謂武帝改國曰陳元曰永定降其君方智為江隂王周亂宇文護弒其君覺立宇文育是謂明帝稱元年護為太宰專制戊寅梁蕭莊以郢州稱帝求援于齊己卯陳武帝霸先終兄臨川王蒨立是謂文帝以子伯宗為太子周宇文育稱天王改元武成齊宣帝洋卒子殷繼于晋陽以諸父演為太師湛為司馬元氏宗室無少長皆殺之投于漳水庚辰陳改元天嘉周亂宇文護弒其君育立其弟雍是謂武帝齊改元乾明太師高演弒其君殷代立是謂昭帝改元皇建辛巳周改元保定齊帝演卒于晋陽大司馬湛立改元太寧是謂武成壬午齊改元河清還都鄴後南梁蕭察卒子巋繼改元天寶癸未甲申周齊戰于洛陽乙酉齊高湛傳子緯位改元天統丙戌陳改元天康文帝蒨終太子伯宗嗣立庶兄頊録尚書都督中外軍事專制周改元天和丁亥陳改元光大戊子陳亂安成王陳頊弒其君伯宗代立是謂宣帝己丑陳改元太建以子叔寶為太子庚寅齊改元武平辛卯壬辰陳將吳明徹伐齊有功周襲封李淵為唐國公誅太宰晋公護改元建德癸巳陳伐齊有功經世之酉二千二百五十四甲午陳宣帝頊七年周武帝雍十五年齊武帝緯十年後南梁蕭巋十二年乙未周大伐齊圍其晋州及洛陽丙申周拔齊平陽及晋陽齊拒周不利晋州陷于周緯走并州周圍并州緯走鄴改元隆化兄宗德王延宗稱帝并州改元昌德并州又陷于周丁酉周軍圍齊之鄴緯傳子恆位改元承光緯走青州恆又禪丞相任城王湝湝稱守國天王鄴又陷于周國遂亡緯亦就擒于青州戊戌周改元宣政帝雍卒于伐齊子贇繼是謂宣帝以楊堅為上柱國大司馬都督揚州改元天成己亥陳將吳明徹伐周不利于吕梁淮南之地盡沒于周周帝贇傳子闡位是謂靜帝贇稱天元大帝改元大象庚子周大帝贇終大司馬楊堅自楊州入總朝政假黃鉞都督中外軍事專制堅召宇文宗室在蕃者六王至長安皆殺之天下兵起尉遲逈稱兵相州宇文胄稱兵榮州石遜稱兵建州席毗稱兵沛郡席人羅稱兵兖州王謙稱兵益州堅悉平之進爵為隋王用天子服器鄖州蕭難以鄖州入于陳辛丑周改元大定是年隋王楊堅代後周命于長安是謂文帝改國曰隋元曰開皇以高熲虞慶則李德林康世康暉元巖長孫毗楊尚希楊惠十人為之輔𠕋妃獨孤氏為皇后子勇為太子廣為晋王降其君衍為介國公殺之壬寅陳宣帝頊終子叔寶繼是謂後主隋起新宫于龍首岡癸卯陳改元至德隋徙居新宫甲辰後南梁蕭巋朝隋乙巳後南梁蕭巋卒子琮繼丙午隋成國公梁士彥祀國公宇文欣舒國公劉昉謀興復不克伏誅梁蕭琮改元廣運丁未陳改元禎明梁蕭琮納國于隋太傳安平王蕭巖荆州刺史蕭瓛降于陳戊申隋命晋王廣秦王浚清河公楊素督總管九十兵五十一萬為八路大伐陳以壽春為行臺府己酉隋師滅陳以陳後主叔寶歸于長安庚戌蘇越饒泉婺樂安蔣山永嘉餘杭交址未服楊素悉平之辛亥壬子癸丑甲寅東巡封泰山乙卯丙辰丁巳戊午伐高麗無功己未庚申廢太子勇立晋王廣為皇太子辛酉改元仁壽命十六使巡行天下壬戌命七大臣定禮癸亥經世之戌二千二百五十五甲子隋文帝二十四年帝崩晋王廣即位是謂煬帝改元大業乙丑丙寅丁卯戊辰己巳西幸河右征吐谷渾至于覆袁川庚午南幸江都辛未北幸涿郡壬申以兵一百二十萬三千八百為二十四軍分左右道大伐遼東不利全陷九軍癸酉以代王侑留守長安越王侗留守東都秦王浩從駕征遼東復大集兵于涿郡天下羣盜起楊玄感以本兵叛于黎陽甲戌高麗請降乃班師扶風盜稱帝延安寇稱王離石賊稱天子乙亥北巡至于鴈門為突厥所圍丙子南幸江都羣盜李密稱兵河南竇建德稱兵河北林士弘稱兵江南徐圓朗稱兵山東劉武周稱兵代北薛舉稱兵隴右丁丑煬帝在江都唐公李淵自晋陽入立代王侑于長安以江都帝為太上皇改元義寧淵稱唐王專制羣盜竇建德稱王河北李密進據鞏洛稱公國曰魏元曰永平薛舉稱帝隴右國曰秦元曰秦興梁師都稱兵夏州李軌稱兵涼州蕭銑稱兵巴陵李子通稱兵海陵朱粲稱兵冠軍沈法興稱兵毗陵杜伏威稱兵歷陽戊寅五月唐王李淵代隋命于長安是謂神堯皇帝改國曰唐元曰武德以裴寂劉文靜為輔相世子建成為皇太子次子世民為秦王降其君為國公是年宇文化及弒煬帝于江都立秦王浩為主化及稱王專制北轉至魏州化及又殺浩代立稱帝國曰許元曰天壽又北走聊城王世充立越王侗于東都改元皇泰世充稱鄭王專制群盜竇建德進有河北都樂壽隴右薛舉卒子仁杲立劉武周進有河東稱帝國曰漢元曰天興梁師都進有朔方稱帝國曰梁元曰永隆李軌進有河右稱帝國曰凉元曰安樂蕭銑進有江右及嶺表稱帝國曰梁元曰鳴鳳李子通進有江都稱帝國曰吳元曰明政朱粲進有山南稱帝國曰楚元曰昌達沈法興進有江東稱王國曰梁元曰延康林士弘稱帝虔州國曰楚元曰太平杜伏威進有淮南受唐封楚王秦王平隴右獲薛仁果己卯唐秦王平河右獲李軌李密與王世充相攻不利奔唐復叛死于邢公峴徐世績以河南十郡降竇建德滅宇文化及于聊城自立為帝甫有黎陽之地稱國曰夏元曰五鳳蕭銑滅林士弘于虔州杜伏威南保江都李子通西保江陵王世充殺越王侗于東都稱帝國曰鄭元曰開明朱粲降于唐復殺唐使者奔王世充庚辰唐秦王平河東劉武周走突厥李子通滅沈法興于江東徙居餘杭工部尚書獨孤懷恩以謀逆伏誅辛巳唐秦王平河南河北獲王世充及竇建德以歸杜伏威滅子通于餘杭竇建德將劉黑闥復稱兵河北壬午唐李靖滅蕭銑于金陵江南及嶺表平癸未唐秦王平河北獲劉黑闥又平徐圓朗于曹州江淮杜伏威來朝其將輔公祏稱王丹徒國曰宋甲申唐李靖平輔公祏于江淮乙酉唐加秦王中書令丙戌皇太子建成齊王元吉作難殺秦王不克秦王以長孫無忌尉遲敬德侯君集張公謹王君廓房玄齡杜如晦長孫順德柴紹羅藝劉師玄李世績劉弘基王孝恭平之于玄武門帝乃授秦王世民位退居太安宫稱太上皇高士廉為侍中房玄齡為中書令蕭瑀為尚書右僕射丁亥改元貞觀尚書封倫卒蕭瑀為左僕射長孫無忌為右僕射戊子平梁師都于朔方己丑相裴寂以罪免房玄齡為尚書左僕射杜如晦為尚書右僕射李靖為兵部尚書魏徵守祕書監關議朝政庚寅李靖平突厥獲頡利可汗戴胄蕭瑀參預朝政溫彥博為中書令辛卯春大搜于昆明冬幸溫湯壬辰祀南郊癸巳魏徵為侍中頒新定五經于天下經世之亥二千二百五十六甲午唐廣孝皇帝九年乙未李靖平吐谷渾獲其王放還本國太上皇崩于太安宫葬高祖于獻陵丙申魏徵遷特進溫彥博遷右僕射丁酉幸洛陽宫戊戌高士廉為右僕射己亥幸九成宫荒服十國來修貢庚子侯君集平高昌獲其王以歸弘化公主嬪于吐谷渾至日圓丘祀吳天上帝辛丑幸洛陽文成公主嬪于吐蕃壬寅幸岐陽癸卯圖二十四勳臣于凌煙閣內難作皇子齊王祐以齊叛廢太子承乾為庶人徙之黔幽魏王泰于北苑徙之均以晋王治為皇太子誅侯君集至日祀南郊甲辰岑文本馬周為中書令幸洛陽及親征遼東乙巳平高麗丙午李績破薛延陀荒服十一國修貢丁未起翠微宫于終南山戊申阿史郍平龜兹獲其王以歸征松州蠻司空房玄齡特進蕭瑀卒褚遂良為中書令己酉帝崩于翠微宫皇太子治踐位葬太宗于昭陵長孫無忌褚遂良輔政復李績官仍加特進于志寧張行成進侍中知政事庚戌改元永徽褚遂良罷政辛亥征賀魯至千金領至日有事于南郊壬子𠕋陳王忠為皇太子韓瑗來濟為相宇文節為侍中柳奭為中書令癸丑駙馬都尉房遺愛柴令武薛萬徹荆王元景及二公主以謀逆伏誅遂殺吳王恪褚遂良復為右僕射睦州女寇亂甲寅築長安羅城親謁昭陵乙卯廢皇后王氏良姊蕭氏為庶人𠕋昭儀武氏為皇后罷長孫無忌褚遂良政事以許敬宗李義府為相武后殺庶人王氏及蕭氏崔敦禮為中書令丙辰廢皇太子忠為梁王𠕋代王弘為皇太子改元顯慶杜正倫為相丁巳幸許洛以洛陽為東都李義府進中書令許敬宗進侍中貶相韓瑗來濟為州刺史戊午蘇定方平賀魯獲其王己未殺長孫無忌褚遂良于流所幸東都庚申廢梁王忠為庶人蘇定方平百濟獲其王扶餘辛酉改元龍朔壬戌還長安進門下尚書中書為東中西三臺分侍中中書令為左右相造蓬萊宫許圉師為左相尋下獄癸亥起含元殿于蓬萊宫李義府為右相尋配流嶲州死改來年為麟德皇極經世卷第六之中
