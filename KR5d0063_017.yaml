front:
  text: 皇極經世卷第六之中詠五
  hash: sha256:2204bbb41b42df67dd3611adbdde32c2e0508159ad64c6e6db3d22fd1dc6a0bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0063_HFL_017-001a, image: hfl/0711/0711-004.png}
body:
  text: 三川邵堯夫撰經世之申二千二百四十一甲子漢孝靈皇帝十七年黄巾寇起鄧盛爲太尉張温爲司空侍中向栩張鈞下獄死閹人大起誣構黄巾平乙丑黑山賊起崔烈爲司徒張延爲太尉許相爲司空三輔寇亂陳耽劉陶坐直言死丙寅張温爲太尉江夏兵起前太尉張延下獄死丁卯賣官至關内侯曹嵩爲太尉三輔盜起漁陽賊稱帝戊辰天下群盜起黄巾賊復寇郡國稱帝置八校尉以捕天下群盜馬日磾爲太尉曹操爲典軍校尉袁紹爲中軍校尉董重爲驃騎將軍己巳帝崩皇太子辯踐位皇太后何氏臨朝稱制大將軍何進專政改元光熹封皇弟協爲勃海王殺上軍校尉蹇碩驃騎將軍董重及太皇太后董氏議立協故也徙協爲陳留王中常侍張讓叚珪殺大將軍何進中郎袁術以兵攻東宫張讓叚珪以帝及陳留王是北宫何苗攻北宫司隸校尉袁紹兵入大殺閹堅讓珪以帝及陳留王出走小平津尚書盧植兵追及之讓珪投于河死盧植以帝及陳留王還宫改元昭寧董卓自太原入廢帝爲弘農王立陳留王協是謂獻帝徙太后何氏于永安宫改元永漢卓殺太后何氏及弘農王辯于永安宫稱相國專制黄琬爲太尉楊彪爲司徒荀爽爲司空袁紹入冀州庚午改元初平天下兵起群校尉推袁紹爲主同攻董卓卓大殺宗室及官屬遷帝西都長安孫堅兵起荆州白波賊寇東郡劉虞爲太傅种拂爲司空辛未董卓稱太師大焚洛陽宫闕及徙居民于長安孫堅敗董卓兵于陽人入洛脩完諸帝陵寢引軍還魯陽黑山賊寇常山黄巾賊擾太山壬申董卓將王允吕布誅卓于長安夷三族卓將李傕郭汜陷長安殺王允吕布走袁紹傕汜擅政以皇甫嵩爲太尉淳于嘉爲司徒曹操破黄巾于壽張孫堅卒子策代總其衆癸酉李傕郭汜屠三輔朱㑺爲太尉趙温爲司空袁紹袁術交兵東方甲戌改元興平帝加元服楊彪爲太尉孫策據有江南乙亥李傕郭汜爭權相攻于長安楊定楊奉董承以帝東還曹操破吕布于定陶遂有兖州布走劉備丙子帝還洛陽改元建安曹操徙帝都許昌丁丑袁術稱帝九江拜袁紹大將軍曹操破袁術于揚州吕布襲劉備于下邳劉備走曹操戊寅曹操平吕布于下邳兼有徐州己卯袁術死曹操將公孫瓚屯于易水孫策破劉勳于廬江庚辰曹操大敗袁紹于官渡劉備去曹操奔劉表于荆南江南孫策卒弟權繼事辛巳壬午袁紹卒子尚繼事以弟譚爲將軍癸未袁尚袁譚相攻譚敗奔曹操甲申曹操破袁尚于鄴兼有冀州尚走青州譚復奔尚乙酉曹操滅袁氏于青州譚死尚走爲丸丙戌曹操破高幹于太原幹走荆州丁亥曹操破烏丸于聊城袁尚走遼東死戊子曹操殺太中大夫孔融遂領丞相荆州劉表卒子琮繼事劉備起諸葛亮于南陽亮以吴周瑜兵大破曹操于赤壁遂有荆州稱牧治公安己丑孫權會劉備于京口劉備表孫權爲徐州牧孫權表劉備爲荆州牧庚寅曹操起銅爵臺于鄴孫權南收交州辛卯曹操平關中益州劉璋會劉備于葭萌孫權自京口徙治秣陵壬辰曹操割河已北屬鄴孫權城石頭改秣陵爲建業癸巳曹操以冀之十郡稱魏國公加九錫劉備攻劉璋于成都孫權扞曹操于濡須經世之酉二千二百四十二甲午漢獻帝二十六年曹操弑皇后伏氏及二皇子又破張魯米賊于漢中劉備克成都據有巴蜀孫權取劉備三郡乙未曹操以女上皇后又平張魯于漢中孫權劉備連兵攻曹操丙申曹操進爵爲魏王南伐吴丁酉曹操用天子服器孫權稱表曹操報以婚禮戊戌少府耿紀司直韋晃殺曹操不克伏誅操攻劉備進攻漢中己亥劉備取曹操漢中稱王孫權取劉備荆州稱牧關羽死之庚子改元建康曹操卒子丕繼事是年丕代漢命于鄴是謂文帝改國曰魏元曰黄初降帝爲山陽公葬太祖曹操于西陵自鄴徙都洛陽辛丑魏郊祀天地是年劉備稱帝成都建國曰蜀元曰章武諸葛亮爲相孫權自建業徙都鄂改鄂爲武昌壬寅魏加兵于吴蜀伐吴不利敗于猇亭是年孫權稱王武昌是謂文帝建國曰吴元曰黄武通使于蜀以脩前好癸卯蜀主備卒于白帝城太子禪繼是謂後主改元建興魏與蜀和親甲辰魏伐吴乙巳魏伐吴始兵廣陵蜀諸葛亮平四郡蠻丙午魏帝丕終太子叡嗣位是謂明帝司馬懿爲驃騎大將軍丁未魏改元太和有事于南郊及明堂蜀諸葛亮出師漢中戊申蜀諸葛亮圍魏陳倉吴破魏石亭己酉蜀克魏武都吴孫權稱帝改元黄龍自武昌復徙都建業庚戌魏伐蜀假司馬懿黄𨱆蜀諸葛亮攻魏天水辛亥蜀圍魏岐山壬子蜀息軍黄沙吴改元嘉禾癸丑魏改元青龍蜀伐魏師出褒斜甲寅魏南伐吴至于壽春西伐蜀至于魏南蜀諸葛亮卒于師吴伐魏師出合肥是年漢山陽公卒乙卯魏大起洛陽宫室司馬懿爲太尉蜀以蔣琬爲大將軍專國事丙辰丁巳魏改元景初公孫淵以遼東叛稱王戊午魏司馬懿平遼東蜀改元延熙吴改元赤烏己未魏明帝叡終齊王芳繼司馬懿及曹爽輔政庚申魏改元正始辛酉吴全琮伐魏軍出淮南壬戌蜀姜維伐魏軍出漢中癸亥魏帝加元服司馬懿伐吴至于舒蜀蔣琬伐魏軍出漢中吴伐魏軍出六安經世之戌二千二百四十三甲子魏主芳五年蜀主禪二十一年吴主權二十三年魏曹爽伐蜀無功乙丑蜀伐魏費禕師出漢中吴將馬茂作難夷三族丙寅丁卯魏曹爽專政何晏秉機司馬懿稱病戊辰蜀伐魏費禕師出漢中己巳魏曹爽奉其君謁高平陵太傅司馬宣王稱兵于内夷大將軍曹爽及其攴黨曹義曹訓曹彦何晏丁謚鄧颺畢執李勝桓範張當三族迎帝還宫改元嘉平復皇太后懿加九錫專國事庚午魏伐吴南郡辛未魏司馬懿宣王卒子師繼事吴改元太元壬申魏伐吴不利吴改元神鳳權卒子亮繼改元建興癸酉吴蜀伐魏甲戌魏亂司馬師廢其君芳立高貴鄉公髦改元正元師假黄𨱆專制稱景王蜀伐魏姜維拔魏三城吴改元五鳳乙亥魏司馬師伐吴平淮南還許昌卒子昭繼事爲大將軍録尚書事專制蜀姜維敗魏軍于臨洮吴孫峻敗魏于壽春丙子魏改元甘露大敗蜀軍于上邦司馬昭稱文王假黄鋮吴改元太平大將軍孫峻卒國亂丁丑魏大將軍諸葛誕以揚州叛入于吴蜀伐魏姜維師出駱谷吴王亮始親政事戊寅魏司馬昭伐吴拔壽春誅諸葛誕蜀改元景耀宦氏黄皓專政吴亂大將軍孫綝廢其君亮立亮弟休改元永安綝作逆伏誅己卯庚辰魏亂司馬昭弑其君髦立常道鄉公璜改元景元昭加九錫稱晋國公專制辛巳壬午魏鄧艾鍾會伐蜀癸未魏滅蜀徙其君于洛陽蜀改元炎興是年國亡吴出軍壽春救蜀不克甲申司馬昭進爵爲晋王增郡二十用天子服器改元咸熙以檻車徵鄧艾鍾會以蜀叛吴孫休卒濮陽王興中軍張布廢休子靈立權廢子和之子皓改元元興皓立誅興及布乙酉魏司馬昭卒子炎繼事是年炎代魏命是謂武帝改國爲晋元曰太始降其君璜爲陳留王徙于鄴吴徙都武昌改元甘露丙戌吴改元寶鼎復還建業丁亥晋立子衷爲皇太子戊子吴伐晋己丑吴改元建衡南伐交阯庚寅吴孫秀奔晋辛卯吴平交阯蜀劉禪卒于晋壬辰晋賈充以女上太子妃遂爲司空吴改元鳳凰癸巳晋何魯爲司徒吴師寇晋弋陽經世之亥二千二百四十四甲午晋武帝十年吴主皓十年晋分幽州城平州乙未晋改元咸寧吴改元天册丙申晋東西夷十七國内附吴改元天璽丁酉晋四夷内附吴改元天紀將邵凱夏祥逃入于晋戊戌吴劉翻祖始逃入于晋己亥晋命賈充督楊渾瑯琊王伸王渾王戎胡奮杜預唐彬王濬七將兵二十萬伐吴是年汲人發魏襄王塚得書七十五卷庚子晋平吴徙孫皓于洛陽改元太康辛丑壬寅東西夷二十九國修貢山濤爲司徒衛瓘爲司空賈充卒癸卯孫皓卒魏舒爲司徒甲辰乙巳丙午丁未戊申己酉汝南王亮爲司馬假黄鋮庚戌改元太熙武帝崩太子衷踐位是謂惠帝册妃賈氏爲皇后改元永熙葬武帝于峻陵王渾爲司徒何劭爲太師裝楷爲少師和嶠爲少保王戎爲少傅衛瓘爲太保石鑒爲司空辛亥改元永平皇后賈氏專制夷十二大臣族太傅楊駿太保衛瓘汝南王亮皆被戮焉廢太后楊氏爲庶人徙之金墉遣諸王就國改元元康趙王倫爲大將軍壬子賈氏弑皇太后楊氏于金墉癸丑甲寅乙卯武庫火丙辰張華爲司空秦雍寇亂齊萬年稱兵涇陽楊茂搜稱兵百頃丁巳王戎爲司徒何劭爲僕射戊午己未賈后廢皇太子遹爲庶人及其二子送之金墉裴頠爲僕射庚申改元永康皇后賈氏徙皇庶人于許昌殺之趙王倫梁王彤廢皇后賈氏爲庶人送金墉殺之誅宰相張華及僕射裴頠侍中賈謐又誅嵇康吕安石崇潘岳于東市倫假黄鉞稱相國專制以彤爲太宰册羊氏爲皇后賈氏黨趙廞以成都叛辛酉趙王倫竊命徙帝于金墉改元建始齊王冏成都王穎河間王顒兵入誅趙王倫及其黨迎帝反正冏大司馬專制以頴爲大將軍顒爲太尉改元永寧流人李特殺趙欽于成都張軌以凉州叛壬戌長沙王乂河間王顒成都王頴新野王歆范陽王虓兵入誅齊王冏送其族于金墉殺之乂稱太尉專制改元太安流人李特以六郡稱牧廣漢癸亥河間王顒成都王頴東海王越執長沙王乂送之金墉殺之顒稱太宰專制于長安陸機陸雲兵死石冰以徐揚亂李特攻成都不克死子雄繼皇極經世之六以運經世之九觀物篇之三十三經元之甲一經會之午七經運之辛一百八十八經世之子二千二百四十五經世之子二千二百四十五甲子晋惠帝十四年河間王顒廢皇后羊氏及皇太子覃徙之金墉表成都王頴爲太弟加九錫鎭鄴改元永安右衛將軍陳軫復羊氏皇后及覃太子大會司徒王戎及東海王越高宻王簡平昌公模吴王晏豫章王熾襄陽王範左僕射荀藩八部兵奉帝北伐鄴師敗于湯陰𥞇紹死之帝如北軍頴以帝歸鄴改元建武顒將張方入洛復廢皇后羊氏及覃太子安北將軍王浚東瀛公騰以烏丸攻鄴穎師敗帝還洛陽河間王使張方徙帝西都長安亦復羊氏皇后及永安年號頴太弟以豫章王熾爲太弟改元永興王戎豫朝政始分東西臺是年李雄逐羅尚于成都稱王單于左賢王劉淵稱王離石國曰漢元曰元熙乙丑東海王越嚴兵徐方范陽王虓抗師許昌成都王頴擁兵河北河間王顒又復廢羊氏皇后以頴爲大將軍都督河北虓越將周權入洛又復羊氏皇后洛陽令何喬殺周權又廢羊氏皇后虓越攻頴不已頴敗棄鄴走洛陽虓越攻洛陽頴奔顒于長安漢劉淵攻晋劉琨于板橋不利丙寅東海王越范陽王虓兵攻長安河間王顒成都王頴走南山虓越將祁弘宋冑以帝東還洛陽復以羊氏爲皇后改元光熙越稱太傅録尚書事專制虓爲司空卒越遂弑帝立太弟熾是謂懷帝引温羡爲司徒王衍爲司空顒頴野死李雄稱帝成都國曰蜀元曰太武謂之後蜀丁卯晋改元永嘉東海王越稱大丞相鎭許昌以后父梁芬爲太尉成都王黨汲桑陷鄴王彌稱兵青徐漢劉淵破晋河東諸郡晋劉琨獨保晋陽戊辰劉淵稱帝蒲子改元永鳳拔晋平陽居之王彌石勒附于漢石勒攻常山王彌攻洛陽焚建春門己巳東海王越入洛殺大臣十餘人以左僕射山簡征東南大將軍都督荆州南鎭襄漢劉淵改元河瑞石勒兵出鉅鹿王彌兵出上黨劉聰兵出壺關同攻晋洛陽庚午東海王越徵兵天下諸侯咸無從者自率兵出許昌漢劉淵卒子和繼弟楚王聰殺和代立改元光興以北海王義爲皇太弟劉曜爲相國石勒爲大將軍辛未天下亂晋詔兖州苟晞會諸侯兵伐許昌會東海王越卒乃止是年洛陽䧟王衍爲石勒獲王師十二敗帝及傳國六璽皆没于寇長安亦䧟南陽王模亦没于寇漢劉曜王彌石勒拔晋洛陽俘其帝于平陽改元嘉平劉曜拔晋長安保