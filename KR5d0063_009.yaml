body:
  text: 三川邵堯夫撰以會經運之五觀物篇之十七經日之甲一經月之午七經星之丙一百八十三經辰之子二千一百八十五甲子十乙丑十一丙寅十二丁卯十三戊辰十四己巳十五庚午十六辛未商沃甲壬申二癸酉三甲戌四乙亥五丙子六丁丑七戊寅八己卯九庚辰十辛巳十一壬午十二癸未十三甲申十四乙酉十五丙戌十六丁亥十七戊子十八己丑十九庚寅二十辛卯二十一壬辰二十二癸巳二十三經辰之丑二千一百八十六甲午二十四乙未二十五丙申商祖丁丁酉二戊戌三己亥四庚子五辛丑六壬寅七癸卯八甲辰九乙巳十丙午丁未戊申乙酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之寅二千一百八十七甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳商陽甲經辰之卯二千一百八十八甲午二乙未三丙申四丁酉五戊戌六己亥七庚子商盤庚辛丑二壬寅三癸卯四甲辰五乙巳六丙午七丁未八戊申九己酉十庚戌十一辛亥十二壬子十三癸丑十四甲寅十五乙卯十六丙辰十七丁巳十八戊午十九己未二十庚申二十一辛酉二十二壬戌二十三癸亥二十四經辰之辰二千一百八十九甲子二十五乙丑二十六丙寅二十七丁卯二十八戊辰商小辛己巳二庚午三辛未四壬申五癸酉六甲戌七乙亥八丙子九丁丑十戊寅十一己卯十二庚辰十三辛巳十四壬午十五癸未十六甲申十七乙酉十八丙戌十九丁亥二十戊子二十一己丑商小乙庚寅二辛卯三壬辰四癸巳五經辰之巳二千一百九十甲午六乙未七丙申八丁酉九戊戌十己亥十一庚子十二辛丑十三壬寅十四癸卯十五甲辰十六乙巳十七丙午十八丁未十九戊申二十己酉二十一庚戌二十二辛亥二十三壬子二十四癸丑二十五甲寅二十六乙卯二十七丙辰二十八丁巳商武丁戊午二己未三庚申四辛酉五壬戌六癸亥七經辰之午二千一百九十一甲子八乙丑九丙寅十丁卯十一戊辰十二己巳十三庚午十四辛未十五壬申十六癸酉十七甲戌十八乙亥十九丙子二十丁丑二十一戊寅二十二己卯二十三庚辰二十四辛巳二十五壬午二十六癸未二十七甲申二十八乙酉二十九丙戌三十丁亥三十一戊子三十二己丑三十三庚寅三十四辛卯三十五壬辰三十六癸巳三十七經辰之未二千一百九十二甲午三十八乙未三十九丙申四十丁酉四十一戊戌四十二己亥四十三庚子四十四辛丑四十五壬寅四十六癸卯四十七甲辰四十八乙巳四十九丙午五十丁未五十一戊申五十二己酉五十三庚戌五十四辛亥五十五壬子五十六癸丑五十七甲寅五十八乙卯五十九丙辰商祖庚丁巳二戊午三己未四庚申五辛酉六壬戌七癸亥商祖甲經辰之申二千一百九十三甲子二乙丑三丙寅四丁卯五戊辰六己巳七庚午八辛未九壬申十癸酉十一甲戌十二乙亥十三丙子十四丁丑十五戊寅十六己卯十七庚辰十八辛巳十九壬午二十癸未二十一甲申二十二乙酉二十三丙戌二十四丁亥二十五戊子二十六己丑二十七庚寅二十八辛卯二十九壬辰三十癸巳三十一經辰之酉二千一百九十四甲午三十二乙未三十三丙申商廪辛丁酉二戊戌三己亥四庚子五辛丑六壬寅商庚丁癸卯二甲辰三乙巳四丙午五丁未六戊申七己酉八庚戌九辛亥十壬子十一癸丑十二甲寅十三乙卯十四丙辰十五丁巳十六戊午十七己未十八庚申十九辛酉二十壬戌二十一癸亥商武乙經辰之戌二千一百九十五甲子二乙丑三丙寅四丁卯商太丁戊辰二己己三庚午商帝乙辛未二壬申三癸酉四甲戌五乙亥六丙子七丁丑八戊寅九己卯十庚辰十一辛巳十二壬午十三癸未十四甲申十五乙酉十六丙戌十七丁亥十八戊子十九己丑二十庚寅二十一辛卯二十二壬辰二十三癸巳二十四經辰之亥二千一百九十六甲午二十五乙未二十六丙申二十七丁酉二十八戊戌二十九己亥三十庚子三十一辛丑三十二壬寅三十三癸卯三十四甲辰三十五乙巳三十六丙午三十七丁未商受辛戊申二己酉三庚戌四辛亥五壬子六癸丑七甲寅八乙卯九丙辰十丁巳十一戊午十二己未十三庚申十四辛酉十五壬戌十六癸亥十七錫周文王命為西伯皇極經世之三以會經運之六觀物篇之十八經日之甲一經月之午七經星之丁一百八十四經辰之子二千一百九十七甲子十八乙丑十九丙寅二十丁卯二十一戊辰二十二己巳二十三周文王沒武王即位庚午二十四辛未二十五壬申二十六癸酉二十七甲戌二十八乙亥二十九丙子三十丁丑三十一戊寅三十二己卯周武王庚辰二辛巳三壬午四癸未五甲申六乙酉七丙戌周成王丁亥二戊子三己丑四庚寅五辛卯六壬辰七癸巳八經辰之丑二千一百九十八甲午九乙未十丙申十一丁酉十二戊戌十三己亥十四庚子十五辛丑十六壬寅十七癸卯十八甲辰十九乙巳二十丙午二十一丁未二十二戊申二十三己酉二十四庚戌二十五辛亥二十六壬子二十七癸丑二十八甲寅二十九乙卯三十丙辰三十一丁巳三十二戊午三十三己未三十四庚申三十五辛酉三十六壬戌三十七癸亥周康王經辰之寅二千一百九十九甲子二乙丑三丙寅四丁卯五戊辰六己巳七庚午八辛未九壬申十癸酉十一甲戌十二乙亥十三丙子十四丁丑十五戊寅十六己卯十七庚辰十八辛巳十九壬午二十癸未二十一甲申二十二乙酉二十三丙戌二十四丁亥二十五戊子二十六己丑周昭王庚寅二辛卯三壬辰四癸巳五經辰之卯二千二百甲午六乙未七丙申八丁酉九戊戌十己亥十一庚子十二辛丑十