周下獄死樂通侯欒大坐誣罔棄市西羌及胸奴寇五原庚午南寇平東越王餘善叛卜式為御史大夫辛未改元元封帝征胸奴至于北海東越殺餘善降有事于東西中三嶽及禪梁甫東巡狩至于碣石西歷九原歸于甘泉壬申復巡太山作瓠子隄朝鮮寇遼東癸酉朝鮮殺其王右渠以降祀汾陰后土甲戌乙亥南巡狩至于盛唐大司馬衛青卒丙子西幸回中及祀汾陰后土丁丑改元太初東巡太山更以建寅月為歲首西伐大宛起建章戊寅北幸河東祀后土騎二萬征胸奴不復己卯東巡海上胸奴寇張掖酒泉庚辰李廣利平大宛獲其王及汗血馬辛巳改元天漢中郎將蘇武使胸奴北幸河東壬午東巡至于海上又西幸回中將軍李陵征胸奴不還癸未東巡太山又北幸常山胸奴寇鴈門甲申大伐胸奴不利朝諸侯于甘泉宫乙酉改元太始丙戌西幸回中丁亥東巡海上戊子東巡太山己丑改元征和巫蠱事起庚寅太子殺江充相劉屈氂攻太子戰于長安太子敗死皇后自殺諸邑公主皆坐巫蠱死辛卯大伐胸奴巫蠱事覺誅丞相劉屈氂壬辰東巡海上天下疲于兵革癸巳改元後元重合侯馬通叛經世之亥二千二百三十二甲午漢孝武皇帝五十四年册皇子弗陵為皇太子帝幸盩厔五柞宫崩大司馬霍光顧命太子弗陵嗣皇帝位是謂昭帝葬世宗于茂陵大將軍霍光專政乙未改元始元丙申丁酉戊戌己亥庚子辛丑改元元鳳誅鄂邑長公主及燕王旦左將軍上官桀謀害霍光事覺故也壬寅癸卯甲辰丞相田千秋卒乙巳丞相王欣卒丙午丁未改元元平帝崩昌邑王賀立葬世宗于平陵賀立不明大將軍霍光廢之迎戾太子孫詢立之是謂孝宣皇帝邴吉為相戊申改元本始己酉命將五兵十五萬大伐胸奴庚戌辛亥皇后許氏遇毒崩霍光以女上皇后壬子改元地節癸丑大司馬大將軍霍光卒子禹繼事甲寅册皇子奭為皇太子乙卯大司馬霍禹謀逆事覺夷三族廢皇后霍氏丙辰改元元康丁巳册王氏為皇后戊午太子太傅疏廣太子少傅疏受謝病歸東海己未庚申改元神雀趙充國伐西羌辛酉壬戌蕭望之為御史大夫癸亥潁川太守黃霸賜爵關內侯河南太守嚴延年棄市皇極經世之六以運經世之八觀物篇之三十二經元之甲一經會之午七經運之庚一百八十七經世之子二千二百三十三經世之子二千二百三十三甲子漢孝宣皇帝十七年改元五鳳左馮翊太守韓延壽棄市貶蕭望之為太子太傅坐慢丞相邴吉也平通侯楊惲棄市坐怨望也乙丑丙寅丞相邴吉卒黃霸為相丁卯戊辰改元甘露己巳庚午胸奴呼韓增邪單于來朝于定國為相辛未壬申改元黃龍宣帝崩于未央宫皇太子奭踐位是謂孝元皇帝癸酉改元初元葬中宗于杜陵甲戌册皇子驁為皇太子盜殺蕭望之乙亥丙子幸河東丁丑戊寅改元永光己卯庚辰西羌平辛巳壬午癸未改元建昭甲申乙酉匡衡為相丙戌丁亥戊子改元竟寧帝崩皇太子驁即位是謂孝成皇帝葬高宗于渭陵王鳳為大司馬大將軍專政己丑改元建始庚寅辛卯王商以誣免相匡衡為庶人壬辰河大决王商為相癸巳改元河平經世之丑二千二百三十四甲午漢孝成皇帝六年乙未丙申丁酉改元陽朔京兆尹王章下獄死張禹為相戊戌王音為御史大夫己亥大司馬王鳳卒弟音繼事庚子辛丑改元鴻嘉壬寅幸靈陽癸卯廢皇后許氏甲辰乙巳改元永始封王莽新都侯册趙飛燕為皇后丙午大司馬王音卒王商為大司馬翟方進為相孔光為御史大夫丁未戊申大司馬王商免王根為大司馬己酉改元元延庚戌辛亥壬子癸丑改元綏和甲寅成帝崩皇太子欣踐位是謂孝哀皇帝太后王氏臨朝稱制大司馬王根專政葬成帝于延陵王根罪免丁明為大司馬孔光為丞相乙卯改元建平册傅氏為皇后傅喜為大司馬朱博為大司空丙辰傅喜免丁明復為大司馬孔光免朱博自殺丁巳相平當薨王嘉為相戊午息夫躬下獄死己未改元元壽王嘉以下獄死大司馬丁明免庚申哀帝崩元帝孫中山王子衍即位是謂孝平皇帝年方九歲太后衡姬臨朝以王莽為太傅輔政王室元始五年立莽女為皇后辛酉改元元始封大司馬王莽安漢公壬戌癸亥經世之寅二千二百三十五甲子漢孝平皇帝四年王莽以女上皇后乙丑王莽弒帝于未央宫立元帝孫孺子嬰莽加九錫丙寅王莽改元居攝丁卯王莽稱假皇帝翟義立嚴鄉侯信于東都莽將王邑滅之戊辰王莽改元初始己巳王莽竊國命改國為新室元曰建國降孺子嬰為定安公庚午辛未壬申癸酉甲戌王莽改元天鳳四夷交侵中國乙亥丙子丁丑戊寅己卯校書郎楊雄卒庚辰王莽改元地皇兵起緑林辛巳壬午劉玄稱兵宛業劉秀及兄伯升稱兵舂陵癸未劉玄稱帝元曰更始以劉伯升為司徒劉秀為太常偏將軍是年大破莽將王尋王邑軍于昆陽三輔遂滅莽于漸臺劉玄拜劉秀破虜大將軍行大司馬事使持節巡撫河北王郎子林稱帝邯鄲甲申劉玄西入長安殺漢孺子嬰大將軍劉秀北徇薊還拔邯鄲誅王郎受劉玄蕭王又號為銅馬帝破赤眉大彤於射犬赤眉西入函關攻更始李憲自立稱王淮南秦豐自號楚黎王董憲起東海延岑稱兵漢中乙酉蕭王肇帝位于河朔之鄗國曰漢元曰建武南次洛陽都之赤眉陷長安稱帝殺劉玄公孫述稱帝成都元曰龍興劉永稱帝睢陽隗囂稱兵隴右盧芳稱兵安定彭寵稱王薊門丙戌赤眉焚長安宫室陵寢銅馬青犢尤來立孫登為帝于上郡其將樂方殺之丁亥赤眉降漢于宜陽長安平蓋延平劉永于睢陽隗囂以西州格命李憲稱帝淮南戊子己丑彭寵為家奴所殺來降封不義侯薊門平朱祐平秦豐于黎丘滅張步于臨淄盧芳稱帝五原帝徵嚴光不起庚寅馬成平李憲于淮南吳漢平董憲于東海隗囂以西州入于蜀辛卯壬辰西征馮異竇融破隗囂于隴右癸巳隗囂死子純立來歙馮異伐蜀入天水經世之卯二千二百三十六甲午漢光武皇帝十年西征滅隗純于隴右乙未西征蜀至于南陽吳漢岑彭大破蜀軍于荆門丙申吳漢拔成都誅公孫述及將田戎岑延丁酉盧芳自五原亡入胸奴戊戌天下平己亥大司徒歐陽歙下獄死庚子交址女徵側叛青徐幽冀盜起辛丑南巡廢皇后郭氏為中山太后册貴人陰氏為皇后壬寅西巡史歆以成都叛吳漢復平之馬援伐交址幸長安癸卯南巡馬援平交址封新息侯廢皇太子彊為東海王以東海王莊為皇太子甲辰大司徒戴涉下獄死乙巳丙午丁未戊申己酉馬援破武陵蠻庚戌作壽陵辛亥壬子癸丑甲寅東巡狩乙卯丙辰東封太山禪梁甫改元中元西幸長安馮魴為司空丁巳帝崩皇太子莊踐位是謂孝明皇帝葬世祖于原陵戊午改元永平己未庚申辛酉壬戌北巡癸亥東巡經世之辰二千二百三十七甲子漢孝明皇帝七年乙丑丙寅丁卯南巡狩戊辰己巳牟融為司空庚午河大决辛未壬申東巡狩癸酉司徒邢穆駙馬都尉韓光下獄死甲戌乙亥帝崩皇太子坦踐位是謂孝章皇帝葬顯宗于節陵丙子改元建初丁丑戊寅己卯鮑星為太尉桓虞為司徒詔于白虎觀議五經異同庚辰辛巳壬午廢皇太子為清河王立皇子肇為皇太子北幸鄴西幸長安癸未東巡狩甲申改元元和南巡狩鄭弘為太尉乙酉東巡狩丙戌北巡狩丁亥改元章和南巡狩戊子帝崩皇太子肇踐位是謂孝和皇帝太后竇氏臨朝稱制竇憲為車騎將軍專政葬肅宗于敬陵以鄧彪為太尉録尚書事己丑改元永元竇憲敗胸奴于稽落山以竇憲為大將軍庚寅辛卯帝加元服班超平西域壬辰竇憲作逆事覺伏誅帝始親萬機癸巳經世之巳二千二百三十八甲午漢孝和皇帝六年乙未丙申丁酉司徒劉方有罪自殺戊戌己亥庚子張酺罷太尉張禹為太尉辛丑魯恭為司徒壬寅廢皇后陰氏册貴人鄧氏為皇后徐防為司空癸卯南巡甲辰司徒魯恭罷免徐防為司徒陳寵為司空乙巳改元元興帝崩皇子隆立是謂殤帝太后鄧氏臨朝稱制車騎將軍鄧隲專政丙午改元延平葬穆宗于愼陵帝又崩鄧隲迎章帝孫祐立之是謂孝安皇帝葬殤帝于康陵尹勤為司空丁未改元永和魯恭為司徒張禹為太尉張敏為司空周章謀廢立不克自殺戊申鄧隲為大將軍己酉帝加元服庚戌海寇亂辛亥西羌入寇張禹免大尉壬子太后鄧氏有事于太廟劉愷為司空癸丑甲寅改元元初司馬苞為太尉乙卯册閻氏為皇后劉愷為司徒袁敞為司空丙辰李咸為司空丁巳戊午己未庚申改元永寧楊震為司徒辛酉改元建光太后鄧氏崩帝始親政事特進鄧隲渡遼將軍鄧遵下獄死壬戌改元延光癸亥司徒楊震為太尉經世之午二千二百三十九甲子漢孝安皇帝十八年東巡廢皇太子保為濟陰王楊震罷太尉馮石為太尉乙丑帝南巡崩于葉太后閻氏臨朝稱制閻顯為車騎將軍專政立章帝玄孫北鄉侯懿誅大將軍耿寶葬恭宗于恭陵懿又卒車騎將軍閻顯及大長秋江京閉宫門擇立它子中黃門孫程十九人殺江京迎濟陰侯立之是謂孝順皇帝顯兵入北宫不勝孫程取閻顯及江京之黨殺之亂乃定以王禮葬北鄉侯馮石為太傅劉喜為太尉李郃為司徒丙寅改元永建皇太后閻氏崩桓焉為太傅朱寵為太尉朱倀為司徒丁卯戊辰己巳帝加元服龐參為太尉王龔為司空劉俊為司徒庚午班勇棄市辛未壬申改元陽嘉册梁氏為皇后癸酉施延為太尉甲戌黃尚為司徒王卓為司空乙亥丙子改元永和王龔為太尉丁丑郭虔為司空戊寅劉壽為司徒己卯誅中常侍張達庚辰辛巳趙誠為司空梁冀為大將軍壬午改元漢安遣張綱等八使持節巡行天下廣陵寇亂趙峻為太尉胡廣為司徒癸未彭門寇亂甲申改元建康帝崩皇太子炳踐位是謂冲帝太后梁氏臨朝稱制大將軍梁冀專政葬敬宗于憲陵盜發憲陵免尚書欒巴為庶人乙酉改元永嘉帝崩太后梁氏大將軍梁冀迎肅宗孫纘立之是謂質帝葬沖帝于懷陵江淮寇亂九江賊稱黃帝歷陽賊稱黑帝丙戌改元太初梁冀弒帝迎肅宗曾孫志立之是謂桓帝李固罷免梁冀專政丁亥改元建和梁冀以女上皇后杜喬為太尉胡廣罷免李固杜喬下獄死戊子帝加元服趙誡為太尉袁湯為司徒己丑庚寅改元和平太后梁氏崩辛卯改元元嘉黃瓊為司空尋罷免壬辰癸巳改元永興袁成逢隗為三公經世之未二千二百四十甲午漢孝桓皇帝八年黃瓊為太尉尹頌為司徒乙未改元永壽韓縯為司空丙申丁酉戊戌改元延熹己亥皇太后梁氏崩大將軍梁冀謀逆事覺夷三族黃門單超擅命胡廣韓縯滅死庚子白馬令李雲直諫死于獄太山及長沙寇亂辛丑武庫火壬寅癸卯甲辰南巡揚秉為太尉乙巳廢皇后鄧氏册貴人竇氏為皇后陳蕃為太尉竇武為大將軍丙午黨錮事起司隸李膺等三百人下獄丁未改元永康帝崩太后竇氏臨朝稱制戊申竇武迎肅宗玄孫解犢侯宏立之是謂靈帝竇武録尚書事專政改元建寧葬威宗于宣陵中常侍曹節王甫殺太傅陳蕃大將軍竇武及尚書尹勳侍中劉瑜屯騎校尉馮述夷其族徙太后竇氏于南宫謀誅宦氏不克故也胡廣為太尉劉寵為司徒己酉朋黨事復起殺李膺等百人庚戌辛亥帝加元服册宋氏為皇后壬子改元嘉平太后竇氏崩誣構事大起癸丑假穎為太尉楊賜為司空甲寅李咸為太尉乙卯五經文皆刻石于太學袁隗為司徒丙辰劉寬為太尉楊賜為司空丁巳大伐鮮卑孟郁為太尉陳耽為司空戊午改元光和合浦交址內寇廢皇后宋氏大鬻爵至三公袁滂為司徒己未諸貴臣下獄死者相繼宦氏誣故也劉郃為司徒假穎為太尉張濟為司空庚申陳耽為司徒册何氏為皇后辛酉作宫市帝遊以驢為駕壬戌癸亥皇極經世卷第六之上
