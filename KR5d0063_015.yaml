  text: 皇極經世卷第五之下詠三
  hash: sha256:d93324c23bb2fe795844844b4b845abc0b737d5c40dfa06daecff941dc67fa39
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0063_HFL_015-001a, image: hfl/0710/0710-004.png}
body:
  text: 三川邵堯夫撰以運經世之六觀物篇之三十經元之甲一經會之午七經運之戊一百八十五經世之子二千二百九經世之子二千二百九甲子周幽王五年廢申后及太子冝臼以褒姒為后伯服為太子虢石父為𡖖乙丑丙寅丁卯戊辰己巳庚午申侯以犬戎伐周敗幽王于驪山殺之晋秦率鄭衛之君逐犬戎立太子冝臼是謂平王東徙居洛邑是謂東周辛未周平王錫晋文侯秦襄公命秦分岐西晋分河內壬申秦立西畤祠白帝魯惠公即位即位癸酉甲戌乙亥秦文公即位丙子丁丑戊寅己卯秦東徙居汧渭之間庚辰辛巳壬午癸未衛莊公即位甲申乙酉秦作鄜畤丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之丑二千二百一十甲午周平王二十四年乙未晋昭侯即位丙申晋昭侯封弟成師于曲沃丁酉鄭莊公即位戊戌鄭莊公封弟假于京城己亥庚子衛公子州吁阻兵辛丑楚亂熊通弒其君代立壬寅晋亂大夫潘父弒其君昭侯而納桓叔不克國人殺潘父而立君之弟平是謂孝侯癸卯甲辰乙巳丙午丁未戊申衛州吁出奔己酉庚戌晋曲沃桓叔卒子莊伯繼齊莊公卒子釐公立辛亥壬子宋桓公疾讓其弟穆公癸丑甲寅乙卯丙辰丁巳晋曲沃莊伯入翼弒其君孝侯國人逐莊伯立孝侯子是謂鄂侯戊午己未魯隱公立庚申辛酉周平王崩其孫林立是謂桓王與鄭交惡宋穆公病讓其兄之子殤公世子馮奔鄭壬戌衛公子州吁作難弒其君桓公代立宋會陳蔡衛三國之師伐鄭殺州吁于濮國人迎公之弟晋于邢而立之是謂宣公癸亥晋曲沃莊伯以鄭邢之師攻翼王使尹武氏為之助翼侯出奔隨莊伯叛王王使虢伐莊伯復奔曲沃晋人及虢侯立翼侯子光是謂哀侯鄭伐宋經世之寅二千二百一十一甲子周桓王三年晋翼侯自隨入于鄂是謂鄂侯乙丑晋曲沃莊伯卒子稱繼是謂武公丙寅宋齊衛之君盟于瓦屋丁卯秦自汧渭之間徙居雍戊辰齊會魯鄭之師伐宋己巳魯亂羽公子翬弒其君隱公立惠公之子是謂桓公羽父為之太宰庚午辛未宋亂太宰華督殺司馬孔父及弒其君殤公迎穆公子馮于鄭立是謂莊公壬申晋曲沃武公敗晋師于汾旁獲哀侯晋人立其子是謂小子侯癸酉晋曲沃武公弒其君哀侯于曲沃甲戌周桓王以蔡衛陳之師伐鄭不利矢中王肩乙亥蔡人殺陳他戎伐齊鄭使公子忽救之有功楚伐隨俾請王之號于周丙子晋曲沃武公入翼殺小子侯王使虢仲伐稱復歸曲沃虢仲立哀侯弟湣丁丑秦亂寧公卒三父廢世子而庚立它子是年楚熊通伐隨東開地至濮上遂稱王是謂武王戊寅己卯庚辰鄭莊公卒世子忽繼宋執鄭祭仲立突是謂厲公忽奔衛祭仲專政衛宣公殺其二子伋壽辛巳衛宣公卒子朔立是謂惠公壬午齊會宋衛燕伐魯不利癸未秦三父殺出子而立世子是謂武公齊釐公卒世子諸兒繼是謂襄公宋會齊蔡衛陳伐鄭甲申周桓王崩太子他嗣位是謂莊王鄭祭仲殺雍糾而逐厲公迎忽反政是謂昭公秦伐彭戲氏至于華山齊襄公削公子無知祿宋會魯衛陳伐鄭乙酉衛公子伋壽傅逐惠公立伋之弟黔牟惠公出奔齊宋會魯衛陳蔡伐鄭丙戌秦夷三父族鄭高渠彌弒其君昭公立其弟子亹渠彌專政丁亥周有黑肩之難齊襄公殺魯桓公于濼立其子同是謂莊公又會諸侯于首止殺鄭子亹高渠彌逃歸與祭仲迎公子嬰于陳立之戊子周王姬下嫁于齊己丑周葬桓王庚寅辛卯周伐隨責尊楚也齊伐紀紀侯大去其國楚武王帥師伐隨子繼是謂文王始都郢壬辰齊會宋魯陳蔡伐衛入惠公癸巳衛惠公復入殺二公子傅黔牟奔周經世之卯二千二百一十二甲午周莊王十年秦滅小虢乙未齊公子無知以葵丘之戍卒入弒襄公代立公子糾奔魯小白奔莒丙申齊人殺無知公子小白入是謂桓公糾後入不克齊伐魯殺糾其傅召忽死之管仲請囚又相桓公丁酉魯敗齊師于長勺敗宋師于乘丘楚敗蔡師于莘蔡侯獻舞歸自是江漢之國皆服于楚戊戌己亥周莊王崩太子胡齊嗣位是謂釐王宋亂南宫萬殺其君閔公及其大夫地牧太宰華督立公子游羣公子奔蕭復以蕭攻萬及殺游立公弟御說是謂桓公庚子齊會宋陳蔡邾之師伐魯三敗之取遂又會魯于柯遂復其侵地曹沫劫盟故也辛丑齊會陳曹及王人伐宋楚師入蔡壬寅齊桓公會宋陳衛鄭之君盟于鄄晋曲沃武公滅翼以重寶入周得請為諸侯癸卯齊桓公會宋陳魯衛鄭許滑滕之君盟于幽秦武公卒弟德公立楚滅鄧甲辰周釐王崩太子閬踐位是謂惠王晋武公卒子獻公詭諸繼秦徙居雍楚文王卒世子囏繼是謂杜敖乙巳秦德公卒子宣王繼丙午丁未周有五大夫之難邊伯石速蒍國以蔡衛之師攻王立弟頽王出居鄭之櫟戊申鄭厲公及虢叔入王于成周殺頽而執仲父及五大夫難遂平己酉秦作密畤敗晋師于河曲晋伐驪獲驪女以為姬陳公子完奔齊楚亂弟惲弒其君囏代立是謂成王庚戌楚修好于周及諸侯辛亥衛惠公卒子懿公繼壬子晋有驪姬之難殺群公子自翼徙居絳癸丑晋伐虢責納群公子也甲寅周惠王錫齊桓公命為伯乙卯晋滅曲沃及蒲楚伐鄭丙辰丁巳齊伐山戎至于孤竹以救燕俾修貢天子秦宣公卒弟成公立楚殺令尹子元以鬭穀於菟為令尹戊午己未魯亂叔牙弒其君莊公子開立是謂湣公季友立世子班不克奔陳庚申晋滅霍魏耿以耿封趙夙以魏封畢萬辛酉魯亂慶父以莊姜弒湣公代立季友逐慶父而立公子申是謂釐公狄滅衛殺懿公齊桓公攘戎狄而立戴公東徙渡河野處曹邑戴公卒弟燬立是謂文公自曹邑徙居楚丘晋伐東山皋落氏秦成公卒弟伍好立是謂穆公壬戌秦伐茅津齊會宋鄭魯曹邾之君于柳癸亥齊城楚丘以居衛又會江黃之君于貫晋滅虢經世之辰二千二百一十三甲子周惠王二十年齊會宋江黃之君于穀乙丑齊會宋陳魯衛鄭許曹之師伐蔡遂入楚盟于召陵執陳轅濤涂晋殺世子申生公子重耳走蒲夷吾奔屈蔡娶晋女為夫人丙寅齊桓公會宋陳魯衛鄭許曹之君及王世子盟于首止晋伐蒲重耳奔翟又伐虞及虢虢君奔周是始得志于諸侯百里奚蹇叔為之輔楚滅弦丁卯齊伐鄭晋伐屈夷吾奔梁戊辰己巳周惠王崩太子鄭踐位是謂襄王太叔作難齊帥宋衛許曹陳會正人于洮晋伐翟不利于齧桑庚午齊桓公會宰孔周公及宋衛鄭許曹之君于葵丘宋襄公立晋獻公卒公子奚齊立大夫里克及丕鄭殺之大夫荀息立其弟卓子辛未晋里克殺其君卓子及大夫荀息而納夷吾夷吾入是謂惠公惠公既立殺里克而絶秦壬申周亂叔帶以戎伐周秦晋來救癸酉甲戌齊桓公會宋陳魯衛鄭許曹之君盟于鹹𣈆饑秦輸之粟乙亥秦饑𣈆閉之糴而又伐之楚滅英丙子齊桓公會宋陳魯衛鄭許曹之君盟于牡丘以救徐管仲卒易牙專政秦伐𣈆敗之于韓原獲其君夷吾夷吾獻河西地乃得還仍以世子圉為質丁丑戎攻周齊會諸侯師戍周又會宋魯衛陳鄭許邢曹之君于淮以全鄫戊寅齊桓公卒五公子爭國公子無詭立易牙專政世子昭出奔宋己卯宋會曹衛邾伐齊殺無詭敗四公子立世子昭是謂孝侯狄伐衛庚辰秦滅梁辛巳壬午宋襄公會楚陳蔡鄭許曹六國之君于盍為楚所執楚成王執襄公于會以伐宋盟而梓之癸未齊入王叔帶于周秦𣈆徙陸渾之戎于伊川宋會衛許滕伐鄭不利𣈆公子圉自秦逃歸楚救鄭大敗宋師于泓甲申周頽叔桃子以狄師伐鄭遂以狄女隗氏為后宋襄公卒子成公壬臣繼齊伐宋楚伐陳乙酉周襄王廢狄后頽叔桃子以狄師攻周王出居鄭之汜叔帶代立與狄后居于溫𣈆有却芮之難惠公卒世子圉繼是謂懷公秦穆公使人殺之而入公子重耳是謂文公趙衰為原大夫專政丙戌秦𣈆之師滅王叔帶于溫而納王于成周王享𣈆文公于郟而命益之河內地衛文公卒世子成公鄭繼楚圍陳以入頓子丁亥宋背楚親𣈆楚滅夔伐宋又伐齊戊子齊孝公卒弟潘父殺世子代立是謂昭公𣈆救宋作三軍楚使子玉伐宋己丑周襄王狩于河陽𣈆會齊宋蔡秦之師伐衛大敗楚師于城濮遂會齊宋蔡鄭魯衛之君盟于踐土楚救鄭不利殺令尹子玉得臣庚寅𣈆會王人及諸侯于翟泉辛卯衛成公自陳如周周請晋納成公于衛而誅大夫元咺及公子瑕秦𣈆圍鄭壬辰魯取濟西田衛徙居帝丘癸巳晋文公卒世子歡繼是謂襄公經世之巳二千二百一十四甲午周襄王二十五年秦穆公伐鄭𣈆敗秦師于殽獲其帥孟明視西乞術白乙丙魯僖公卒世子興繼是謂文公乙未𣈆歸秦三帥楚亂世子商臣弒其君惲代立是謂穆王丙申秦伐𣈆不利于彭衛丁酉秦伐𣈆取王官楚伐江𣈆師來救戊戌秦伐西戎破國十二楚滅江己亥晋趙襄子衰卒子盾繼事楚滅六庚子秦穆公卒世子罃繼是謂康公葬穆公三良為殉𣈆襄公卒辛丑𣈆世子夷皋繼是謂靈公衛成公卒國亂弟禦殺世子代立國人殺禦立公子杵臼是謂昭公齊率宋衛陳鄭許曹之君會趙盾于扈壬寅周襄王崩太子壬臣嗣位是謂頃王癸卯周葬襄王𣈆會諸侯人救鄭秦伐𣈆取武遂甲辰𣈆伐秦取少梁秦伐𣈆取北徵乙巳魯敗狄于鹹獲其帥喬如丙午秦伐晋取羈馬丁未楚穆王卒世子莒繼是謂莊王戊申周頃王崩國亂公卿爭權𣈆趙盾平周亂而立王子班是謂匡王宋及諸侯盟于新城齊昭公卒國亂公子商人殺世子舍代立是謂懿公己酉秦伐蔡齊伐魯庚戌齊修郪丘之盟宋人弒其君昭公弟鮑立是謂文公楚滅庸辛亥𣈆會衛陳鄭伐宋壬子魯文公卒于臺下襄仲殺世子惡而立公子俀是謂宣公三桓專政秦康公卒世子稻繼是謂共公齊亂大夫丙歜殺其君懿公立公子元是謂惠公宋亂羣公子作難癸丑齊取魯濟西𣈆伐鄭楚侵陳及宋甲寅周匡王崩弟瑜立是謂定王鄭敗宋師于大棘獲其太宰華元𣈆伐鄭秦伐𣈆𣈆趙盾弒其君靈公迎襄公弟黑臀于周立之是謂成公乙卯周葬匡王楚伐陸渾之戎遂觀兵于周郊丙辰鄭亂公子作難丁巳𣈆伐陳以救鄭秦共公卒世子稻繼是謂桓公戊午𣈆趙盾衛孫免侵陳己未𣈆會諸侯于黑壤庚申𣈆伐秦楚滅舒蓼辛酉𣈆侯會宋衛陳鄭于扈陳不至遂伐陳𣈆成公卒于扈公子據立是謂景公趙盾卒子朔繼事壬戌齊歸魯濟西田齊惠公卒公子無野繼是謂頃公大夫崔杼奔衛陳亂夏徵舒弒其君靈公𣈆伐鄭楚師來救楚伐鄭𣈆師來救癸亥楚伐陳誅夏徵舒納公孫寧儀于陳經世之午二千二百一十五甲子周定王十年楚伐鄭大敗𣈆師于河上𣈆屠岸賈作難于下宫殺趙朔及其族朔妻匿于公宫生武乙丑楚伐宋丙寅楚圍宋丁卯周定王殺二伯𣈆滅赤狄及潞氏戊辰楚宣王榭火𣈆滅申氏又平王室之亂己巳𣈆會諸侯之君于斷道庚午魯宣公卒世子黑肱繼是謂成公𣈆伐齊楚莊王卒世子審繼是謂共王辛未周伐茅戎不利壬申齊伐衛敗魯衛之師于新築𣈆會諸侯之師救衛大敗齊師于安革宋文公卒子瑕繼是謂共公華元專國兩盟于𣈆楚楚會十癸酉晋會宋衛魯曹伐鄭鄭兩伐許甲戌𣈆伐楚救鄭乙亥周定王崩太子夷嗣位是謂簡王𣈆會齊宋衛魯鄭曹邾杞八國之君盟于蟲牢楚伐鄭丙子楚伐鄭𣈆救鄭是年壽夢稱王于吳丁丑𣈆會齊宋魯衛曹邾莒八國之君于馬陵以救鄭吳王壽夢始通好中國戊寅𣈆殺大夫趙己卯𣈆會齊宋魯衛鄭曹邾杞八國之君盟于蒲齊頃公卒子環繼是謂靈公晋伐鄭秦伐晋楚伐莒入鄆庚辰𣈆景公有疾授世子州蒲位是謂厲公景公卒程嬰攻屠岸賈于公宫滅其族復趙武趙朔之封邑程嬰請死辛巳秦𣈆修壬午𣈆楚同盟于宋𣈆敗狄于交剛癸未魯成公朝于周𣈆會齊宋魯衛鄭曹邾滕八國之師伐秦敗之于麻遂甲申秦桓公卒子景乙酉𣈆會諸侯之君于戚宋共公卒國亂大司馬唐山殺世子肥右師華元右師魚石誅唐山而立公子成是謂平公楚遷許于業吳大會諸侯之君于鍾離丙戌𣈆伐鄭大敗楚師于鄢陵楚救鄭不克矢中王目誅令尹側丁亥𣈆會諸侯盟于柯陵是年𣈆殺三郤戊子𣈆亂欒書弒其君厲公迎公子周于周立之是謂悼公魯成公卒子午繼是謂襄公楚會鄭伐宋入彭城𣈆侯會宋公魯仲孫蔑衛侯邾子齊崔杼同盟于虛杼己丑周簡王崩太子泄心嗣位是謂靈王𣈆會諸侯之師伐宋圍彭城庚寅周葬簡王晋伐鄭會諸侯之師于戚以城虎牢辛卯𣈆會八國之君盟于雞澤楚伐吳至于衡山壬辰𣈆用魏絳楚伐陳癸巳𣈆會諸國之師于戚城又救陳吳會魯衛之君于善道經世之未二千二百一十六甲午周靈王五年乙未𣈆會七國之君于鄬丙申𣈆會諸國之君于邢丘鄭子駟殺羣公子丁酉秦伐晋晋會十一國之君伐鄭楚亦伐鄭鄭兩盟晋楚戊戌晋率十一國之君會吳壽夢于柤以滅逼陽又會十一國之師伐鄭又伐秦楚伐宋又救鄭己亥晋兩會十一國之師伐鄭賜魏絳食采安邑秦伐晋救鄭魯三桓分軍楚伐鄭又伐宋庚子楚會秦伐宋吳壽夢卒長子諸樊繼辛丑楚共公卒子昭廢世子代立是謂康王吳伐楚不利壬寅𣈆率齊宋魯衛鄭曹莒邾滕薛𣏌小邾十二國之君會吳諸樊于向又會諸侯之師伐秦衛亂孫林父寧殖作難衛侯出奔齊楚伐吳有功癸卯𣈆悼公卒子彪繼是謂平公甲辰𣈆侯會宋魯衛鄭曹莒邾薛杞小邾十國之君盟于大梁執莒子邾子以歸又伐楚至于方城乙巳丙午𣈆用范中行會宋衛魯鄭曹莒邾滕杞小邾十一國之師伐齊敗之于靡下進圍臨淄齊靈公奔莒丁未齊廢世子光以公子牙為世子崔杼復廢牙立光為世子靈公卒光繼是謂莊公崔杼當國鄭簡公誅大夫子札以子産當國戊申𣈆侯會十一國之君盟于澶淵己酉𣈆侯會八國諸侯盟于商壬欒盈奔楚庚戌𣈆會十一國之君盟于沙隨楚殺令尹子南晋欒盈自楚適齊辛亥欒盈自齊復入于𣈆不克死范中行滅欒氏之族齊伐𣈆取朝歌壬子𣈆會十一國之君于夷儀楚會諸侯伐吳又伐鄭癸丑齊亂崔子弒其君莊公立異母弟杵臼是謂景公崔杼為右相慶封為左相𣈆敗齊師于高唐楚會陳伐鄭及滅舒鳩吳伐楚不利諸樊死弟餘祭立封季札于延陵甲寅衛亂寧喜孫林父爭權林父不勝奔𣈆寧喜弒其君剽𣈆執寧喜求衛公子齊而納之封林父于宿齊慶封夷崔杼族而專國封子産六邑楚會陳蔡伐鄭乙卯𣈆用趙武為正卿是謂文子與韓宣子起魏武子絳同執國命會諸侯大夫于宋衛誅寧喜𣈆楚齊秦同會兵于宋從向戌之請將弭兵步丙辰周靈王崩太子貴嗣位是謂景王齊慶封弛政其子舍及田鮑高欒之徒逐之慶封奔魯又適吳楚康王卒世子麋繼是謂郟敖丁巳𣈆智伯會十國諸侯入城杞楚用叔圉為令尹吳亂餘祭遇弒弟餘昧立季札使魯齊鄭𣈆戊午蔡亂世子弒其君代立鄭亂羣公子爭寵宋災𣈆會諸侯己未魯襄公卒世子又卒國人立齊歸之子惆是謂昭公季武子專政庚申𣈆趙武會諸國之大夫于虢楚亂令尹圍弒其君麋代立是謂靈王公子比奔𣈆薳罷為令尹辛酉晋韓宣子起使魯壬戌魯昭公朝𣈆齊晏嬰使𣈆鄭伯朝𣈆又朝楚癸亥楚會十一國之君于申執徐子于會又會七國諸侯師伐吳之朱方以誅齊慶封吳拔楚三邑經世之申二千二百一十七甲子周景王八年楚會諸侯伐吳秦景公卒世子繼是謂哀公乙丑齊北伐燕楚東伐吳吳敗楚師于乾溪丙寅楚起章華臺丁卯楚滅陳執其公子招放之于越戊辰己巳𣈆平公卒世子夷繼是謂昭公齊陳鮑逐欒高氏于𣈆分其室庚午𣈆韓起會齊宋魯衛鄭曹杞邾大夫于厥憖楚誘蔡侯于申殺之公子棄疾滅蔡守之執其世子有歸用之辛未魯朝𣈆楚伐徐壬申𣈆昭公會齊衛鄭曹莒邾滕薛杞小邾之君盟于平丘魯不得與執季孫意如以歸楚公子比自𣈆歸弒其君于乾溪公子棄疾自蔡入殺比代立是謂平王釋陳蔡二君歸國吳滅州來癸酉楚復諸侯侵地觀從用政甲戌𣈆伐鮮虞楚費無忌為太子建逆婦于秦吳餘昧卒季札逃國人立餘昧子僚乙亥𣈆昭公卒子去疾立是謂頃公楚誘戎蠻子殺之丙子𣈆滅陸渾之戎吳伐楚丁丑周鑄大錢宋衛陳鄭吳楚遷許于白羽戊寅楚用費無忌專政放太子建于城父己卯齊景公與大夫晏嬰入魯問禮宋有華氏之難大夫華亥華定向寧奔陳楚世子建自城父奔宋又適鄭又適𣈆其傅伍奢及其一子死于楚子員奔吳庚辰宋華亥華定向寧入宋南里叛辛巳周景王崩葬景王王室亂三王子爭國國人立猛是謂悼王王子朝殺猛代立𣈆逐朝而入丐是謂敬王宋華亥華定向寧奔楚楚世子建及𣈆師襲鄭不克死其子勝奔吳壬午召氏尹氏入王子朝于成周單子劉子以王出居狄泉楚徙都鄂囊瓦子常為令尹吳伐楚敗陳蔡頓胡沈之師于雞父滅胡沈獲陳夏齧楚建之子勝啓之也癸未楚城郢吳公子光伐楚拔巢及鍾離二女爭桑故也甲申魯有三桓之難昭公奔齊齊景公唁之于野井𣈆趙鞅會宋魯衛曹邾滕薛小邾之人于黃父乙酉𣈆趙鞅會諸侯之師入王于成周召尹二氏之族以王子朝奔楚楚平王卒世子軫繼是謂昭王丙戌𣈆韓趙魏三家大滅公族祁氏羊舌氏分其地楚令尹子常殺費無忌吳季札使𣈆公子光弒其君僚代立是謂闔廬專諸伍員為相丁亥魯昭公自鄆如𣈆次于乾侯楚大夫伯嚭奔吳戊子己丑𣈆頃公卒世子午繼是謂定公吳滅徐以侵楚庚寅𣈆定公使大夫荀礫納魯昭公不克吳伐楚拔舒辛卯𣈆韓不信會齊宋魯衛曹莒薛杞小邾之師城成周魯昭公卒于乾侯三桓立其弟宋是謂定公吳伐越壬辰𣈆人執宋仲幾于京師楚令尹子常敗吳師于豫章癸巳吳敗楚師于豫章經世之酉二千二百一十八甲午周敬王十三年乙未𣈆定公會宋蔡魯衛陳鄭許曹莒邾頓胡滕薛杞小邾之君及齊大夫于召陵以伐楚楚昭王北伐蔡吳師入郢令尹子常奔鄭昭王奔鄖又奔隨使申包胥求救于秦許徙居容城吳王闔廬敗楚師于柏舉五戰及郢遂入其國燒其宫平其墓伍子胥啓之也丙申魯陽虎囚季桓子秦救楚敗吳師于稷楚昭王自鄖復歸于郢封吳夫概于堂溪越乘虛破吳入其國吳王弟夫概自堂溪亡歸代立闔廬逐夫概夫概奔楚丁酉周有儋翩之難王出居姑蕕楚去郢復都鄀鄭滅許戊戌𣈆師入周敬王于成周齊取鄆為陽虎邑己亥魯有陽虎之難攻三桓不克竊寶王大弓走陽關庚子秦哀公卒子惠公繼辛丑魯以孔丘為司寇從定公會齊景公于夾谷齊復魯侵地晏嬰在會壬寅宋公之弟辰及大夫仲他石彄公子地自陳入于蕭以叛鄭子産卒癸卯孔子去魯適衛甲辰魯孔子在衛𣈆六卿相攻乙巳衛世子蒯聵奔宋魯孔子自衛之宋又如陳楚會吳伐陳滅頓吳王闔廬伐越不利死子夫差立以伯嚭為太宰是年於越勾踐敗吳師于槜李稱王于會稽丙午魯定公卒子蔣繼是謂哀公楚滅胡丁未𣈆趙鞅圍范中行氏于朝歌中行走邯鄲楚會陳隨許圍蔡吳敗越于夫椒伏而釋之越王勾踐伐吳不利使大夫文種行成委質以臣妾遂棲于會稽戊申衛靈公卒其孫輒立𣈆趙鞅會陽虎以師入衛世子蒯聵不克居之于戚城魯孔子復過宋楚伐蔡吳徙蔡于州來於越范蠡歸國己酉秦惠公卒子悼公繼魯孔子在陳庚戌魯孔子之蔡辛亥齊伐宋𣈆伐衛齊景公卒子荼繼是謂孺子晋韓趙魏敗范中行氏于邯鄲壬子齊亂田乞弒其君孺子迎公子陽生于魯而立之是謂悼公高昭子死國惠子奔莒魯孔子復至陳楚昭王救陳軍于城父卒于師世子章繼是謂惠王吳伐陳魯伐邾宋伐曹癸丑吳會魯于鄫以伐齊徵百牢于魯甲寅宋滅曹楚令尹子西召平王世子建之子勝于吳以為巢大夫號白公吳伐魯盟于城下而還乙卯宋伐鄭楚伐陳吳伐齊丙辰齊田乞卒子常繼事是謂成子齊亂鮑子弒其君悼公立其子壬是謂簡公田常專國魯孔子自陳復至于衛楚伐陳吳會魯伐齊以救陳殺大夫伍員丁巳孔子自衛返魯子貢使齊及吳越𣈆齊伐魯吳救魯敗齊師于艾陵越伐吳戊午楚白公勝復奔吳子西復召之吳會魯衛之君于橐臯移兵攻𣈆己未𣈆定公及諸侯會吳夫差于黃池越伐吳入其郛執其世子友而還庚申魯西狩獲麟齊田常殺相闞止及弒其君簡公于徐州立其弟驁是謂平公割安平以東自為湯邑孔子于魯請討不克秦悼公卒子厲公繼𣈆伐鄭宋桓魋出奔衛又奔齊楚巢大夫白公勝殺令尹子西逐其君代立辛酉魯使子服景伯使齊子貢為介齊歸魯侵地衛世子蒯聵自戚入是謂莊公輒出奔魯楚葉公以兵入誅白公而迎章復位滅陳而縣之壬戌魯孔子卒癸亥𣈆伐衛莊公出奔國人立公子班師齊伐衛執班師而立公子起越敗吳師于笠澤經世之戌二千二百一十九甲子周敬王四十三年衛石圃逐其君起而迎輒復位起奔齊乙丑周敬王崩太子嗣位是謂元王齊田常卒子盤繼事是謂襄子吳會齊𣈆之師伐楚越伐吳丙寅𣈆定公卒子鑿繼之知伯伐鄭取九邑越人伐吳丁卯越伐吳圍其國戊辰越滅吳破姑蘇殺其王并其大夫北會諸侯于徐州致貢于周太宰范蠡辭祿游五湖殺大夫文種遂兼有吳地己巳庚午辛未周元王崩太子介嗣位是謂貞定王壬申癸酉魯季康子卒三桓作難弒其君哀公立其子寧是謂悼公甲戌乙亥丙子丁丑晋伐鄭戊寅己卯庚辰秦伐大荔辛巳壬午癸未𣈆趙簡子鞅卒子毋恤繼事是謂襄子同智伯韓康子魏桓子滅范中行氏四分其地及逐其君立公孫驕是謂哀公秦取𣈆武城甲申𣈆伐秦復武城乙酉齊平公卒子積繼是謂靈公𣈆智伯及韓魏二家兵攻趙襄子于𣈆陽丙戌𣈆三家兵圍𣈆陽丁亥𣈆韓康子魏桓子復合趙襄子之兵攻智伯滅之于𣈆陽三分其地齊田盤卒子白繼事是謂莊子戊子己丑庚寅辛卯壬辰癸巳經世之亥二千二百二十甲午周貞定王二十三年楚滅蔡乙未秦厲公卒子躁公繼丙申秦伐義渠虜其王以歸楚滅杞東開地至泗上丁酉戊戌己亥周貞定王崩太子去疾嗣位是謂哀王三叔龔殺哀王代立是謂思王庚子周亂少弟嵬殺其王叔代立是謂考王辛丑𣈆哀公卒子柳繼是謂幽公公室止有絳及曲沃壬寅癸卯甲辰乙巳丙午丁未戊申己酉秦躁公卒弟懷公立楚惠王卒子中繼是謂簡王庚戌魯悼公卒子元公繼楚滅莒辛亥壬子癸丑秦庶長黽弒其君懷公立躁公孫是謂靈公甲寅乙卯周考王崩太子午嗣位是謂威烈王河南惠公封其少子于鞏稱東周君丙辰𣈆趙襄子卒兄之子浣繼事是謂獻子治中牟襄子弟桓子逐獻子代立韓康子卒子武子繼事魏桓子卒子斯繼事是謂文侯丁巳趙桓子卒國人殺其子而迎獻子復位戊午秦攻魏少梁己未秦作上下畤庚申辛酉魏文侯殺𣈆幽公立其弟止是謂烈公壬戌癸亥皇極經世卷第五之下
