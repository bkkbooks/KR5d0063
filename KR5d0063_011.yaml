  text: 三川邵堯夫撰以會經運之九觀物篇之二十一經日之甲一經月之午七經星之庚一百八十七經辰之子二千二百三十三甲子十七五鳳乙丑十八丙寅十九丁卯二十戊辰二十一甘露己巳二十二庚午二十三辛未二十四壬申二十五黄龍癸酉漢元帝初元甲戌二乙亥三丙子四丁丑五戊寅六永光己卯七庚辰八辛巳九壬午十癸未十一建昭甲申十二乙酉十三丙戌十四丁亥十五戊子十六竟寧己丑漢成帝建始庚寅二辛卯三壬辰四癸巳五河平經辰之丑二千二百三十四甲午六乙未七丙申八丁酉九陽朔戊戌十己亥十一庚子十二辛丑十三鴻嘉壬寅十四癸卯十五甲辰十六乙巳十七永始丙午十八丁未十九戊申二十己酉二十一元延庚戌二十二辛亥二十三壬子二十四癸丑二十五綏和甲寅二十六乙卯漢哀帝建平丙辰二丁巳三戊午四己未五元壽庚申六辛酉漢平帝元始壬戌二癸亥三經辰之寅二千二百三十五甲子四乙丑五丙寅漢孺子居攝丁卯二戊辰三初始己巳漢王莽稱新室改建國元年庚午二辛未三壬申四癸酉五甲戌六天鳳乙亥七丙子八丁丑九戊寅十己卯十一庚辰十二地皇辛巳十三壬午十四癸未十五劉玄稱更始甲申漢光武帝封蕭王乙酉二稱帝稱建武丙戌三丁亥四戊子五己丑六庚寅七辛卯八壬辰九癸巳十經辰之卯二千二百三十六甲午十一乙未十二丙申十三丁酉十四戊戌十五己亥十六庚子十七辛丑十八壬寅十九癸卯二十甲辰二十一乙巳二十二丙午二十三丁未二十四戊申二十五己酉二十六庚戌二十七辛亥二十八壬子二十九癸丑三十甲寅三十一乙卯三十二丙辰三十三丁巳三十四戊午漢明帝永平己未二庚申三辛酉四壬戌五癸亥六經辰之辰二千二百三十七甲子七乙丑八丙寅九丁卯十戊辰十一己巳十二庚午十三辛未十四壬申十五癸酉十六甲戌十七乙亥十八丙子漢章帝建初丁丑二戊寅三己卯四庚辰五辛巳六壬午七癸未八甲申九元和乙酉十丙戌十一丁亥十二章和戊子十三己丑漢和帝永元庚寅二辛卯三壬辰四癸巳五經辰之巳二千二百三十八甲午六乙未七丙申八丁酉九戊戌十己亥十一庚子十二辛丑十三壬寅十四癸卯十五甲辰十六乙巳十七丙午漢殤帝延平丁未漢安帝永初戊申二己酉三庚戌四辛亥五壬子六癸丑七甲寅八元初乙卯九丙辰十丁巳十一戊午十二己未十三庚申十四永寧辛酉十五建元壬戌十六延光癸亥十七經辰之午二千二百三十九甲子十八乙丑十九丙寅漢順帝永建丁卯二戊辰三己巳四庚午五辛未六壬申七陽嘉癸酉八甲戌九乙亥十丙子十一永和丁丑十二戊寅十三己卯十四庚辰十五辛巳十六壬午十七漢安癸未十八甲申十九乙酉漢冲帝永壽丙戌漢質帝本初丁亥漢桓帝建和戊子二己丑三庚寅四和平辛卯五元嘉壬辰六癸巳七永興經辰之未二千二百四十甲午八乙未九永壽丙申十丁酉十一戊戌十二延熹己亥十三庚子十四辛丑十五壬寅十六癸卯十七甲辰十八乙巳十九丙午二十丁未二十一永康戊申漢靈帝建寧己酉二庚戌三辛亥四壬子五熹平癸丑六甲寅七乙卯八丙辰九丁巳十戊午十一光和己未十二庚申十三辛酉十四壬戌十五癸亥十六經辰之申二千二百四十一甲子十七中平乙丑十八丙寅十九丁卯二十戊辰二十一己巳二十二光庚午漢獻帝初平辛未二壬申三癸酉四甲戌五興平乙亥六丙子七建安丁丑八戊寅九己卯十庚辰十一辛巳十二壬午十三癸未十四甲申十五乙酉十六丙戌十七丁亥十八戊子十九己丑二十庚寅二十一辛卯二十二壬辰二十三癸巳二十四經辰之酉二千二百四十二甲午二十五乙未二十六丙申二十七丁酉二十八戊戌二十九己亥三十庚子魏文帝辛丑二黄初蜀先帝壬寅三二章武吴大帝癸卯四蜀後主建興二黄武甲辰五二三乙巳六三四丙午七四五丁未魏明帝太和五六戊申二六七己酉三七八黄龍庚戌四八九辛亥五九十壬子六十十一嘉禾癸丑七青龍十一十二甲寅八十二十三乙卯九十三十四丙辰十十四十五丁巳十一景初十五十六戊午十二十六延熙十七己未十三十七十八庚申魏帝芳正始十八十九辛酉二十九二十壬戌三二十二十一癸亥四二十一二十二經辰之戌二千二百四十三甲子五二十二二十三乙丑六二十三二十四丙寅七二十四二十五丁卯八二十五二十六戊辰九二十六二十七己巳十嘉平二十七二十八庚午十一二十八二十九辛未十二二十九三十壬申十三三十三十一癸酉十四三十一吴帝亮甲戌魏帝正元三十二二乙亥二三十三三丙子三甘露三十四四太平丁丑四三十五五戊寅五三十六吴帝休永安己卯六三十七二庚辰魏帝奂景元三十八三辛巳二三十九四壬午三四十五癸未四蜀亡六甲申五吴帝皓元興乙酉晋武帝泰始二甘露丙戌二三寶鼎丁亥三四戊子四五己丑五六庚寅六七辛卯七八壬辰八九癸巳九十經辰之亥二千二百四十四甲午十十一乙未十一咸寧十二天册丙申十二十三丁酉十三十四戊戌十四十五己亥十五十六庚子十六吴亡辛丑十七壬寅十八癸卯十九甲辰二十乙巳二十一丙午二十二丁未二十三戊申二十四己酉二十五庚戌二十六辛亥晋惠帝壬子二癸丑三甲寅四乙卯五丙辰六丁巳七戊午八己未九庚申十辛酉十一永寧壬戌十二癸亥十三皇極經世之四以會經運之十觀物篇之二十二經日之甲一經月之午七經星之辛一百八十八經辰之子二千二百四十五甲子十四永安建武永興漢劉淵元熙乙丑十五二丙寅晋懷帝永嘉三後蜀李雄永武丁卯二四二戊辰三五永鳳三己巳四六河瑞四庚午五漢劉聰光興五