front:
  text: 皇極經世卷第五之上詠一
  hash: sha256:a0fb4ca261e77fb053a15be066cd4e14f7abb1b9815ed447e5e424fc88854dca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0063_SJB_013-230150a, image: sjb/23/230150a.png}
body:
  text: 三川邵堯夫撰以運經世之一觀物篇之二十五以運經世之二觀物篇之二十六以運經世之三觀物篇之二十七以運經世之四觀物篇之二十八以運經世之五觀物篇之二十九以運經世之六觀物篇之三十皇極經世卷第五之上以運經世之一觀物篇之二十五經元之甲一經會之巳六經運之癸一百八十經世之子二千一百四十九經世之子二千一百四十九經世之丑二千一百五十經世之寅二千一百五十一經世之卯二千一百五十二經世之辰二千一百五十三經世之巳二千一百五十四經世之午二千一百五十五經世之未二千一百五十六甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰唐帝堯肇位于平陽號陶唐氏命羲和欽若昊天曆象日月星辰敬授人時期三百六旬有六日以閏月定四時成歲曰載建寅月爲始允釐百工庶績咸熙乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之申二千一百五十七甲子唐帝堯二十一年乙丑丙寅丁卯戊辰巳巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之酉二千一百五十八甲午唐帝堯五十一年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子鯀治水績用不成癸丑帝堯求禪明明揚測陋始徵舜登庸歷試諸難釐降二女于潙汭作嬪于虞以觀法焉甲寅乙卯舜言底可績帝以德薦之于天而命之位丙辰正月上日舜受命于文祖用璇璣玉衡以齊七政類于上帝禋于六宗望于山川徧于羣神輯五瑞五玉班于羣后肇十有二州封十有二山四時行巡狩協時月正日同律度量衡修五禮象以典刑流共工于幽州放驩兜于崇山竄三苗于三危殛鯀于羽山四罪正而天下咸服丁巳戊午己未庚申辛酉壬戌癸亥經世之戌二千一百五十九甲子虞帝舜九年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未帝堯殂落甲申乙酉丙戌月正元日舜格于文祖號有虞氏都蒲坂詢四嶽闢四門明四目達四聦咨十有二牧命九官以伯禹爲司空稷司農契司徒臯陶司士垂司工益司虞夷司禮夔典樂龍司言此九人使宅百揆三載考績黜陟幽明庶績其凝丁亥戊子己丑庚寅辛卯壬辰癸巳經世之亥二千一百六十甲午虞帝舜三十九年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰帝舜求代以功薦禹于天而命之位丁巳正月朔旦禹受命于神宗正天下水土分九州九山九川九澤會于四海修其六府咸則三壤成賦中邦戊午己未庚申辛酉壬戌癸亥皇極經世之五以運經世之二觀物篇之二十六經元之甲一經會之午七經運之甲一百八十一經世之子二千一百六十一經世之子二千一百六十一甲子夏王禹八年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉帝舜陟方乃死甲戌禹都安邑徙居陽翟大會諸侯于塗山執玉帛者萬國防風氏後至戮焉乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未夏王禹東巡狩至于會稽崩元子啓踐位甲申啓與有扈戰于甘之野乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰夏王啓崩元子太康踐位癸巳經世之丑二千一百六十二甲午夏王太康二年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉夏王太康失邦盤遊無度畋于有洛之表十旬不返有窮后羿因民不忍距于河而死子仲康立壬戌命胤侯征羲氏和氏癸亥經世之寅二千一百六十三甲子夏王仲康三年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌夏王仲康崩子相繼立依同姓諸侯斟灌斟鄩氏乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之卯二千一百六十四甲午夏王相二十二年乙未丙申丁酉戊戌己亥庚子辛丑壬寅寒浞殺有窮后羿使子澆及豷伐斟灌斟鄩氏以滅相相之臣靡逃于有鬲氏相之后還于有仍氏遂生少康癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之辰二千一百六十五甲子夏王少康生二十三年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未夏之遺臣靡自有鬲氏收斟灌斟鄩二國之燼以滅寒浞而立少康少康立遂滅澆于過滅豷于戈以絶有窮氏之族甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之巳二千一百六十六甲午夏王少康立十三年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯夏王少康崩子杼踐位甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申夏王杼崩子槐踐位辛酉壬戌癸亥經世之午二千一百六十七甲子夏王槐四年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌夏王槐崩子芒踐位丁亥戊子己丑庚寅辛卯壬辰癸巳經世之未二千一百六十八甲午夏王芒八年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰夏王芒崩子泄踐位乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申夏王泄崩子不降踐位辛酉壬戌癸亥經世之申二千一百六十九甲子夏王不降四年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之酉二千一百七十甲午夏王不降三十四年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未夏王不降崩弟扃立庚申辛酉壬戌癸亥經世之戌二千一百七十一甲子夏王扃五年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰夏王扃崩子廑踐位辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之亥二千一百七十二甲午夏王廑十四年乙未丙申丁酉戊戌己亥庚子辛丑夏王廑崩不降子孔甲立壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥皇極經世之五以運經世之三觀物篇之二十七經元之甲一經會之午七經運之乙一百八十二經世之子二千一百七十三經世之子二千一百七十三甲子夏王孔甲二十三年乙丑丙寅丁卯戊辰己巳庚午辛未壬申夏王孔甲崩子皋踐位癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未夏王皋崩子發踐位甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之丑二千一百七十四甲午夏王發十一年乙未丙申丁酉戊戌己亥庚子辛丑壬寅夏王發崩子癸踐位是謂之桀癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之寅二千一百七十五甲子夏王癸二十二年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥始嬖姝喜丙子丁丑成湯即諸侯位自商丘徙治亳始用伊尹戊寅成湯征葛己卯成湯荐伊尹于夏王庚辰辛巳壬午伊尹醜夏復歸于亳癸未甲申桀囚成湯于夏臺乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之卯二千一百七十六甲午乙未伊尹相成湯伐桀升自陑遂與桀戰于鳴條之野桀敗走三𦡙遂伐三𦡙俘厥寶玉放桀于南巢還至大垌仲虺作誥歸至亳乃大誥萬方南面朝諸侯建國曰商以丑月爲歲始曰祀與民更始丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未商王成湯崩元子太甲踐位不明伊尹放之桐宫戊申己酉庚戌商王太甲思庸伊尹乃冕服奉嗣王于亳返政辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之辰二千一百七十七甲子商王太甲十七年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰商王太甲崩子沃丁踐位辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之巳二千一百七十八甲午商王沃丁十四年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉商王沃丁崩弟太庚立庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之午二千一百七十九甲子商王太庚十五年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌商王太庚崩子小甲踐位乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯商王小甲崩弟雍巳立壬辰癸巳經世之未二千一百八十甲午商王雍巳三年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯商王雍己崩弟太戊立是謂中宗伊陟臣扈格于上帝巫咸又王家大修成湯之政甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之申二千一百八十一甲子商王太戊二十一年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之酉二千一百八十二甲午商王太戊五十一年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午商王中宗崩子仲丁踐位遷于囂己未庚申辛酉壬戌癸亥經世之戌二千一百八十三甲子商王仲丁六年乙丑丙寅丁卯戊辰己巳庚午辛未商王仲丁崩國亂弟外壬立壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌商王外壬崩國復亂弟河亶甲之徙居相丁亥戊子己丑庚寅辛卯壬辰癸巳經世之亥二千一百八十四甲午商王河亶甲八年乙未商王河亶甲崩子祖乙踐位圯于耿徙居邢巫賢爲相丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅商王祖乙崩子祖辛踐位乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥皇極經世卷第五之上
