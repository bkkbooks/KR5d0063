body:
  text: 三川邵堯夫撰觀物外篇天數五地數五合而爲十數之全也天以一而變四地以一而變四四者有體也而其一者無體也是謂有無之極也天之體數四而用者三不用者一也地之體數四而用者三不用者一也是故無體之一以况自然也不用之一以况道也用之者三以况天地人也體者八變用者六變是以八卦之象不易者四反易者二以六卦變而成八也重卦之象不易者八反易者二十八以三十六變而成六十四也故爻止于六卦盡于八策窮于三十六而重卦極于六十四也卦成于八重于六十四爻成于六策窮于三十六而重于三百八十四也天有四時一時四月一月四十日四四十六而各去其一是以一時三月一月三十日也四時體數也三月三十日用數也體雖具四而其一常不用也故用者止于三而極于九也體數常偶故有四有十二用數常奇故有三有九大數不足而小數常盈者何也以其大者不可見而小者可見也故時止乎四月止乎三而日盈乎十也是以人之交體有四而指有十也天見乎南而潛乎北極于六而餘于七是以人知其前昧其後而略其左右也天體數四而用三地體數四而用三天尅地地尅天而尅者在地猶晝之餘分在夜也是以天三而地四天有三辰地有四行也然地之大且見且隱其餘分之謂邪天有二正地有二正而共用二變以成八卦也天有四正地有四正共用二十八變以成六十四卦也是以小成之卦正者四變者二共六卦也大成之卦正者八變者二十八共三十六卦也乾坤離坎爲三十六卦之祖也兊震巽艮爲二十八卦之祖也乾七子兊六子離五子震四子巽三子坎二子艮一子坤全陰故無子乾七子坤六子兊五子艮四子离三子坎二子震一子巽剛故無子乾坤七變是以晝夜之極不過七分也兊艮六變是以月止于六共爲十二也离坎五變是以日止于五共爲十也震巽四變是以體止于四共爲八也卦之正變共三十六而爻又有二百一十六則用數之策也三十六去四則三十二也又去四則二十八也又去四則二十四也故卦數三十二位去四而言之也天數二十八位去八而言之也地數二十四位去十二而言之也四者乾坤离坎也八者并頤孚大小過也十二者兊震泰旣濟也日有八位而用止于七去乾而言之也月有八位用止于六去兊而言之也星有八位用止于五去離而言之也辰有八位用止于四去震而言之也日有八位而數止于七去泰而言之也月自兊起者月不能及日之數也故十二月常餘十二日也陽無十故不足于後陰無一故不足于首乾陽中陽不可變故一年止舉十二月也震陰中陽不可變故一日之十二時不可見也兊陽中陰离陰中陽皆可變故日月之數可分也是陰數以十二起陽數以三十起常存二六也舉年見月舉月見日舉日見時陽統陰也是天四變含地四變日之變含月與星辰之變也是以一卦含四卦也日一位月一位星一位辰一位日有四位月有四位星有四位辰有四位四四有十六位此一變而日月之數窮矣天有四變地有四變變有長也有消也十有六變而天地之數窮矣日起於一月起於二星起於三辰起於四引而伸之陽數常六陰數常二而大小之運窮三百六十變爲十二萬九千六百十二萬九千六百變爲一百六十七億九千六百一十六萬一百六十七億九千六百一十六萬變爲二萬八千二百一十一兆九百九十萬七千四百五十六億以三百六十爲時以一十二萬九千六百爲日以一百六十七億九千六百分而爲三十以當一年十二月之數而進退六日矣三百六十以當一時之數隨小運之進退以當晝夜之時也十六變之數去其交數取其用數得二萬八千二百一十一兆九百九十一萬七千四百五十六億二萬八千二百一十一兆九百九十一萬七千四百五十六億分而爲十二限前六限爲長後六限爲消每限得三十億九千九百六十八萬之一百六十七億九千六百一十六萬每一百六十七億九千六百一十六萬衍開一分進六十日也六限開六分進三百六十日也猶有餘分之一故開七分進三百六十六日也其退亦若是矣十二萬九千六百去其三者交數也取其七者用數也用數三而成于六加餘分故有七也七之得九萬七百二十年半之得四萬五千三百六十年以進六日也日有晝夜數有朓朒以成十有二日也每三千六百年進一日凡四萬三千二百年進十有二日也餘二千一百六十年以進餘分之六合交數之二千一百六十年共進十有二分以爲閏也故小運之變凡六十而成三百六十有六日也乾爲一乾之五爻分而爲大有以當三百六十之數也乾之四爻分而爲小畜以當十二萬九千六百之數也乾之三爻分而爲履以當一百六十七億九千六百一十六萬之數也乾之二爻分而爲同人以當二萬八千二百一十一兆九百九十萬七千四百五十六億之數也乾之六爻分而爲姤以當是謂分數也分大爲小皆自上而六故以陽數當之如一分爲十二十一分爲三百六十也天統乎體故八變而終于十六地分乎用故六變而終于十二天起於一而終于地起於十二而終于二百四秭六千九百八十萬七千三百八十一垓五千四百九十一萬八千四百九十九兆七百二十萬億也一生二爲夬當十二之數也二生四爲大壯當四千三百二十之數也四生八爲泰當五億五千九百八十七萬二千之數也八生十六爲臨當九百四十四兆三千六百九十九萬六千九百一十五億二千萬之數也十六生三十二爲復當之數也三十二生六十四爲坤當無極之數也是謂長數也長小爲大皆自下而上故以陰數當之有地然後有二有二然后有晝夜二三以變錯綜而成故易以二而生數以十二而變而一非數也非數而數以之成也天行不息未嘗有晝夜人居地上以爲晝夜故以地上之數爲人之用也天自臨以上地自師以上運數也天自同人以下地自遁以下年數也運數則在天者也年數則在地者也天自賁以上地自艮以上用數也天自明夷以下地自否以下交數也天自震以上地自𣈆以上有數也天自益以下地自豫以下無數也天之有數起乾而止震餘入于無者天辰不見也地去一而起十二者地火常潜也故天以體爲基而常隱其基地以用爲本而常藏其用也一時止于三月一月止于三十日皆去其辰數也是以八八之卦六十四而不變者八可變者七七八五十六其義亦由此矣陽爻晝數也陰爻夜數也天地相銜陰陽相交故晝夜相離剛柔相錯春夏陽也故晝數多夜數少秋冬陰也故晝數少夜數多體數之策三百八十四去乾坤離坎之策爲用數三百六十體數之用二百七十去乾與离坎之策爲用數之用二百五十二也體數之用二百七十其一百五十六爲陽一百一十四爲陰去离之策得一百五十二陽一百一十二陰爲實用之數也蓋陽去离而用乾陰去坤而用坎也是以天之陽策一百一十二去其陰也地之陰策一百一十二陽策四十去其南北之陽也極南大暑極北大寒物不能生是以去之也其四十爲天之餘分邪陽侵陰晝侵夜是以在地也合之爲一百五十二陽一百一十二陰也陽去乾之策陰去坎之策得一百四十四陽一百八陰爲用數之用也陽三十六三之爲一百八陰三十六三之爲一百八三陽三陰陰陽各半也陽有餘分之一爲三十六合之爲一百四十四陽一百八陰也故體數之用二百七十而實用者二百六十四用數之用二百五十二也卦有六十四而用止乎三十六爻有三百八十四而用止于二百一十有六也六十四分而爲二百五十六是以一卦去其初上之爻亦二百五十六也此生物之數也故离坎爲生物之主以离四陽坎四陰故生物者必四也陽一百一十二陰一百一十二去其离坎之爻則二百一十六也陰陽之四十共爲二百五十六也是以八卦用六爻乾坤主之也六爻用四位离坎主之也故天之昏曉不生物而日中生物地之南北不生物而中央生物也體數何爲者也生物者也用數何爲者也運行者也運行者天也生物者地也天以獨運故以用數自相乘而以用數之用爲生物之時也地耦而生故以體數之用陽乘陰爲生物之數也天數三故六六而又六之是以乾之策二百一十六也數兩故十二而十二之是以坤之策百四十有四也乾用九故三其八爲二十四而九之亦二百一十有六兩其八爲十六而九之亦百四十有四也坤用六故三其十二爲三十六而六之亦二百一十有六也兩其十二爲二十四而六之亦百四十有四也坤以十二之二十六之四六之一與半爲乾之餘分則乾得二百五十二坤得一百八也陽四卦十二爻八陽四陰以三十六乘其陽以二十四乘其陰則三百八十四也卦之反對皆六陽六陰也在易則六陽六陰者十有二對也去四止者八陽四陰八陰四陽者各六對也十陽二陰十陰二陽者各三對也體有三百八十四而用止于三百六十何也以乾坤离坎之不用也乾坤离坎之不用何也乾坤离坎之不用所以成三百六十之用也故萬物變易而四者不變也夫惟不變是以能變也用止于三百六十而有三百六十六何也數之嬴也數之嬴則何用也乾之全用也乾坤不用則离坎用半也乾全用者何也陽主嬴也乾坤不用者何也獨陽不生寡陰不成也离坎用半何也离東坎西當陰陽之半爲春秋晝夜之門也或用乾或用离坎何也主嬴而言之故用乾也主嬴分而言之則陽侵陰晝侵夜故用离坎也乾主嬴故全用也陰主虛故坤全不用也陽侵陰陰侵陽故离坎用半也是以天之南全見而北全不見東西各半見也离坎陰陽之限也故离當寅坎當申而數常踰之者蓋陰陽之溢也然用數不過乎寅交數不過乎申或离當卯坎當酉乾四十八而四分之一分爲陰所尅坤四十八而四分之一分爲所尅之陽也故乾得三十六而坤得十二也陽主進是以進之爲三百六十日陰主消是以十二月消十二日也順數之乾一兊二离三震四巽五坎六艮七坤八逆數之震一离兌二乾三巽四坎艮五坤六也乾四十八兌三十离二十四震十坤十二艮二十坎三十六巽四十乾三十六坤十二离兊巽二十八坎艮震二十兊离上正更思之圓數有一方數有二奇偶之義也六即一也十二即二也天圓而地方圓者數之起一而積六方者數之起一而積八變之則起四而積十二也六者常以六變八者常以八變而十二者亦以八變自然之道也八者天地之體也六者天之用也十二者地之用也天變方爲圓而常存其一地分一爲四而常執其方天變其體而不變其用也地變其用而不變其體也六者并其一而爲七十二者并其四而爲十六也陽主進故天并其一而爲七陰主退故地去其四而止於十二也是陽常存一而陰常晦一也故天地之體止於八而天之用極于七地之用止于十二也圓者刓方以爲用故一變四四去其一則三也三變九九去其三則六也方者引圓以爲體故一變三並之四也四變十二并之十六也故用數成於三而極於六體數成於四而極于十六也是以圓者徑一而圍三起一而積六方者分一而爲四分四而爲十六皆自然之道也一役二以生三三去其一則二也三生九九去其一則八也去其三則六也故一役三三復役二也三役九九復役八與六也是以二生四八生十六六生十二也三并一則爲四九并三則爲十二十二又并四則爲十六故四以一爲本三爲用十二以三爲本九爲用十六以四爲本十二爲用更思之陽尊而神尊故役物神故蔵用是以道生天地萬物而不自見也天地萬物亦取法乎道矣陽者道之用陰者道之體陽用陰陰用陽以陽爲用則尊陰以陰爲用則尊陽也陰幾於道故以况道也六變而三十六矣八變而成六十四矣十二變而成三百八十四矣六六而變之八八六十四變而成三百八十四矣八八而變之七七四十九變而成三百八十四矣圓者六變六六而進之故六十變而三百六十矣方者八變故八八而成六十四矣陽主進是以進之爲六十也圓者星也曆紀之數其肇於此乎方者土也畫州井地之法其倣於此乎蓋圓者河圖之數方者洛書之文故犧文因之而造易禹箕叙之而作範也蓍數不以六而以七何也并其餘分也去其餘分則六故策數三十六也是以五十者六十四閏歲之策也其用四十有九六十四卦一歲之策也歸奇卦一猶一歲之閏也卦直去四者何也天變而地效之是以蓍去一則卦去四也圓者徑一圍三重之則六方者徑一圍四重之則八也裁方而爲圓天之所以運行分大而爲小地所生化故天用六變地用四變也一八爲九裁爲七八裁爲六十六裁爲十二二十四裁爲十八三十二裁爲二十四四十裁爲三十四十八裁爲三十六五十六裁爲四十二六十四裁爲四十八也一分爲四八分爲三十二十六分爲六十四以至九十六分爲三百八十四也一生六六生十二十二生十八十八生二十四二十四生三十三十生三十六引而伸之六十變而生三百六十矣此運行之數也四生十二十二生二十二十生二十八二十八生三十六此生物之數也故乾之陽策三十六兌离巽之陽策二十八震坎艮之陽策二十坤之陽策十二也圓者一變則生六去一則五也二變則生十二去二則十也三變則生十八去三則十五也四變則二十四去四則二十也五變則三十去五則二十五也六變則三十六去六則三十也是以存之則六六去之則五五也五則四而存一也四則三而存一也二則一而存一也故一生二去一則一也二生三去一則二也三生四去一則三也四生五去一則四也是故二以一爲本三以二爲本四以三爲本五以四爲本六以五爲本也更思之方者一變而爲四四生八并四而爲十二八生十二并八而爲二十十二生十六并十二而爲二十八十六生二十并十六而爲三十六也一生三并而爲四也十二生二十并而爲三十二也二十八生三十六并而爲六十四也更思之易之大衍何數也聖人之倚數也天數二十五合之爲五十地數三十合之爲六十故曰五位相得而各有合也五十者蓍之數也六十者卦數也五者蓍之小衍也數五十爲大衍也八者卦之小成也六十四爲大成也蓍德圓以况天之數故七七四十九也五十者存一而言之也卦德方以况地之數故八八六十四也六十者去四而言之也蓍者用數也卦者體數也用以體爲基故存一也體以用爲本故去四也圓者本一方者本四故蓍存一而卦去四也蓍之用數七若其餘分亦存一之義也掛其一亦去一之義也蓍之用數掛一以象三其餘四十八則一卦之策也四其十二爲四十八也十二去三而用九四八三十二所去之策也四九三十六所用之策也以當乾之三十六陽爻也十二去五而用七四五二十所去之策也四七二十八所用之策也以當兌离之二十八陽爻也十二去六而用六四六二十四所去之策也四六二十四所用之策也以當坤之半二十四陰爻也十二去四而用八四四十六所去之策也四八三十二所用之策也以當艮坎之二十四爻并上卦之八陰爲三十四爻也是故七九爲陽六八爲陰也九者陽之極數六者陰之極數數極則反故爲卦之變也震巽無策者以當不用之數天以剛爲德故柔者不見地以柔爲體故剛者不生是震巽不用也乾用九故其策九也四之者以應四時一時九十日也坤用六故其策亦六也奇數四有一有二有三有四也策數四有六有七有八有九合而爲八數以應方數之八變也歸奇合卦之數有六謂五與四四也九與八八也五與四八也九與四八也五與八八也九與四四也以應圓數之六變也奇數極於四而五不用策數極于九而十不用五則一也十則二也故去五十而用四十九也奇不用五策不用十有無之極也以况自然之數也卦有六十四而用止六十者何也六十卦者三百六十爻也故甲子止于六十也六甲而天道窮矣是以策數應之三十六與二十四合之則六十也三十二與二十八合之亦六十也乾四十八坤十二震二十巽四十离兊三十二坎艮二十八合之爲六十蓍數全故陽策也三十六與二十八合之爲六十四也卦數去其四故陰策二十四與三十二合之爲五十六也九進之爲三十六皆陽數也故爲陽中之陽七進之爲二十八先陽而後陰也故爲陽中之陰六進之爲二十四皆陰數也故爲陰中之陰八進之爲三十二先陰而後陽也故爲陰中之陽蓍四進之則百卦四進之則百二十百則十也百二十則十二也歸奇合卦之數得五與四四則策數四九也得九與八則策數四六也得五與八八得九與四八則策數皆四七也得九與四四得五與四八則策數皆四八也爲九者一變以應乾也爲六者一變以應坤也爲七者二變以應兊與离也爲八者二變以應艮與坎也五與四四去卦一之數則四八三十二也九與八八去卦一之數則四六二十四也五與八八九與四八去卦一之數則四五二十也九與四四五與四八去卦一之數則四四十六也故去其三四五六之數以成九八七六之策也天一地二天三地四天五地六天七地八天九地十參伍以變錯綜其數也如天地之相銜晝夜之相交也一者數之始而非數也故二二爲四三三爲九四四爲十六五五爲二十五六六爲三十六七七爲四十九八八爲六十四九九爲八十一而一不可變也百則十也十則一也亦不可變也是故數去其一而極于九皆用其變者也五五二十五天數也六六三十六乾之策數也七七四十九大衍之用數也八八六十四卦數也九九八十一玄範之數也大衍之數其算法之源乎是以算數之起不過乎方圓曲直也陰無一陽無十乘數生數也除數消數也算法雖多不出乎此矣陽得陰而生陰得陽而成故蓍數四而九卦數四而十也猶榦支之相錯榦以六終而支以五終也三四十二也二六亦十二也二其十二二十四也三八亦二十四也四六亦二十四也三其十二三十六也四九亦三十六也六六亦三十六也四其十二四十八也三其十六亦四十八也六八亦四十八也五其十二六十也三其二十亦六十也六其十亦六十也之相符也四九三十六也六六三十六也陽六而又兼陰六之半是以九也故六者言之陰陽各三也以三爻言之天地人各三也陰陽之中各有天地人天地人之中各有陰陽故參天兩地而倚數也太極旣分兩儀立矣陽下交於陰陰上交於陽四象生矣陽交於陰陰交於陽而生天之四象剛交於柔柔交於剛而生地之四象於是八卦成矣八卦相錯然後萬物生焉是故一分爲二二分爲四四分爲八八分爲十六十六分爲三十二三十二分爲六十四故曰分陰分陽迭用柔剛易六位而成章也十分爲百百爲分千千分爲萬猶根之有榦榦之有枝枝之有葉愈大則愈少愈細則愈繁合之斯爲一衍之斯爲萬是故乾以分之坤以翕之震以長之巽以消之長則分分則消消則翕也乾坤定位也震巽一交也兊离坎艮再交也故震陽少而陰尚多也巽陰少而陽尚多也兊离陽浸多也坎艮陰浸多也是以辰與火不見也一氣分而陰陽判得陽之多者爲天得陰之多者爲地是故陰陽半而形質具焉陰陽偏而性情分焉形質各分則多陽者爲剛也多陰者爲柔也性情又分則多陽者陽之極也多陰者陰之極也兊离巽得陽之多者也艮坎震得陰之多者也以爲天地用也乾陽極坤陰極是以不用也乾四分取一以與坤坤四分取一以奉乾乾坤合而生六子三男皆陽也三女皆陰也兌分一陽以與艮坎分一陰以奉离震巽以二相易合而言之陰陽各半是以水火相生而相尅然後旣成萬物也乾坤之名位不可易也坎离名可易而位不可易也震巽位可易而名不可易也兊艮名與位皆可易也离肖乾坎肖坤中孚肖乾頤肖离小過肖坤大過肖坎是以乾坤离坎中孚頤大過小過皆不可易者也离在天而當夜故陽中有陰也坎在地而當晝故陰中有陽也震始交陰而陽生巽始消陽而陰生兊陽長也艮陰長也震兊在天之陰也巽艮在地之陽也故震兊上陰而下陽巽艮上陽而下陰天以始生言之故陰上而陽下交泰之義也地以既成言之故陽上而陰下尊卑之位也乾坤定上下之位离坎列左右之門天地之所闔闢日月之所出入是以春夏秋冬晦朔弦望晝夜長短行度盈縮莫不由乎此矣無極之前陰含陽也有象之後陽分陰也陰爲陽之母陽爲陰之父故母孕長男而爲復父生長女而爲姤是以陽起於復而陰起於姤也性非體不成體非性不生陽以陰爲體陰以陽爲性動者性也靜者體也在天則陽動而陰靜在地則陽靜而陰動性得體而靜體隨性而動是以陽舒而陰疾也更詳之陽不能獨立必得陰而後立故陽以陰爲基陰不能自見必待陽而後見故陰以陽爲唱陽知其始而享其成陰效其法而終其勞陽能知而陰不能知陽能見而陰不能見也能知能見者爲有故陽性有而陰性無也陽有所不徧而陰無所不徧也陽有去陰常居也無不徧而常居者爲實故陽體虛而陰體實也自下而上謂之升自上而下謂之降升者生也降者消也故陽生於下而陰生於上是以萬物皆反生陰生陽陽生陰陰復生陽陽復生陰是以循環而無窮也天地之本其起於中乎是以乾坤屢變而不離乎中人居天地之中心居人之中日中則盛月中則盈故君子貴中也本一氣也生則爲陽消則爲陰故二者一而已矣六者三而已矣八者四而已矣是以言天而不言地言君而不言臣言父而不言子言夫而不言婦也然天得地而萬物生君得臣而萬化行父得子夫得婦而家道成故有一則有二有二則有四有三則有六有四則有八陰陽生而分二儀二儀交而生四象四象交而成八卦八卦交而生萬物故二儀生天地之類四象定天地之體四象生八卦之類八卦定日月之體八卦生萬物之類重卦定萬物之體類者生之序也體者象之交也推類者必本乎生觀體者必由乎象生則未來而逆推象則旣成而順觀是故日月一類物同出而異處也異處而同象也推此以往物奚逃哉天變時而地應物時則陰變而陽應物則陽變而陰應故時可逆知物必順成是以陽迎而陰隨陰逆而陽順語其體則天分而爲地地分而爲萬物而道不可分也其終則萬物歸地地歸天天歸道是以君子貴道也有變則必有應也故變于内者應于外變于外者應于内變于下者應于上變于上者應于下也天變而日應之故變者從天而應者法日也是以日紀乎星月會於辰水生於土火潜於石飛者棲木走者依草心肺之相聯肝膽之相屬無它應變之道也本乎天者親上本乎地者親下故變之與應常反對也陽交於陰而生蹄角之類也剛交於柔而生根荄之類也陰交於陽而生羽翼之類也柔交於剛而生枝榦之類也天交於地地交於天故有羽而走者足而騰者草中有木木中有草也各以類而推之則生物之類不逃數矣走者便於下飛者利於上從其類也陸中之物水中必具者猶影象也陸多走水多飛者交也是故巨于陸者必細于水巨于水者必細于陸也虎豹之毛猶草也鷹鸇之羽猶木也木者星之子是以果實象之葉陰也華實陽也枝葉耎而根榦堅也人之骨巨而體繁木之榦巨而葉繁應天地之數也動者體横植者體縱人宜横而反縱也飛者有翅走者有趾人之兩手翅也兩足趾也飛者食木走者食草人皆兼之而又食飛走也故最貴於萬物也體必交而後生故陽與剛交而生心肺陽與柔交而生肝膽柔與陰交而生腎與膀胱剛與陰交而生脾胃心生目膽生耳脾生鼻腎生口肺生骨肝生肉胃生髓膀胱生血故乾爲心兊爲脾离爲膽震爲腎坤爲血艮爲肉坎爲髓巽爲骨泰爲目中孚爲鼻旣濟爲耳頤爲口大過爲肺未濟爲胃小過爲肝否爲膀胱天地有八象人有十六象何也合天地而生人合父母而生子故有十六象也心居肺膽居肝何也言性者必歸之天言體者必歸之地地中有天石中有火是以心膽象之也心膽之倒懸何也草木者地之本體也人與草木反生是以倒懸也口目横而鼻縱何也體必交也故動者冝縱而反横植者冝横而反縱皆交也天有四時地有四方人有四支是以指節可以觀天掌文可以察地天地之理具乎指掌矣可不貴之哉神統於心氣統於腎形統於首形氣交而神主乎其中三才之道也人之四攴各有脉也一脉三部一部三候以應天數也心藏神腎藏精脾藏魂膽藏魄胃受物而化之傳氣於肺傳血於肝而傳水穀於脬腸矣天圓而地方天南高而北下是以望之如倚蓋焉地東南下西北高是以東南多水西北多山也天覆地地載天天地相函故天上有地地上有天天渾渾於上而不可測也故觀斗數以占天也斗之所建天之行也魁建子杓建寅星以寅爲晝也斗有七星是以晝不過乎七分也更詳之天行所以爲晝夜日行所以爲寒暑夏淺冬深天地之交也左旋右行天日之交也日朝在東夕在西隨天之行也夏在北冬在南隨天之交也天一周而超一星應日之行也春酉正夏午正秋卯正冬子正應日之交也日以遲爲進月以疾爲退日月一會而加半日减半日是以爲閏餘也日一大運而進六日月一大運而退六日是以爲閏差也日行陽度則盈行陰度則縮賔主之道也月去日則明盈而遲近日則生而疾君臣之義也陽消則生陰故日下而月西出也陰盛則敵陽故日望而月東出也天爲父日爲子故天左旋日右行日爲夫月爲婦故日東出月西生也日月相食數之交也日望月則月食月掩日則日食猶木火之相尅也是以君子用智小人用力日隨天而轉月隨日而行星隨月而見故星法月月法日日法天天半明半晦日半盈半縮月半盈半虧星半動半靜陰陽之變化天晝夜常見日見於晝月見於夜而半不見星半見於夜貴賤之等也月晝可見也故爲陽中之陰星夜可見也故爲陰中之陽天奇而地耦是以占天文者觀星而已察地理者觀山水而已觀星而天體見矣觀山水而地體見矣天體容物地體負物是故體幾於道也極南大暑極北大寒故南融而北結萬物之死地也夏則日隨斗而北冬則日隨斗而南故天地交而寒暑和寒暑和而物乃生也天以剛爲德故柔者不見地以柔爲體故剛者不生是以震巽天之陽也地陰也有陽而陰效之故至陰者辰也至陽者日也皆在乎天而地則水火而已是以地上皆有質之物陰伏陽而形質生陽伏陰而性情生是以陽生陰陰生陽陽剋陰陰尅陽陽之不可伏者不見於地陰之不可尅者不見於天伏陽之少者其體必柔是以畏陽而爲陽所用伏陽之多者其體必剛是以禦陽而爲陰所用故水火動而隨陽土石靜而隨陰也陽生陰故水先成陰生陽故火後成陰陽相生也體性相須也是以陽去則陰竭陰盡則陽滅金火相守則流火木相得則然從其類也水遇寒則結遇火則竭從其所勝也陽得陰而爲雨陰得陽而爲風剛得柔而爲雲柔得剛而爲雷無陰則不能爲雨無陽則不能爲雷雨柔也而屬陰陰不能獨立故待陽而後興雷剛也屬體體不能自用必待陽而後發也有意必有言有言必有象有象必有數數立則象生象生則言用言用則意顯象數則筌蹄也言意則魚兔也得魚兔而忘筌蹄則可也以筌蹄而求魚兔則未見其得也天變而人效之故元亨利貞易之變也人行而天應之故吉凶悔吝易之應也以元亨爲變則利貞爲應以吉凶爲應則悔吝爲變元則吉吉則利應之亨則凶凶則應之以貞悔則吉吝則凶是以變中有應應中有變也變中之應天道也故元爲變則亨應之利爲變則應之以貞應中之變人事也故變則凶應則吉變則吝應則悔也悔者吉之兆也吝者凶之本是以君子從天不從人元者春也仁也春者時之始仁者德之長時則未盛而德足以長人故言德而不言時亨者夏也禮也夏者時之盛禮者德之文盛則必衰而文不足救之故言時而不言德故曰大哉乾元而上之有悔也利者秋也義也秋者時之成義者德之方萬物方成而獲利義者不通於利故言時而不言德也貞者冬也智也冬者時之末智者德之衰貞則吉不貞則凶故言德而不言時也故曰利貞者性情也至哉文王之作易也其得天地之用乎故乾坤交而爲泰坎离交而爲旣濟也乾生於子坤生於午坎終於寅离終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎离得位兊艮爲耦以應地之方也王者之法其盡於是矣乾坤天地之本离坎天地之用是以易始於乾坤中於离坎終於旣未濟而泰否爲上經之中咸恒爲下經之首皆言乎其用也坤統三女於西南乾統三男於東北上經起於三下經終於四皆交泰之義也故易者用也乾用九坤用六大衍用四十九而潜龍勿用也大哉用乎吾於此見聖人之心矣道生天天生地及其功成而身退故子繼父禪是以乾退一位也乾坤交而爲泰變而爲雜卦也乾坤坎离爲上篇之用兊艮震巽爲下篇之用也頤中孚大過小過爲三篇之正也易者一陰一陽之謂也震兊始交者也故當朝夕之位离坎交之極也故當子午之位巽艮雖不交而陰陽猶雜也故當用中之偏位乾坤純陰陽也故當不用之位乾坤縱而六子横易之本也震兊横而六卦縱易之用也象起於形數起於質名起於言意起於用天下之數出於理違乎理則入於術世人以數而入術故失於理也天下之事皆以道致之則休戚不能至矣天之陽在南而陰在北地之陰在南而陽在北人之陽在上而陰在下旣交則陽下而陰上天以理盡而不可以形盡渾天之術以形盡天可乎辰數十二日月交會謂之辰辰天之體也天之體無物之氣也精義入神以致用也不精義則不能入神不能入神則不能致用也爲治之道必通其變不可以膠柱猶春之時不可行冬之令也陽數一衍之爲十十干之類是也陰數二衍之爲十二十二攴十二月之類是也元亨利貞之德各包吉凶悔吝之事雖行乎德若違于時亦或凶矣初與上同然上亦不及初之進也二與五同然二之陰中不及五之陽中也三與四同然三處下卦之上不若四之近五也天之陽在南故日處之地之剛在北故山處之所以地高西北天高東南也天之神棲於日人之神棲乎目人之神寤則棲心寐則棲腎所以象天元晝夜之道也雲行雨施電激雷震亦是從其類也吹噴吁呵風雨雲霧皆當相須也萬物各有太極兩儀四象八卦之次亦有古今之象雲有水火土石之具化類亦然二至相去東西之度凡一百八十南北之度凡六十冬至之月所行如夏至之日夏至之月所行如冬至之日四正者乾坤坎离也觀其象無反覆之變所以爲正也木之攴榦土石之所成所以不易葉花水火之所成故變而易也自然而然者天也唯聖人能索之效法者人也若時行時止雖人也亦天生者性天也成者形地也日入地中構精之象也體四而變六兼神與氣也氣變必六故三百六十也凡事爲之極幾十之十則可止矣若夏至之日止于六十兼之以晨昏分之庶幾乎十之七也東赤南白西黄北黑此五色也驗之于曉午暮夜之時可見之矣圖雖無文吾終日言而未尝離乎是蓋天地萬物之理盡在其中矣冬至之子中陰之極春分之卯中陽之中夏至之午中陽之極秋分之酉中陰之中凡三百六十中分之則一百八十此春秋二分相去之數也燈之明暗之境日月之象也月者日之影也情者性之影也心性而膽情性神而情鬼水者火之地火者水之氣黑者白之地寒者暑之地心爲太極又曰道爲太極形可分神不可分草伏之獸毛如草之叢林棲之鳥羽如林之葉類使之然也陰事太半蓋陽一而陰二也冬至之後爲呼夏至之後爲吸此天地一歲之呼吸也皇極經世卷第十二之上
