隴右癸巳隗囂死子純立來歙馮異伐蜀入天水經世之卯二千二百三十六甲午漢光武皇帝十年西征滅隗純于隴右乙未西征蜀至于南陽吴漢岑彭大破蜀軍于荆門丙申吴漢拔成都誅公孫述及將田戎岑延丁酉盧芳自五原亡入匈奴戊戌天下平己亥大司徒歐陽歙下獄死庚子交阯女徵側叛青徐幽冀盜起辛丑南巡廢皇后郭氏爲中山太后册貴人陰氏爲皇后壬寅西巡史歆以成都叛吴漢復平之馬援伐交阯幸長安癸卯南巡馬援平交阯封新息侯廢皇太子彊爲東海王以東海王莊爲皇太子甲辰大司徒戴涉下獄死乙巳丙午丁未戊申己酉馬援破武陵蠻庚戌作壽陵辛亥壬子癸丑甲寅東巡狩乙卯丙辰東封太山禪梁甫改元中元西幸長安馮魴爲司空丁巳帝崩皇太子莊踐位是謂孝明皇帝葬世祖于原陵戊午改元永平己未庚申辛酉壬戌北巡癸亥東巡經世之辰二千二百三十七甲子漢孝明皇帝七年乙丑丙寅丁卯南巡狩戊辰己巳牟融爲司空庚午河大决辛未壬申東巡狩癸酉司徒邢穆駙馬都尉韓光下獄死甲戌乙亥帝崩皇太子坦踐位是謂孝章皇帝葬顯宗于節陵丙子改元建初丁丑戊寅己卯鮑星爲太尉桓虞爲司徒詔于白虎觀議五經異同庚辰辛巳壬午廢皇太子爲清河王立皇子肇爲皇太子北幸鄴西幸長安癸未東巡狩甲申改元元和南巡狩鄭弘爲太尉乙酉東巡狩丙戌北巡狩丁亥改元章和南巡狩戊子帝崩皇太子肇踐位是謂孝和皇帝太后竇氏臨朝稱制竇憲爲車騎將軍專政葬肅宗于敬陵以鄧彪爲太尉録尚書事己丑改元永元竇憲敗匈奴于稽落山以竇憲爲大將軍庚寅辛卯帝加元服班超平西域壬辰竇憲作逆事覺伏誅帝始親萬機癸巳經世之巳二千二百三十八甲午漢孝和皇帝六年乙未丙申丁酉司徒劉方有罪自殺戊戌己亥庚子張酺罷太尉張禹爲太尉辛丑魯恭爲司徒壬寅廢皇后陰氏册貴人鄧氏爲皇后徐防爲司空癸卯南巡甲辰司徒魯恭罷免徐防爲司徒陳寵爲司空乙巳改元元興帝崩皇子隆立是謂殤帝太后鄧氏臨朝稱制車騎將軍鄧隲專政丙午改元延平葬穆宗于愼陵帝又崩鄧隲迎章帝孫祐立之是謂孝安皇帝葬殤帝于康陵尹勤爲司空丁未改元永和魯恭爲司徒張禹爲太尉張敏爲司空周章謀廢立不克自殺戊申鄧隲爲大將軍己酉帝加元服庚戌海寇亂辛亥西羌入寇張禹免大尉壬子太后鄧氏有事于太廟劉愷爲司空癸丑甲寅改元元初司馬苞爲太尉乙卯册閻氏爲皇后劉愷爲司徒袁敞爲司空丙辰李咸爲司空丁巳戊午己未庚申改元永寧楊震爲司徒辛酉改元建光太后鄧氏崩帝始親政事特進鄧隲渡遼將軍鄧遵下獄死壬戌改元延光癸亥司徒楊震爲太尉經世之午二千二百三十九甲子漢孝安皇帝十八年東巡廢皇太子保爲濟陰王楊震罷太尉馮石爲太尉乙丑帝南巡崩于葉太后閻氏臨朝稱制閻顯爲車騎將軍專政立章帝玄孫北鄉侯懿誅大將軍耿寶葬恭宗于恭陵懿又卒車騎將軍閻顯及大長秋江京閉宫門擇立它子中黄門孫程十九人殺江京迎濟陰侯立之是謂孝順皇帝顯兵入北宫不勝孫程取閻顯及江京之黨殺之亂乃定以王禮葬北鄉侯馮石爲太傅劉喜爲太尉李郃爲司徒丙寅改元永建皇太后閻氏崩桓焉爲太傅朱寵爲太尉朱倀爲司徒丁卯戊辰己巳帝加元服龐參爲太尉王龔爲司空劉俊爲司徒庚午班勇棄市辛未壬申改元陽嘉册梁氏爲皇后癸酉施延爲太尉甲戌黄尚爲司徒王卓爲司空乙亥丙子改元永和王龔爲太尉丁丑郭虔爲司空戊寅劉壽爲司徒己卯誅中常侍張達庚辰辛巳趙誠爲司空梁冀爲大將軍壬午改元漢安遣張綱等八使持節巡行天下廣陵寇亂趙峻爲太尉胡廣爲司徒癸未彭門寇亂甲申改元建康帝崩皇太子炳踐位是謂冲帝太后梁氏臨朝稱制大將軍梁冀專政葬敬宗于憲陵盜發憲陵免尚書欒巴爲庶人乙酉改元永嘉帝崩太后梁氏大將軍梁冀迎肅宗孫纘立之是謂質帝葬沖帝于懷陵江淮寇亂九江賊稱黄帝歷陽賊稱黑帝丙戌改元太初梁冀弑帝迎肅宗曾孫志立之是謂桓帝李固罷免梁冀專政丁亥改元建和梁冀以女上皇后杜喬爲太尉胡廣罷免李固杜喬下獄死戊子帝加元服趙誡爲太尉袁湯爲司徒己丑庚寅改元和平太后梁氏崩辛卯改元元嘉黄瓊爲司空尋罷免壬辰癸巳改元永興袁成逢隗爲三公經世之未二千二百四十甲午漢孝桓皇帝八年黄瓊爲太尉尹頌爲司徒乙未改元永壽韓縯爲司空丙申丁酉戊戌改元延熹己亥皇太后梁氏崩大將軍梁冀謀逆事覺夷三族黄門單超擅命胡廣韓縯滅死庚子白馬令李雲直諫死于獄太山及長沙寇亂辛丑武庫火壬寅癸卯甲辰南巡揚秉爲太尉乙巳廢皇后鄧氏册貴人竇氏爲皇后陳蕃爲太尉竇武爲大將軍丙午黨錮事起司隸李膺等三百人下獄丁未改元永康帝崩太后竇氏臨朝稱制戊申竇武迎肅宗玄孫解犢侯宏立之是謂靈帝竇武録尚書事專政改元建寧葬威宗于宣陵中常侍曹節王甫殺太傅陳蕃大將軍竇武及尚書尹勳侍中劉瑜屯騎校尉馮述夷其族徙太后竇氏于南宫謀誅宦氏不克故也胡廣爲太尉劉寵爲司徒己酉朋黨事復起殺李膺等百人庚戌辛亥帝加元服册宋氏爲皇后壬子改元嘉平太后竇氏崩誣構事大起癸丑叚穎爲太尉楊賜爲司空甲寅李咸爲太尉乙卯五經文皆刻石于太學袁隗爲司徒丙辰劉寬爲太尉楊賜爲司空丁巳大伐鮮卑孟郁爲太尉陳耽爲司空戊午改元光和合浦交阯内寇廢皇后宋氏大鬻爵至三公袁滂爲司徒己未諸貴臣下獄死者相繼宦氏誣故也劉郃爲司徒叚穎爲太尉張濟爲司空庚申陳耽爲司徒册何氏爲皇后辛酉作宫市帝遊以驢爲駕壬戌癸亥皇極經世卷第六之上
