front:
  text: 皇極經世卷第六之上詠四
  hash: sha256:6189ef274f540accdbdecdd676eb570dfd877343328091646dda313e88c73db5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0063_SJB_016-230192a, image: sjb/23/230192a.png}
body:
  text: 三川邵堯夫撰以運經世之七觀物篇之三十一經元之甲一經會之午七經運之巳一百八十六經世之子二千二百二十一經世之子二千二百二十一甲子周威烈王九年魏城少梁乙丑秦靈公卒季父立是謂簡公丙寅丁卯魏伐秦韓伐鄭戊辰齊伐𣈆魏伐中山己巳庚午齊田莊子卒子太公和繼趙城平城辛未魯元公卒子顯繼是謂穆公壬申𣈆韓武子卒子景侯度繼趙獻子卒子烈侯藉繼魏伐秦癸酉韓伐鄭取雍丘魏滅中山楚簡王卒子當繼是謂聲王甲戌鄭伐韓取負黍乙亥宋昭公卒子悼公購繼趙以白公仲爲相丙子齊宣公卒子康公貸繼田會以廪丘叛丁丑戊寅𣈆韓趙魏求爲諸侯于周己卯周威烈王崩太子驕嗣位是謂安王楚聲王遇盜卒子疑立是謂悼王庚辰秦攻魏陽狐辛巳秦簡公卒子惠公繼韓景侯卒子烈侯繼趙烈侯卒弟武侯立魏文侯以卜子夏叚干木爲師西門豹爲將守鄴吴起爲將守西河魏成子爲相樂羊爲將同韓趙伐楚至于乘丘壬午癸未甲申韓盜殺相俠累乙酉丙戌𣈆烈公卒子孝公繼丁亥戊子魏伐鄭城酸棗又敗秦軍于注楚伐韓取負黍己丑庚寅齊田和徙其君康公于海上食一城秦伐韓冝陽取六邑韓趙大敗楚師于大梁辛卯魯伐齊于平陸齊伐魏取襄陵壬辰秦伐魏陰𣈆癸巳齊田和會魏文侯于濁澤求爲諸侯魏請于周及諸侯皆許之經世之丑二千二百二十二甲午周安王十五年秦惠公卒子出子繼韓烈侯卒子文侯繼魏文侯卒子武侯繼趙武侯卒子敬侯繼乙未田和稱諸侯于齊列于周紀魏攻趙邯鄲丙申韓伐鄭取陽城伐宋執宋公于彭城魏城安邑及王垣趙破齊師于靈丘齊太公和卒子桓公午繼秦庶長改殺出子及其母迎靈公之子于河上立之是謂獻公丁酉趙破齊師于廪丘戊戌魏敗趙師于兔臺己亥齊魏以衛伐趙取剛平庚子趙會楚伐魏取棘蒲楚悼王卒宗室作亂殺吴起王子繼是謂肅王誅害吴起者七十餘家辛丑齊伐燕取桑丘壬寅齊康公死于海上齊桓侯卒子因齊立是謂威王癸卯𣈆孝公卒子靜公俱酒繼韓趙魏伐齊至于靈丘甲辰韓文侯卒子哀侯繼趙攻中山戰于房子魯穆公卒子共公繼乙巳周安王崩太子喜嗣位是謂烈王魏武侯韓哀侯趙敬侯同滅晋而三分其地以靜公爲家人食端氏一城丙午韓滅鄭徙都之趙敬侯卒子成侯繼宋休公卒子辟公繼丁未戊申魯伐齊入陽關趙伐齊至博陵己酉魏拔齊薛陵攻趙北藺趙拔魏鄉邑七十三宋辟公卒子剔成繼庚戌韓嚴弑其君哀侯立其子懿侯魏武侯卒公子爭國趙伐魏立公子罃是謂惠王趙敗秦軍于鄗安辛亥趙伐齊取甄魏敗趙師于覃懷齊威王烹阿大夫封即墨大夫萬家楚肅王卒弟良夫繼是謂宣王壬子周烈王崩弟扁嗣位是謂顯王齊西敗趙魏之師于濁澤趙輸長城魏入觀齊魏敗韓師于馬陵癸丑韓魏攻周甲寅趙韓分周爲二乙卯魏會趙攻秦不利于宅陽丙辰齊攻秦不利于石門魏伐宋取儀臺丁巳周顯王西賀秦獻公魏與秦會于杜平戊午己未秦獻公卒子孝公繼敗魏師于少梁魏敗韓師于澮庚申魏拔趙皮牢辛酉周致文武胙于秦孝公東周君惠公卒子傑繼韓趙魏伐齊壬戌秦用衛鞅韓懿侯卒子昭侯繼癸亥經世之寅二千二百二十三甲子周顯王十二年宋取韓黄池齊封騶忌爲成侯乙丑趙會燕于河上會齊于平陸魯衛宋鄭朝魏丙寅魯共公卒子康公繼齊會趙于郊會魏于平陸會秦于杜平丁卯秦敗魏師于元里取少梁魏圍趙邯鄲戊辰韓攻東周君取陵觀及邢丘齊田忌孫臏救趙敗魏師于桂陵是年齊始稱王己巳秦大良造衛鞅會韓趙之師圍魏襄陵庚午韓用申不害爲相秦趙伐魏魏歸趙邯鄲盟于漳水之上辛未趙成侯卒世子繼是謂肅侯秦開阡陌大築冀室于咸陽自雍徙都之壬申癸酉趙奪𣈆君端氏徙之屯留秦初爲賦甲戌乙亥魯康公卒子景公繼丙子丁丑戊寅周顯王錫秦孝公命爲伯齊威王卒子宣王辟彊繼己卯諸侯西賀秦庚辰齊救韓趙田忌田嬰孫臏大敗魏師于馬陵獲將龐涓及世子申辛巳楚宣王卒子威王繼秦奪魏河西七百里魏去安邑徙都大梁壬午癸未秦孝公卒子惠文君繼是謂惠王商鞅奔魏魏不受復入于秦甲申秦惠文君夷商鞅族蘇秦入秦不受乙酉周顯王西賀秦孟軻爲魏卿丙戌秦拔韓冝陽魏惠王卒子襄王繼齊宣王會魏襄王于鄄丁亥蘇秦會趙燕韓魏齊楚六國之師盟于洹水之上以攻秦至于函谷韓作高門是年楚滅越獲其王無彊盡取其地東開地至浙江魏始稱王齊田嬰爲相戊子燕文公卒子易王立韓昭侯卒子惠王立楚敗齊師于徐州齊田嬰詐楚故不利己丑齊會魏伐趙又伐燕取十城庚寅秦伐魏辛卯宋亂公弟偃弑其君代立是謂元王壬辰楚威王卒子懷王槐繼魏伐楚取陘山秦伐魏取汾陰癸巳秦用張儀爲相陳軫適楚楚滅蜀魏輸秦上郡經世之卯二千二百二十四甲午周顯王四十二年齊會魏攻韓之桑丘乙未趙肅候卒子定繼是謂武靈王齊用孟軻爲上𡖖丙申孟軻去齊丁酉秦始稱王齊宣王卒子湣王地繼秦築上郡塞戊戌韓燕稱王楚破魏襄陵八城移兵攻齊秦張儀會齊楚執政于齧桑己亥秦張儀出相魏燕會韓魏二君于區鼠庚子周顯王崩子定嗣位是謂愼靚王是年趙始稱王齊封田嬰于薛盜殺蘇秦于齊蘇代復相燕燕易王卒子噲繼子之專國蘇代使齊辛丑宋伐楚取地三百里始稱王秦齊交婚壬寅魏襄王卒子哀王繼張儀復相癸卯楚會齊趙韓魏燕攻秦不利齊獨後秦樗里疾大敗六國之師獲將申差及韓魏二公子甲辰齊敗魏師于觀津與秦爭雄雌魯景公卒子平公繼秦敗韓師于濁澤韓請割名都秦又伐韓敗韓師于岸門楚救不至燕王噲以國屬子之乙巳齊伐燕秦伐趙拔中都及西陽丙午周愼靚王崩子延繼是謂赧王稱西周君秦拔義渠二十五城又取韓之石章丁未楚齊和親燕亂將市被攻子之不克反攻世子又不克死戊申楚攻秦不利秦伐齊楚救不至秦張儀結楚樗里疾攻趙己酉楚懷王大伐秦不利又伐又不利秦庶長魏章會齊韓之師大敗楚師于藍田又敗之于丹水之陽獲其將屈丐遂取漢中地置黔中郡韓宣王卒世子蒼繼是謂襄王齊以五都兵攻燕燕亂國人立太子平是謂昭王庚戌楚屈原使齊秦張儀使楚會楚齊韓趙魏燕六國西事秦至咸陽而秦惠王卒世子武王繼燕起金臺以禮郭隗樂毅自魏往鄒衍自齊至劇辛自趙至辛亥秦會魏于臨晋張儀魏章適魏樗里疾甘茂爲相壬子楚合齊以善韓癸丑秦武王會魏哀王于應會韓襄王于臨晋甲寅東西二周君相攻楚圍韓之雍丘秦甘茂拔韓之宜陽武王舉周鼎絶臏而死國人迎母弟稷于趙而立之是謂昭襄王太后臨朝稱制魏冉專政趙武靈王改用胡服乙卯秦復韓武遂嚴君疾向壽爲相甘茂適魏丙辰楚絶齊以善秦丁巳秦昭襄王會楚懷王于黄棘復之上庸戊午齊韓魏攻楚楚求救于秦魯平公卒子文公賈繼秦取韓武遂拔魏蒲坂己未秦復魏蒲坂會韓于武遂庚申楚伐秦不利秦昭襄王會齊韓魏伐楚敗之于重丘辛酉齊孟甞君入秦爲質壬戌楚懷王放大夫屈原于江濱與秦昭襄王會于武關不復國人迎太子横于齊而立之是謂頃襄王其弟子蘭爲令尹齊歸秦涇陽君孟嘗君自秦逃歸秦會齊魏伐楚取八城趙拔燕中山攘地北至代西至九原癸亥齊會韓魏伐秦至于函谷秦伐楚取十六城趙武靈王稱主父會群臣于東宫廢太子章而授庶子何位是謂惠文王以肥義爲之相北略地南入秦稱使者經世之辰二千二百二十五甲子周赧王十八年楚懷王于秦逃歸不克乙丑楚懷王死于秦楚遂絶秦魏哀王卒子昭王繼齊會韓魏趙宋五國之兵攻秦至鹽氏而還秦與韓魏河北及封陵以和韓襄王卒子釐王繼趙主父滅中山徙其王于膚施封廢太子章于代號安陽君使田不禮爲之相丙寅秦免樓緩相穰侯魏冉復相率師攻魏趙安陽君及田不禮作難公子成及大夫李兌平之主父死于沙丘宫丁卯秦向壽伐韓拔武始戊辰楚與秦復和韓伐秦不利秦左庶長白起大敗韓及諸侯之師于伊闕取城五坑軍二十四萬獲將公孫喜己巳楚逆婦于秦秦魏冉免相大良造白起伐魏取垣攻楚拔宛庚午秦魏冉復相封陶邑司馬錯伐韓軹及鄧辛未齊有田甲之難免孟嘗君相魏獻河東地方四百里入秦韓獻武遂二百里入秦趙會齊伐韓壬申齊復孟嘗君相秦伐韓拔六十一城癸酉齊秦約稱東西帝復罷甲戌齊孟嘗郡謝病秦昭襄王巡漢中及上郡河北拔魏新垣及曲陽乙亥齊滅宋至于泗上十二諸侯鄒魯之君皆稱臣南取楚之淮北西侵韓趙魏魏獻秦安邑秦伐魏之河内攻韓之夏山丙子齊孟嘗君以薛屬魏秦昭襄王會楚頃襄王于宛會趙惠文王于中陽伐齊拔九城丁丑燕樂毅會秦楚韓趙魏五國之師伐齊大敗齊師于濟西遂入臨菑拔城七十拜樂毅上卿封昌國君留圍齊即墨及莒齊湣王保莒楚使淖齒救齊殺齊湣王于莒莒人立其子法章是謂襄王荀卿行祭酒戊寅楚頃襄王會秦昭襄王于鄢秦穰侯代魏至于國己卯秦昭襄王會韓釐王于新城會魏昭王于新明伐趙拔二城伐韓取六邑庚辰楚會魏趙伐秦秦伐楚魏冉復相趙使蘭相如入秦獻璧辛巳楚割上庸及漢中請和于秦秦白起拔趙二城司馬錯拔楚上庸燕昭王卒子惠王繼以騎劫代樂毅將樂毅奔趙趙惠文王與秦昭襄王會于澠池藺相如相壬午齊田單大破燕軍于即墨獲將騎劫復城七十迎襄王自莒入臨菑封田單安平君秦白起拔楚西陵癸未楚頃襄王出奔陳郢陷于秦大良造白起破楚入郢燒夷陵以郢爲南郡封起武安君甲申秦拔楚巫及黔中作黔中郡魏昭王卒子安釐王繼乙酉楚東收江旁十五邑以扞秦魏拔秦二城封無忌信陵君丙戌秦兵圍大梁魏入温請和秦以穰侯爲相國韓暴䳒救魏不利趙廉頗拔魏房子安陽丁亥魏芒卯攻韓不利秦師救韓敗趙魏之師十五萬于華陽魏入南陽請和以其地爲南陽郡戊子韓釐王卒子桓惠王繼趙取東胡地己丑楚黄歇奉太子完入秦爲質求平又助韓魏伐燕齊田單拔燕中陽秦會楚韓趙魏伐燕燕惠王卒子武成王繼趙藺相如伐齊庚寅秦穰侯伐齊取剛壽以廣陶邑范睢自魏入秦辛卯秦師伐韓以逼周壬辰秦中更胡傷攻趙閼與趙奢擊之有功封馬服君與廉頗同位秦人爲之少懼癸巳秦拔魏懷城經世之巳二千二百二十六甲午周赧王四十八年秦太子卒于魏乙未秦拔魏郪丘罷穰侯相國及宣太后權以客𡖖范雎爲相封應侯魏冉就國趙惠文王卒子丹繼是謂孝成王太后專政丙申齊襄王卒子建繼田單救趙秦以安國君爲太子宣太后卒拔趙三城進圍邯鄲趙出長安君爲質于齊求救趙勝爲相封平原君丁酉齊用田單爲相秦白起攻韓拔九城戊戌楚頃襄王卒太子完自秦亡歸繼是謂考烈王以左徒黄歇爲令尹號春申君封于吴食淮北地秦白起拔韓南郡己亥楚獻地于秦乞和秦五大夫賁伐韓拔五十城以斷太行路韓馮亭以上黨入于趙趙受韓上黨廉頗軍長平庚子楚伐魯取徐州秦白起攻趙長平辛丑秦武安君大敗趙軍于長平進圍邯鄲趙以趙括代廉頗將長平遂陷兵四十萬爲秦所坑壬寅秦分軍爲三罷武安君白起將以王齕代攻趙拔趙武安及皮牢司馬梗北定上黨趙使蘇代使秦癸卯秦加范雎相國王齕圍邯鄲張唐攻魏燕武成王卒子孝王繼趙平原君求救于楚魏甲辰楚春申君魏信陵君救趙秦起武安君白起不克殺之于杜郵乙巳周赧王會齊韓趙魏兵出伊闕攻秦不利西奔秦秦昭王滅周盡入其地三十六城徙其王于憚狐楚滅魯以齊荀卿爲蘭陵令丙午秦徙周民及九鼎于咸陽蔡澤自燕入秦代范雎相燕孝王卒子喜繼丁未楚齊韓燕趙皆服命于秦魏獨後秦使將軍樛伐之取吴城戊申秦郊上帝于雍丘趙徙都鉅鹿己酉趙平原君卒庚戌秦昭襄王卒太子安國繼是謂孝文王立三日又卒子楚立是謂莊襄王以華陽夫人爲后子政爲太子吕不韋爲丞相封文信侯食河南十萬户楚春申君入弔于秦燕將栗腹攻趙不利趙廉頗破燕軍于鄗封頗信平侯辛亥東周君會諸侯攻秦不利没于秦秦丞相吕不韋平東周盡入其地置三川郡徙其君于陽人趙廉頗伐燕圍其國壬子秦蒙驁拔趙太原拔韓滎陽及成臯癸丑秦蒙驁拔魏高都又舉趙三十城楚齊魏韓燕趙攻秦不利甲寅秦莊襄王卒太子政繼是謂始皇帝以吕不韋爲相國號仲父同太后專政李斯爲舍人齊田單屠聊城魏無忌自趙歸國率楚齊韓趙燕五國之師攻秦軍于河外走蒙驁追至函谷乙卯秦蒙驁平晋陽丙辰趙孝成王卒子偃繼是謂悼襄王以樂乘代廉頗將頗奔魏丁巳秦蒙驁攻魏拔二城攻韓拔十二城戊午魏安釐王卒子景湣王繼信陵君亦卒趙將李牧拔燕二城己未秦拔魏二十城置東郡趙伐燕獲將劇辛庚申楚考烈王會齊韓趙魏燕五國之兵伐秦至于函谷不利東徙都壽春春申君就國于吴辛酉秦拔魏之汲趙拔魏之鄴壬戌秦封嫪毒長信侯關政于内韓桓惠王卒子安繼癸亥長信侯嫪毒作難政鄿年宫不克伏誅徙太后于雍流蜀者四千家楚者烈王卒子幽王悍繼經世之午二千二百二十七甲子秦始皇帝十年吕不韋坐嫪毒事免相李斯爲相齊趙來置酒復華陽太后于甘泉宫乙丑秦王翦桓齮拔趙九城趙悼襄王卒子遷繼秦兵攻鄴丙寅秦會魏伐楚及韓文信侯吕不韋自殺丁卯秦桓齮大敗趙軍十萬于平陽韓公子非使秦不還戊辰秦桓齮破趙宜安及赤麗韓王安朝秦己巳秦伐趙一軍攻鄴一軍攻狼孟燕太子丹自秦逃歸趙李牧扞秦有功庚午魏獻秦麗邑辛未秦内史騰滅韓獲其王以其地爲潁川郡壬申秦王翦下井陘大破趙軍進圍鉅鹿趙以趙葱代李牧顔聚代司馬尚將癸酉秦王翦滅趙獲其王以其地爲趙郡楚幽王卒母弟猶立庶兄負芻殺猶代立魏景湣王卒子假繼趙亡太子喜稱王于代會燕軍于上谷甲戌秦王翦破燕軍于易水燕荆軻使秦不還乙亥秦王翦王賁滅燕獲其太子丹翦謝病還拔楚十城丙子秦王賁滅魏决河灌大梁獲其王丁丑秦王翦破楚殺其將項燕楚喪師于蘄走壽春戊寅秦王翦蒙武滅楚獲其王以其地爲楚郡己卯秦王賁平遼東獲燕王平代獲趙太子王翦定越以其地爲會稽郡庚辰秦王翦滅齊獲其王以其地爲齊郡東至海及朝鮮西至臨洮羌中南至北嚮户北至陰山遼東分天下地爲三十六郡罷侯置守鑄天下兵爲十二金人徙天下豪富十二萬户于咸陽大建宫室作阿房爲萬世業稱始皇帝更以建亥月爲歲首辛巳西巡狩至于隴右北地及回中乃復壬午東巡狩至于鄒嶧封太山禪梁甫南登瑯琊丞相隗林王綰卿士李斯王戊五大夫趙嬰將軍楊樛及九侯勒帝功于金石表于海上遂南至于衡山浮江自南郡由武關乃復癸未東巡狩至于博浪沙中遇盜遂登罘罳刻石紀功北由上黨乃復甲申乙酉丙戌北巡狩至于碣石由上郡乃復使蒙恬擊胡取河南地丁亥南取陸梁地爲桂林象郡又北斥匈奴自榆中並河以東屬之陰山爲三十四縣城河上爲塞又使蒙恬渡河取高闕陶山北假中以築亭障戊子置酒咸陽宫聚天下書焚之己丑聚天下學士于驪山坑之廣阿房宫自咸陽達于渭南庚寅辛卯南巡狩至于雲夢左丞相馮去疾留守右丞相李斯從行少子胡亥請行至九疑浮江東至于會稽又北至于瑯琊由平原達沙丘崩左丞相李斯宦氏趙高矯帝書更立少子胡亥賜上郡太子將軍蒙恬死遂還咸陽胡亥立是謂二世皇帝葬始皇帝于驪山壬辰宦氏趙高爲中郎令專政東巡狩至于會稽北又至于遼東乃復大殺王族及群臣復廣阿房徵天下材士以五萬人爲屯尉咸陽三百里内不得食其穀戍卒陳勝稱王于楚關東郡邑皆殺其令長以應陳勝而西攻秦陳勝將武臣稱王于趙魏咎稱王於魏狄人田儋稱王于齊楚人項梁稱王會稽徐人劉季稱兵豐沛陳勝兵西攻秦至于戲癸巳秦殺右丞相馮去疾將軍馮劫及囚左丞相李斯諫罷阿房故也將軍張邯滅陳勝于城父破項梁于定陶平田儋于臨濟渡河北攻趙田儋死其弟榮立儋子市爲王陳勝將秦嘉立勝子景駒爲王項梁殺景駒求楚懷王孫心立之保盱眙項梁死其侄羽軍彭城其將劉季軍碭山楚王心收項梁軍自盱眙徙彭城以劉季爲碭郡長封武安侯俾南略地而西攻秦以項羽爲魯國公封長安侯俾北救趙而西攻秦約先入關者王經世之未二千二百二十八甲午秦二世三年中郎令趙高稱丞相殺李斯及弑其君胡亥于望夷宫代立不克立二世兄之子嬰爲王嬰立夷趙高三族沛公兵十萬由武關入至咸陽秦子嬰降于軹道收圖籍封宫室府庫示秦人以約法三章還軍灞上以待東諸侯項羽北救趙殺大將軍宋義至鉅鹿大敗章邯軍于洹水秦軍降者二十萬悉坑之于新安合齊趙魏韓燕五國之兵四十萬由函谷而入會沛公于戲而屠咸陽殺子嬰收子女玉帛焚宫室府庫乙未項羽渝約自主封建立楚王心爲義帝徙之江南都郴封沛公季爲漢王遷之漢中都南鄭分秦關中爲三一封降將章邯爲雍王都廢丘一封降將司馬欣爲塞王都櫟陽一封降將董翳爲翟王都高奴分齊爲三一封齊將田都爲臨菑王都臨菑一封齊將田安爲濟北王都博陽一封齊王田市爲膠東王徙即墨分楚爲三一封楚將英布爲九江王都六一封楚將共敖爲臨江王都江陵一封蕃君吴芮爲衡山王徙邾分趙爲二一封楚將張耳爲常山王都襄國一封趙王歇爲