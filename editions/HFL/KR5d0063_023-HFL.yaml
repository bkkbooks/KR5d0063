body:
  text: 三川邵堯夫撰觀物外篇下以物喜物以物悲物此發而中節者也石之花鹽之消之類也水之物無異乎陸之物各有寒熱之性大較則陸爲陽中之陰而水爲陰中之陽日月星辰共爲天水火土石共爲地耳目鼻口共爲首髓血骨肉共爲身此乃五之數也火生于無水生于有不我物則能物物辰至日爲生日至辰爲用蓋順爲生而逆爲用也易有三百八十四爻眞天文也鷹鵰之類食生而雞鳧之類不專食生虎豹之類食生而猫犬之類食生又食穀以類推之從可知也馬牛皆陰類細分之則馬爲陽而牛爲陰飛之類喜風而敏于飛上走之類喜土而利于走下禽蟲之卵果穀之類也穀之類多子蟲之類亦然蠶之類今歲蛾而子來歲則子而蠶蕪菁之類今歲根而苗來歲則苗而子天地之氣運北而南則治南而北則亂亂久則復北而南矣天道人事皆然推之歷代可見消長之理也任我則情情則蔽蔽則昏矣因物則性性則神神則明矣潜天潜地不行而至不爲陰陽所攝者神也在水者不瞑在風者瞑走之類上睫接下飛之類下睫接上類使之然也在水之鱗鬛飛之類也龜獺之類走之類也夫四象若錯綜而用之日月天之陰陽水火地之陰陽星辰天之剛柔土石地之剛柔天之孽十之一猶可違人之孽十之九不可逭陽主舒長陰主慘急日入盈度陰從于陽月入縮度陽從于陰飛之走雞鳧之類是也走之飛龍馬之屬是也先天之學心也後天之學迹也出入有無死生者道也神無所在無所不在至人與他心通者以其本于一也道與一神之强名也以神爲神者至言也身地也本乎靜所以能動者氣血使之然也天地生萬物聖人生萬民生生長類天地成功别生分類聖人成能神者人之主將寐在脾熟寐在腎將寤在肝又言在膽正寤在心以物觀物性也以我觀物情也性公而明情偏而暗陽主闢而出陰主翕而入日在于水則生離則死交與不交之謂也陰對陽爲二然陽來則生陽去則死天地萬物生死主于陽則歸于一也神無方而性有質發于性則見于情發于情則見于色以類而應也天地之大寤在夏人之神則存于心以天地生萬物則以萬物爲萬物以道生天地則天地亦萬物也水之族以陰爲主陽次之陸之類以陽爲主陰次之故水類出水則死風類入水則死然有出入之類者龜蟹鵝鳧之類是也天地之交十之三一變而二二變而四三變而八卦成矣四變而十有六五變而三十有二六變而六十四卦備矣天火無體之火也地火有體之火也人之貴兼乎萬類自重而得其貴所以能用萬類凡人之善惡形于言發於行人始得而知之但萌諸心發于慮鬼神已得而知之矣此君子所以愼獨也氣變而形化人之類備乎萬物之性火無體因物以爲體金石之火烈于草木之火者因物而然也氣形盛則魂魄盛氣形衰則魂魄亦從而衰矣魂隨氣而變魄隨形而止故形在則魄存形化則魄散人之神則天地之神人之自欺所以欺天地可不愼哉人之畏鬼亦猶鬼之畏人人積善而陽多鬼益畏之矣積惡而陰多鬼弗畏之矣大人者與鬼神合其吉凶夫何畏之有至理之學非至誠則不至物理之學旣有所不通不可以强通强通則有我有我則失理而入於術矣星爲日餘辰爲月餘星之至微如塵沙者隕而爲堆阜心一而不分則能應弗違此君子所以虛心而不動也藏者天行也府者地行也天地並行則配爲八卦聖人利物而無我明則有日月幽則有鬼神易有眞數三而已參天者三三而九兩地者倍三而六八卦相錯者相交錯而成六十四卦也夫易根于乾坤而生於姤復蓋剛交柔而爲復柔交剛而爲姤自兹而無窮矣素問陰符七國時書也夫聖人之經渾然無跡如天道焉故春秋録實事而善惡形于其中矣中庸之法自中者天也自外者人也韻法開閉者律天清濁者吕地韻法先閉後開者春也純開者夏也先開後閉者秋也冬則閉而無聲素問宻語之類於術之理可謂至也顯諸仁藏諸用孟子善藏其用乎寂然不動反本復靜坤之時也感而遂通天下之故陽動于中間不容髮復之義也莊荀之徒失之辯東爲春聲陽爲夏聲此見作韻者亦有所至也銜凡冬聲也不見動而動妄也動于否之時是也見動而動則爲無妄然所以有災者陽微而無應也有應而動則爲益矣精氣爲物形也遊魂爲變神也又曰精氣爲物體也遊魂爲變用也君子之學以潤身爲本其治人應物皆餘事也剸割者才力也明辯者智識也寬弘者德器也三者不可闕一無德者責人怨人易滿滿則止也龍能大能小然亦有制之者受制於陰陽之氣得時則能變化變變則不能也伯夷義不食周粟至餓且死止得爲仁而已三人行亦有師焉至于友一鄉之賢天下之賢以天下爲未足又至於上論古人無以加焉義重則内重利重則外重兊說也其他說皆有所害惟朋友講習無說於此故言其極者也能循天理動者造化在我也學不際天人不足以謂之學君子於易玩象玩數玩辭玩意能醫人能醫之疾不得謂之良醫醫人之所不能醫者天下之良醫也能處人所不能處之事則能爲人所不能爲之事也人患乎自滿滿則止也故禹不自滿假所以爲賢雖學亦當常若不足不可臨深以爲高也人苟用心必有所得獨有多寡之異智識之有淺深也理窮而後知性性盡而後知命知而後至凡處失在得之先則得亦不喜若處得在失之先則失難處矣必至於隕穫人必有德器然後喜怒皆不妄爲卿相爲匹夫以至學問高天下亦若無有也人必内重内重則外輕苟内輕必外重好利好名無所不至得天理者不獨潤身亦能潤心不獨潤心至於性命亦潤天下言讀書者不少能讀書者少若得天理眞樂何書不可讀何堅不可破何理不可精曆不能無差今之學曆者但知曆法不知曆理能布筭者洛下閎也能推步者甘公石公也洛下閎但知曆法楊雄知曆法又知曆理一歲之閏六陰六陽三年三十六日故三年一閏五年六十日故五歲再閏天時地理人事三者知之不易資性得之天也學問得之人也資性由内出者也學問由外入者也自誠明性也自明誠學也顔子不遷怒不貳過遷怒貳過皆情也非性也不至於性命不足謂之好學伯夷柳下惠得聖人之一端伯夷得聖人之清柳下惠得聖人之和孔子時清時和時行時止故得聖人之時太玄九日當兩卦餘一卦當四日半楊雄作太玄可謂見天地之心者也用兵之道必待人民富倉廪實府庫充兵强名正天時順地利得然後可舉易無體也曰既有典常則是有體也恐遂以爲有體故曰不可爲典要既有典常常也不可爲典要變也莊周雄辯數千年一人而已如庖丁解牛曰踟蹰四顧孔子觀吕梁之水曰蹈水之道無私皆至理之言也老子五千言大抵皆明物理今有人登兩臺兩臺皆等則不見其高一臺高然後知其卑下者也學不至於樂不可謂之學一國一家一身皆同能處一身則能處一家能處一家則能處一國能處一國則能處天下心爲身本家爲國本國爲天下本心能運身苟心所不欲身能行乎人之精神貴藏而用之苟衒於外則鮮有不敗者如利刃物來則剸之若恃刃之利而求割乎物則刃與物俱傷矣言發于眞誠則心不勞而逸人久而信之作僞任數一時或可以欺人持久必敗人貴有德小人有才者有之矣故才不可恃德不可无天地日月悠久而已故人當存乎逺不可見其近君子處畎畒則行畎畒之事居廟堂則行廟堂之事故無入而不自得智數或能施于一朝蓋有時而窮惟至誠表天地同久天地無則至誠可息苟天地不能無則至誠亦不息也室中造車天下可行執轍合故也苟順義理合人情日月所照皆可行也中庸非天降地出揆物之理度人之情行其所安是爲得矣歛天下之智爲智歛天下之善爲善則廣矣自用則小漢儒以反經合道爲權得一端者也權所以平物之輕重聖人行權酌其輕重而行之合其冝而已故執中無權者猶爲偏也王通言春秋王道之權非王通莫能及此故權在一身則有一身之權在一鄉則有一鄉之權以至於天下則有天下之權用雖不同其權一也夫弓固有强弱然一弓二人張之則有力者以爲弓弱無力者以爲弓强故有力者不以己之力有餘而以爲弓弱無力者不以己之力不足而以爲弓强何不思之甚也一弓非有强弱也二人之力强弱不同也今有食一杯在前二人大餒而見之若相讓則均得食矣相奪則爭非徒爭之而已或不得其食矣此二者皆人情也知之者鮮知此則天下之事皆如是也夫易者聖人長君子消小人之具也及其長也闢之於未然及其消也闔之於未然一消一長一闔一闢渾渾然無跡非天下之至神其孰能與於此大過本末弱也必有大德大位然後可救常分有可過者有不可過者有大德大位可過者也伊周其人也不可僣也有大德無大位不可過也孔孟其人也不可誣也其位不勝德邪大哉位乎待才用之宅也復次剥明治生於亂乎姤次夬明亂生於治乎時哉時哉未有剥而不復未有夬而不姤者防乎其防邦家其長子孫其昌是以聖人貴未然之防是謂易之大綱先天學心法也故圖皆自中起萬化萬事生乎心也先天學主乎誠至誠可以通神明不誠則不可以得道先天圖中環中也事必量力量力故久所行之路不可不寬寬則少礙知易者不必引用講解是爲知易孟子之言未嘗及易其間易道存焉但人見之者鮮耳人能用易是爲知易如孟子可謂善用易者也學以人事爲大今之經典古之人事也春秋三傅之外陸淳琰助可以兼治所謂皇帝王霸者非獨謂三皇五帝三王五霸而已但用無爲則皇也用恩信則帝也用公正則王也用智力則霸也霸以下則夷狄夷狄而下是禽獸也季札之才近伯夷叔向子産晏子之才相等管仲用智數晚識物理大抵才力過人也五霸者功之首罪之魁也春秋者孔子之刑書也功過不相掩聖人先褒其功後貶其罪故罪人有功亦必録之不可不恕也始作兩觀始者貶之也誅其舊無也初獻六羽初者褒之也以其舊僣八佾也某人受春秋於尹師魯師魯受於穆伯長某人後復攻伯長曰春秋無褒皆是貶也田述古曰孫復亦云春秋有貶而無褒曰春秋禮法廢君臣亂其間有能爲小善者安得不進之也况五霸實有功於天下且五霸固不及於王不猶愈於夷狄安得不與之也治春秋者不辨名實不定五霸之功過則未可言治春秋先定五霸之功過而治春秋則大意立若事事求之則無緒矣凡人爲學失於自主張太過平王名雖王實不及一小國之諸侯齊𣈆雖侯而實僣王此春秋之名實也子貢欲去告朔之餼羊羊名也禮實也名存而實亡猶愈於名實俱亡苟存其名安知後世無王者作是以有所待也秦穆公有功於周能遷善改過爲霸者之最𣈆文侯世世勤王遷平王於洛次之齊桓公六合諸侯不以兵車又次之楚莊强大又次之宋襄公雖霸而力微會諸侯而爲楚所執不足論也治春秋者不先定四國之功過則事無統理不得聖人之心矣春秋之間有功者未見大於四國者有過者亦未見大於四國者也故四者功之首罪之魁也人言春秋非性命書非也至于書郊牛之口傷改卜牛乃死猶三望此因魯事而貶之也聖人何容心哉無我故也豈非由性命而發言也又云春秋皆因事而褒貶豈容人特立私意哉又曰春秋聖人之筆削爲天下之至公不知聖人之所以爲公也如因牛傷則知魯之僣郊因初獻六羽則知舊僣八佾因新作雉門則知舊無雉門皆非聖人有意於其間故曰春秋盡性之書也春秋爲君弱臣强而作故謂之名分之書聖人之難在不失仁義忠信而成事業何如則可在於絶四有馬者借人乘之舍己以從人也或問才難何謂也曰臨大事然後見才之難也曰何獨言才曰才者天之良質也學者所以成其才也曰古人有不由學問而能立功業者何必曰學曰周勃霍光能成大事唯其無學故未盡善也人而無學則不能燭理不能燭理則固執而不通人有出人之才必以剛克中剛則足以立事業處患難若用於他反爲邪惡故孔子以申棖爲焉得剛既有慾心必無剛也君子喻於義賢人也小人喻於利而已義利兼忘者唯聖人能之君子畏義而有所不爲小人直不畏耳聖人則動不踰矩何義之畏乎顔子不貳過孔子曰有不善未嘗不知知之未嘗復行是也是一而不再也韓愈以爲將發於心而便能絶去是過與顔子也過與是爲私意焉能至於道哉或曰與善不亦愈於與惡乎曰聖人則不如是私心過與善惡同矣爲學養心患在不由直道去利欲由直道任至誠則無所不通天地之道直而已當以直求之若用智數由逕以求之是屈天地而循人欲也不亦難乎事無巨細皆有天人之理修身人也遇不遇天也求之者人也得之與否天也得失不動心所以順天也强取必得是逆天理也逆天理者患禍必至魯之兩觀郊天大禘皆非禮也諸侯苟有四時之禘以爲常祭可也至於五年大禘不可爲也仲弓可使南面可使從政也誰能出不由户户道也未有不由道而能濟者也不由户者開穴隙之類是也多聞擇其善者而從之雖多聞必擇善而從之多見而識之識别也雖多見必有以别之或問顯諸仁藏諸用曰若日月之照臨四時之成歲是顯諸仁也其度數之然而不知其所以然是藏諸用也落下閎改顓頊曆了雲初曆子雲準太初而作太玄凡八十一卦九分共二卦凡一五隔一四細分之則四分半當一卦氣起於中心故首中卦參天兩地而倚數非天地之正數也倚者擬也擬天地正數而生也元亨利貞變易不常天道之變也吉凶悔吝變易不定人道之應也鬼神者無形而有用其情狀可得而知也於用可見之矣若人之耳目鼻口手足草木之枝葉華實顔色皆鬼神之所爲也福善禍淫主之者誰邪聰眀正直有之者誰邪不疾而速不行而至任之者誰邪皆是鬼神之情狀也易有意象立意皆所以明象統下三者有言象不擬物而直言以明事有象像擬一物以明意有數象七日八月三年十年之類是也易之數窮天地終始或曰天地亦有終始乎曰既有消長豈無終始天地雖大是亦形器乃二物也易有内象理致是也有外象指定一物而不變者是也在人則乾道成男坤道成女在物則乾道成陽坤道成陰神無方而易無體滯於一方則不能變化非神也有定體則不能變通非易也易雖有體體者象也假象以見體而本無體也一陰一陽之謂道道無聲無形不可得而見者也故假道路之道而爲名人之有行必由乎道一陰一陽天地之道也物由是而生由是而成者也事無大小皆有道在其間能安分則謂之道不能安分謂之非道顯諸仁者天地生萬物之功則人可得而見也所以造萬物則人不可得而見是藏諸用也正音律數行至于七而止者以夏至之日出於寅而入於戌亥子丑三時則日入于地而目無所見此三數不行者所以比於三時也故生物之數亦然非數之不行也有數而不見也月體本黑受日之光而白水在人之身爲血土在人之身爲肉經綸天下之謂才逺舉必至之謂志并包含容之謂量六虛者六位也虛以待變動之事也有形則有體有性則有情天主用地主體聖人主用百姓主體故日用而不知膽與腎同陰心與脾同陽心主目脾主鼻陽中陽日也陰中陰月也陰中陽星也陽中陰辰也柔中柔水也柔中剛火也剛中柔土也剛中剛石也法始乎伏犧成乎堯革於三王極於五霸絶於秦萬世治亂之迹無以逃此矣日爲心月爲膽星爲脾辰爲腎蔵也石爲肺土爲肝火爲胃水爲膀胱府也易之生數一十二萬九千六百總爲四千二百二十四此消長之大數演三十年之辰數即其數也歲三百六十日得四千三百二十辰以三十乘之得其數矣凡甲子甲午爲世首此爲經世之數始于日甲月子星甲辰子又云此經世日甲之數月子星甲辰子從之也鼻之氣目見之口之言耳聞之以類應也倚蓋之說崑崙四垂而爲海推之理則不然夫地直方而靜豈得如圓動之天乎海潮者地之喘息也所以應月者從其類也十干天也十二支地也支干配天地之用也動物自首生植物自根生自首生命在首自根生命在根神者易之主也所以無方易者神之用也所以無體循理則爲常理之外則爲異矣風類水類小大相反震爲龍一陽動於二陰之下震也重淵之下有動物豈非龍乎一十百千萬億爲奇天之數二十百二十千二百萬二十億二萬爲偶地之數也天之陽在東南日月居之地之陰在西北火石處之身地也本乎靜所以能動者氣血使之然也火以性爲主體次之水以體爲主性次之陽性而陰情性神而情鬼起震終艮一節明文王八卦也天地定位一節明伏犧八卦也八卦相錯者明交錯而成六十四也數徃者順若順天而行是左旋也皆已生之卦也故云數徃也知來者逆若逆天而行是右行也皆未生之卦也故云知來也夫易之數由逆而成矣此一節直解圖意若逆知四時之謂也堯典期三百六旬有六日夫日之餘盈也六則月之餘縮也亦六若去日月之餘十二則有三百五十四乃日行之數以十二除之則得二十九日五十分之則爲十若三天兩之則爲六兩地又兩之則爲四此天地分太極之數也天之變六六其六得三十六爲乾一爻之數也積六爻之策共得二百一十有六爲乾之策六其四得二十四爲坤一爻之策積六爻之數共得一百四十有四爲坤之策積二篇之策乃萬有一千五百二十也素問肺主皮毛心脉脾肉肝筋腎骨上而下外而内也心血腎骨交法也交即用也易始于三皇書始于二帝詩始于三王春秋始于五霸乾爲天之類本象也爲金之類列象也易之首于乾坤中于坎离終于水火之交不交皆至理也天地並行則藏府配四蔵天四府地也自乾坤至坎离以天道也自咸常至旣濟未濟以人事也太極一也不動生二二則神也火生濕水生燥神生數數生象象生器太極不動性也發則神神則數數則象象則器器之變復歸於神也復至乾凡百有二十陽姤至坤凡八十陽姤至坤凡百有二十陰復至乾凡八十陰乾奇也徤也故天下之徤莫如天坤耦也陰也順也故天下之順莫如地所以順天也震起也一陽起也起動也故天下之動莫如雷坎䧟也一陽䧟於二陰䧟下也故天下之下莫如水艮止也一陽於是而止也故天下之止莫如山巽入也一陰入二陽之下故天下之入莫如風离麗也一陰離於二陽其卦錯然成文而華麗也天下之麗莫如火故又爲附麗之麗兊說也一陰出於外而說於物故天下之說莫如澤火内暗而外明故离陽在外火之用用外也水外暗而内明故坎陽在内水之用用内也三天兩地而倚數非天地之正數也倚者擬也擬天地正數而生也人謀人也鬼謀天也天人同謀而皆可則事成而吉也湯放桀武王伐紂而不以爲弑者若孟子言男女授受不親禮也嫂溺則援之以手權也故孔子旣尊夷齊亦與湯武夷齊仁也湯武義也唯湯武則可非湯武是篡也諸卦不交於乾坤者則生於否泰否泰乾坤之交也乾坤起自奇偶奇偶生自太極自泰至否其間則有蟲矣自否至泰其間則有隨矣天使我有是之謂命命之在我之謂性性之在物之謂理變從時而便天下之事不失禮之大經變從時而順天下之理不失義之大權者君子之道也朔易之陽氣自北方而生至北方而盡謂變易循環也春陽得權故多旱秋陰得權故多雨元有二有生天地之始太極也有萬物之中各有始者生之本也五星之說自甘公石公始也天地之心者生萬物之本也天地之情者情狀也與鬼神之情狀同天有五辰日月星辰與天而爲五地有五行金木水火與土而爲五有温泉而無寒火陰能從陽而陽不能從陰也有雷則有電有電則有風木之堅非雷不能震草之柔非露不能潤人智强則物智弱陽數於三百六十上盈陰數於三百六十上縮人爲萬物之靈寄類於走走陰也故百有二十雨生於水露生於土雷生於石電生於火電與風同爲陽之極故有電必有風莊子與惠子遊於濠梁之上莊子曰鯈魚出游從容是魚樂也此盡己之性能盡物之性也非魚則然天下之物皆然若莊子者可謂善通物矣莊子著盜跖篇所以明至惡雖至聖亦莫能化蓋上智與下愚不移故也魯國之儒一人者謂孔子也老子知易之體者也天下之事始過於重猶卒於輕始過於厚猶卒於薄况始以輕始以薄者乎故鮮失之重多失之輕鮮失之厚多失之薄是以君子不患過乎重常患過乎輕不患過乎厚常患過乎薄也莊子齊物未免乎較量較量則爭爭則不平不平則不和無思無爲者神妙致一之地也所謂一以貫之聖人以此洗心退藏於宻當仁不讓於師者進人之道也秦穆公伐鄭敗而有悔過自誓之言此非止霸者之事幾於王道能悔則無過矣此聖人所以録於書末也劉絢問無爲對曰時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取此所謂無爲也瞽瞍殺人舜視棄天下猶棄敝屣也竊負而逃遵海濱而處終身訢然樂而忘天下聖人雖天下之大不能易天性之愛文中子曰易樂者必多哀輕施者必好奪或曰天下皆爭利棄義吾獨若之何子曰舍其所爭取其所棄不亦君子乎若此之類禮義之言也心迹之判久矣若此之類造化之言也莊子氣豪若吕梁之事言之至者也盜跖言事之無可奈何者雖聖人亦莫如之何漁父言事之不可强者雖聖人亦不可强此言有爲無爲之理順理則無爲强則有爲也金須百鍊然後精人亦如此佛氏棄君臣父子夫婦之道豈自然之理哉志於道者統而言之志者潜心之謂也德者得於已有形故可據德主於仁故曰依莊子曰庖人雖不治庖尸祝不越樽俎而代之此君子思不出其位素位而行之意也晋狐射姑殺陽處父春秋書晋殺大夫陽處父上漏言也君不宻則失臣故書國殺人得中和之氣則剛柔均陽多則偏剛陰多則偏柔人之爲道當至於鬼神不能窺處是爲至矣作易者其知盜乎聖人知天下萬物之理而一以貫之大羹可和玄酒可漓則是造化亦可和可漓也有一日之物有一月之物有一時之物有一歲之物有十歲之物至於百千萬皆有之天地亦物也亦有數焉雀三年之物馬三十年之物凡飛走之物皆可以數推人百有二十年之物太極道之極也太玄道之玄也太素色之本也太一數之始也太初事之初也其成功則一也易地而處則無我也陰者陽之影鬼者人之影也氣以六變體以四分以尊降卑曰臨以上觀下曰觀毋意毋必毋固毋我合而言之則一分而言之則二合而言之則二分而言之則四始於有意成於有我有意然後有必必生於意有固然後有我我生於固意有心固不化我有已也記問之學未足以爲事業智哉留侯善藏其用思慮一萌鬼神得而知之矣故君子不可不愼獨時然後言言不在我也學在不止故王通云没身而已誠者主性之具無端無方者也皇極經世卷第十二之下
