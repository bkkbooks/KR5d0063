千人之人有萬人之人有億人之人有兆人之人爲兆人之人豈非聖乎是知人也者物之至者也聖也者人之至者也物之至者始得謂之物之物也人之至者始得謂之人之人也夫物之物者至物之謂也人之人者至人之謂也以一至物而當一至人則非聖人而何人謂之不聖則吾不信也何哉謂其能以一心觀萬心一身觀萬身一物觀萬物一世觀萬世者焉又謂其能以心代天意口代天言手代天功身代天事者焉又謂其能以上順天時下應地理中徇物情通盡人事者焉又謂其能以彌綸天地出入造化進退今古表裏時事者焉噫聖人者非世世而效聖焉吾不得而目見之也雖然吾不得而目見之察其心觀其跡探其體潜其用雖億萬千年亦可以理知之也人或告我曰天地之外别有天地萬物異乎此天地萬物則吾不得而知之也非唯吾不得而知之也聖人亦不得而知之也凡言知者謂其心得而知之也言言者謂其口得而言之也既心尚不得而知之口又惡得而言之乎以不可得知而知之是謂妄知也以不可得言而言之是謂妄言也吾又安能從妄人而行妄知妄言者乎觀物篇五十三易曰窮理盡性以至于命所以謂之理者物之理也所以謂之性者天之性也所以謂之命者處理性者也所以能處理性者非道而何是知道爲天地之本天地爲萬物之本以天地觀萬物則萬物爲萬物以道觀天地則天地亦爲萬物道之道盡之于天矣天之道盡之于地矣天地之道盡之于萬物矣天地萬物之道盡之于人矣人能知其天地萬物之道所以盡于人者然後能盡民也天之能盡物則謂之曰昊天人之能盡民則謂之曰聖人謂昊天能異乎萬物則非所以謂之昊天也謂聖人能異乎萬民則非所以謂之聖人也萬民與萬物同則聖人固不異乎昊天者矣然則聖人與昊天爲一道聖人與昊天爲一道則萬民與萬物亦可以爲一道一世之萬民與一世之萬物既可以爲一道則萬世之萬民與萬世之萬物亦可以爲一道也明矣夫昊天之盡物聖人之盡民皆有四府焉昊天之四府者春夏秋冬之謂也陰陽升降于其間矣聖人之四府者易書詩春秋之謂也禮樂污隆于其間矣春爲生物之府夏爲長物之府秋爲收物之府冬爲蔵物之府號物之庶謂之萬雖曰萬之又萬其庶能出此昊天之四府者乎易爲生民之府書爲長民之府詩爲收民之府春秋爲蔵民之府號民之庶謂之萬雖曰萬之又萬其庶能出此聖人之四府者乎昊天之四府者時也聖人之四府者經也昊天以時授人聖人以經法天天人之事當如何哉觀物篇五十四觀春則知易之所存乎觀夏則知書之所存乎觀秋則知詩之所存乎觀冬則知春秋之所存乎易之易者生生之謂也易之書者生長之謂也易之詩者生收之謂也易之春秋者生藏之謂也書之易者長生之謂也書之書者長長之謂也書之詩者長收之謂也書之春秋者長蔵之謂也詩之易者收生之謂也詩之書者收長之謂也詩之詩者收收之謂也詩之春秋者收蔵之謂也春秋之易者藏生之謂也春秋之書者藏長之謂也春秋之詩者藏收之謂也春秋之春秋者藏藏之謂也生生者修夫意者也生長者修夫言者也生收者修夫象者也生蔵者修夫數者也長生者修夫仁者也長長者修夫禮者也長收者修夫義者也長藏者修夫智者也收生者修夫性者也收長者修夫情者也收收者修夫形者也收藏者修夫體者也藏生者修夫聖者也藏長者修夫賢者也藏收者修夫才者也藏藏者修夫術者也修夫意者三皇之謂也修夫言者五帝之謂也修夫象者三王之謂也修夫數者五伯之謂也修夫仁者有虞之謂也修夫禮者夏禹之謂也修夫義者商湯之謂也修夫智者周發之謂也修夫性者文王之謂也修夫情者武王之謂也修夫形者周公之謂也修夫體者召公之謂也修夫聖者秦穆之謂也修夫賢者晋文之謂也修夫才者齊桓之謂也修夫術者楚莊之謂也皇帝王伯者易之體也虞夏商周者書之體也文武周召者詩之體也秦晋齊楚者春秋之體也意言象數者易之用也仁義禮智者書之用也性情形體者詩之用也聖賢才術者春秋之用也用也者心也體也者跡也心跡之間有權存焉者聖人之事也三皇同意而異化五帝同言而異教三王同象而異勸五伯同數而異率同意而異化者必以道以道化民者民亦以道歸之故尚自然夫自然者無爲無有之謂也無爲者非不爲也不固爲者也故能廣無有者非不有也不固有者也故能大廣大悉備而不固爲固有者其唯三皇乎是故知能以道化天下者天下亦以道歸焉所以聖人有言曰我無爲而民自化我無事而民自富我好靜而民自正我無欲而民自樸其斯之謂歟三皇同仁而異化五帝同禮而異教三王同義而異勸五伯同智而異率同禮而異教者必以德以德教民者民亦以德歸之故尚讓夫讓也者先人後己之謂也以天下授人而不爲輕若素無之也受人之天下而不爲重若素有之也若素無素有者謂不已無已有之也若己無巳有則舉一毛以取與于人猶有貪鄙之心生焉而况天下者乎能知其天下之天下非巳之天下者其唯五帝乎是故知能以德教天下者天下亦以德歸焉所以聖人有言曰垂衣裳而天下治蓋取諸乾坤其斯之謂歟三皇同性而異化五帝同情而異教三王同形而異勸五伯同體而異率同形而異勸者必以功以功勸民者民亦以功歸之故尚政夫政也者正也以正正夫不正之謂也天下之正莫如利民焉天下之不正莫如害民焉能利民者正則謂之曰王矣能害民者不正則謂之曰賊矣以利除害安有去王耶以王去賊安有弑君耶是故知王者正也能以功正天下之不正者天下亦以功歸焉所以聖人有言曰天地革而四時成焉湯武革命順乎天而應乎人其斯之謂歟三皇同聖而異化五帝同賢而異教三王同才而異勸五伯同術而異率同術而異率者必以力以力率民者民亦以力歸之故尚爭夫爭也者爭夫利者也取以利不以義然後謂之爭小爭交以言大爭交以兵爭夫强者也猶借夫名也者謂之曲直名也者命物正事之稱也利也者養人成務之具也名不以仁無以守業利不以義無以居功利不以功居名不以業守則亂矣民所以必爭之也五伯者借虛名以爭實利者也帝不足則王王不足則伯伯又不足則夷狄矣若然則五伯不謂無功于中國語其王則未也過夷狄則遠矣周之東遷文武之功德于是乎盡矣猶能維持二十四君王室不絶如綫夷狄不敢屠害中原者由五伯借名之力也是故知能以力率天下者天下亦以力歸焉所以聖人有言曰眇能視跛能履履虎尾咥人㐫武人爲于大君其斯之謂歟夫意也者盡物之性也言也者盡物之情也象也者盡物之形也數也者盡物之體也仁也者盡人之聖也禮也者盡人之賢也義也者盡人之才也智也者盡人之術也盡物之性者謂之道盡物之情者謂之德盡物之形者謂之功盡物之體者謂之力盡人之聖者謂之化盡人之賢者謂之教盡人之才者謂之勸盡人之術者謂之率道德功力者存乎體者也化教勸率者存乎用者也體用之間有變存焉者聖人之業也夫變也者昊天生萬物之謂也權也者聖人生萬民之謂也非生物非生民而得謂之權變乎觀物篇四十五善化天下者止于盡道而已善教天下者止于盡德而已善勸天下者止于盡功而已善率天下者止于盡力而已以道德功力爲化者乃謂之皇矣以道德功力爲教者乃謂之帝矣以道德功力爲勸者乃謂之王矣以道德功力爲率者乃謂之伯矣以化教勸率爲道者乃謂之易矣以化教勸率爲德者乃謂之書矣以化教勸率爲功者乃謂之詩矣以化教勸率爲力者乃謂之春秋矣此四者天地始則始焉天地終則終焉終始隨乎天地者也夫古今者在天地之間猶旦暮也以今觀今則謂之今矣以後觀今則今亦謂之古矣以今觀古則謂之古矣以古自觀則古亦謂之今矣是知古亦未必爲古今亦未必爲今皆自我而觀之也安知千古之前萬古之後其人不自我而觀之也若然則皇帝王伯者聖人之時也易書詩春秋者聖人之經也時有消長經有因革時有消長否泰盡之矣經有因革損益盡之矣否泰盡而體用分損益盡而心跡判體與用分心與跡判聖人之事業于是乎備矣所以自古當世之君天下者其命有四焉一曰正命二曰受命三曰改命四曰攝命正命者因而因者也受命者因而革者也改命者革而因者也攝命者革而革者也因而因者長而長者也因而革者長而消者也革而因者消而長者也革而革者消而消者也革而革者一世之事業也革而因者十世之事業也因而革者百世之事業也因而因者千世之事業也可以因則因可以革則革者萬世之事業也一世之事業者非五伯之道而何十世之事業者非三王之道而何百世之事業者非五帝之道而何千世之事業者非三皇之道而何萬世之事業者非仲尼之道而何是知皇帝王伯者命世之謂也仲尼者不世之謂也仲尼曰殷因于夏禮所損益可知也周因于殷禮所損益可知也其或繼周者雖百世可知也如是則何止于百世而已哉億千萬世皆可得而知之也人皆知仲尼之爲仲尼不知仲尼之所以爲仲尼不欲知仲尼之所以爲仲尼則巳如其必欲知仲尼之所以爲仲尼則捨天地將奚之焉人皆知天地之爲天地不知天地之所以爲天地不欲知天地之所以爲天地則已如其必欲知天地之所以爲天地則捨動靜將奚之焉夫一動一靜者天地至妙者歟夫一動一靜之間者天地人至妙至妙者歟是故知仲尼之所以能盡三才之道者謂其行無轍跡也觀物篇五十六孔子贊易自義軒而下序書自堯舜而下删詩自文武而下修春秋自桓文而下自義軒而下祖三皇也自堯舜而下宗五帝也自文武而下子三王也自桓文而下孫五伯也祖三皇尚賢也宗五帝亦尚賢也三皇尚賢以道五帝尚賢以德子三王尚親也孫五伯亦尚親也三王尚親以功五伯尚親以力嗚呼時之既往億萬千年時之未來亦億萬千年何祖宗之寡而子孫之多耶此所以重贊堯舜至禹曰禹吾無間然矣仲尼後禹千五百餘年今之後仲尼又千五百餘年雖不敢比德仲尼上贊堯舜禹豈不敢如孟子上贊仲尼乎人謂仲尼惜乎無土吾獨以爲不然疋夫以百畒爲土大夫以百里爲土諸侯以四境爲土天子以四海爲土仲尼以萬世爲土若然則孟子言自生民巳來未有如夫子斯亦不爲之過矣夫人不能自富必待天與其富然後能富人不能自貴必待天與其貴然後能貴若然則富貴在天也不在人也有求而得之者有求而不得者矣是繫乎天者也功德在人也不在天也可修而得之不修則不得是非繫乎天也繫乎人者也夫人之能求而得富貴者求其可得者也非其可得者非所以能求之也昧者不知求而得之則謂其己之能得也故矜之求而不得則謂其人之不與也故怨之如知其己之所以能得人之所以能與則天下安有不知量之人邪天下至富也天子至貴也豈可妄意求而得之也雖然天命亦未始不由積功累行聖君艱難以成之庸君暴虐以壞之是天歟是人歟是知人作之咎固難逃巳天降之災禳之奚益積功累行君子常分非有求而然也有求而然者所以謂利乎仁者也君子安有餘事于其間哉然而有幸與不幸者始可以語命也已夏禹以功有天下夏桀以虐失天下殷湯以功有天下殷紂以虐失天下周武以功有天下周幽以虐失天下三者雖時不同其成敗之形一也平王東遷無功以復王業赧王西走無虐以喪王室威令不逮一小國諸侯仰存于五伯而巳此又奚足道哉但時無眞王者出焉雖有虛名與𣏌宋其誰曰少異是時也春秋之作不亦冝乎仲尼修經周平王之時書終于晋文侯詩列爲王國風春秋始于魯隱公易盡于未濟卦予非知仲尼者學爲仲尼者也禮樂征伐自天子出而出自諸侯天子之重去矣宗周之功德自文武出而出自厲幽文武之基息矣由是犬戎得以侮中國周之諸侯非一獨晋能攘去戎狄徙王東都洛邑用存王國爲天下伯者之唱秬鬯圭瓚之所錫其能免乎傳稱子貢欲去魯告朔之餼羊孔子曰賜也爾愛其羊我愛其禮是知名存實亡者猶愈于名實俱亡者矣禮雖廢而羊存則後世安知無不復行禮者矣晋文公尊王雖用虛名猶能力使天下諸侯知有周天子而不敢以兵加之也及晋之衰也秦由是敢滅周斯愛禮之言信不誣矣齊景公嘗一日問政于孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸是時也諸侯僭天子陪臣執國命禄去公室政出私門景公自不能上奉周天子欲其臣下奉己不亦難乎厥後齊祚卒爲田氏所移夫齊之有田氏者亦猶晋之有三家也晋之有三家者亦猶周之有五伯也韓趙魏之于晋也旣立其功又分其地旣卑其主又奪其國田氏之于齊也既得其禄又專其政既殺其君又移其祚其如天下之事豈無漸乎履霜之戒寧不思乎傳稱王者往也能往天下者可以王矣周之衰也諸侯不朝天子久矣及楚預中國會盟仲尼始進爵爲之子其于僭王也不亦陋乎夫以力勝人者人亦以力勝之吴嘗破越而有輕楚之心及其破楚又有驕齊之志貪婪攻取不顧德義侵侮齊晋專以夷狄爲事遂復爲越所滅越又不監之其後復爲楚所滅楚又不監之其後復爲秦所滅秦又不監之其後復爲漢所代恃强凌弱與豺虎何以異乎非所以謂之中國義理之師也宋之爲國也爵高而力卑者乎盟不度德會不量力區區與諸侯並驅中原恥居其後其于伯也不亦難乎周之同姓諸侯而克永世者獨有燕在焉燕處北陸之地去中原特逺苟不隨韓趙魏齊楚較利刃爭虛名則足以養德待時觀諸侯之變秦雖虎狼亦未易加害延十五六年後天下事未可知也中原之地方九千里古不加多而今不加少然而有祚長祚短地大地小者攻守異故也自三代以降漢唐爲盛秦界于周漢之間矣秦始盛于穆公中于孝公終于始皇起于西夷遷于岐山徙于咸陽兵瀆宇内血流天下並吞四海更革今古雖不能比德三代非𣈆隋可同年而語也其祚之不水得非用法太酷殺人之多乎所以仲尼序書終于秦誓一事其㫖不亦逺乎夫好生者生之徒也好殺者死之徒也周之好生也以義漢之好牛也亦以義秦之好殺也以利楚之好殺也亦以利周之好生也以義而漢且不及秦之好殺也以利而楚又過之天之道人之情又奚擇于周秦漢楚哉擇乎善惡而已是知善也者無敵于天下而天下共善之惡也者亦無敵于天下而天下亦共惡之天之道人之情又奚擇于周秦漢楚哉擇乎善惡而已皇極經世卷第十一之上
