body:
  text: 三川邵堯夫撰以會經運之三觀物篇之十五經日之甲一經月之午七經星之甲一百八十一經辰之子二千一百六十一甲子八乙丑九丙寅十丁卯十一戊辰十二己巳十三庚午十四辛未十五壬申十六癸酉十七甲戌十八乙亥十九丙子二十丁丑二十一戊寅二十二己卯二十三庚辰二十四辛巳二十五壬午二十六癸未二十七東巡至于會稽崩甲申夏啓乙酉二丙戌三丁亥四戊子五己丑六庚寅七辛卯八壬辰九癸巳夏太康經辰之丑二千一百六十二甲午二乙未三丙申四丁酉五戊戌六己亥七庚子八辛丑九壬寅十癸卯十一甲辰十二乙巳十三丙午十四丁未十五戊申十六己酉十七庚戌十八辛亥十九壬子二十癸丑二十一甲寅二十二乙卯二十三丙辰二十四丁巳二十五戊午二十六己未二十七庚申二十八辛酉二十九太康失邦有窮后羿拒于河而死壬戌夏仲康癸亥二經辰之寅二千一百六十三甲子三乙丑四丙寅五丁卯六戊辰七己巳八庚午九辛未十壬申十一癸酉十二甲戌十三乙亥夏相丙子二丁丑三戊寅四己卯五庚辰六辛巳七壬午八癸未九甲申十乙酉十一丙戌十二丁亥十三戊子十四己丑十五庚寅十六辛卯十七壬辰十八癸巳十九經辰之卯二千一百六十四甲午二十乙未二十一丙申二十二丁酉二十三戊戌二十四己亥二十五庚子二十六辛丑二十七壬寅二十八寒浞殺有窮后羿代立使子澆及殪伐斟灌斟鄩氏滅相封澆于過封殪于戈相之臣靡逃于有苗氏相之后緍還于有仍氏始生少康癸卯夏少康始生二甲辰三乙巳四丙午五丁未六戊申七己酉八庚戌九辛亥十壬子十一癸丑十二甲寅十三乙卯十四丙辰十五丁巳十六戊午十七己未十八庚申十九辛酉二十壬戌二十一癸亥二十二經辰之辰二千一百六十五甲子二十三乙丑二十四丙寅二十五丁卯二十六戊辰二十七己巳二十八庚午二十九辛未三十壬申三十一癸酉三十二甲戌三十三乙亥三十四丙子三十五丁丑三十六戊寅三十七乙卯三十八庚辰三十九辛巳四十壬午夏少康立夏之巨靡自鬲收斟灌斟鄩之燼以滅浞而立少康少康既立遂滅澆于過滅殪于戈以絶有窮氏之族癸未二甲申三乙酉四丙戌五丁亥六戊子七己丑八庚寅九辛卯十壬辰十一癸巳十二經辰之巳二千日六十六甲午十三乙未十四丙申十五丁酉十六戊戌十七己亥十八庚子十九辛丑二十壬寅二十一癸卯二十二甲辰夏杼乙巳二丙午三丁未四戊申五己酉六庚戌七辛亥八壬子九癸丑十甲寅十一乙卯十二丙辰十三丁巳十四戊午十五己未十六庚申十七辛酉夏槐壬戌二癸亥三經辰之午二千一百六十七甲子四乙丑五丙寅六丁卯七戊辰八己巳九庚午十辛未十一壬申十二癸酉十三甲戌十四乙亥十五丙子十六丁丑十七戊寅十八己卯十九庚辰二十辛巳二十一壬午二十二癸未二十三甲申二十四乙酉二十五丙戌二十六丁亥夏芒戊子二己丑三庚寅四辛卯五壬辰六癸巳七經辰之未二千一百六十八甲午八乙未九丙申十丁酉十一戊戌十二己亥十三庚子十四辛丑十五壬寅十六癸卯十七甲辰十八乙巳夏泄丙午二丁未三戊申四己酉五庚戌六辛亥七壬子八癸丑九甲寅十乙卯十一丙辰十二丁巳十三戊午十四己未十五庚申十六辛酉夏不降壬戌二癸亥三經辰之申二千一百六十九甲子四乙丑五丙寅六丁卯七戊辰八己巳九庚午十辛未十一壬申十二癸酉十三甲戌十四乙亥十五丙子十六丁丑十七戊寅十八己卯十九庚辰二十辛巳二十一壬午二十二癸未二十三甲申二十四乙酉二十五丙戌二十六丁亥二十七戊子二十八己丑二十九庚寅三十辛卯三十一壬辰三十二癸巳三十三經辰之酉二千一百七十甲午三十四乙未三十五丙申三十六丁酉三十七戊戌三十八己亥三十九庚子四十辛丑四十一壬寅四十二癸卯四十三甲辰四十四乙巳四十五丙午四十六丁未四十七戊申四十八己酉四十九庚戌五十辛亥五十一壬子五十二癸丑五十三甲寅五十四乙卯五十五丙辰五十六丁巳五十七戊午五十八己未五十九庚申夏扃辛酉二壬戌三癸亥四經辰之戌二千一百七十一甲子五乙丑六丙寅七丁卯八戊辰九己巳十庚午十一辛未十二壬申十三癸酉十四甲戌十五乙亥十六丙子十七丁丑十八戊寅十九己卯二十庚辰二十一辛巳夏廑壬午二癸未三甲申四乙酉五丙戌六丁亥七戊子八己丑九庚寅十辛卯十一壬辰十二癸巳十三經辰之亥二千一百七十二甲午十四乙未十五丙申十六丁酉十七戊戌十八己亥十九庚子二十辛丑二十一壬寅夏孔甲癸卯二甲辰三乙巳四丙午五丁未六戊申七己酉八庚戌九辛亥十壬子十一癸丑十二甲寅十三乙卯十四丙辰十五丁巳十六戊午十七己未十八庚申十九辛酉二十壬戌二十一癸亥二十二皇極經世之三以會經運之四觀物篇之十六經日之甲一經月之午七經星之乙一百八十二經辰之子二千一百七十三甲子二十三乙丑二十四丙寅二十五丁卯二十六戊辰二十七己巳二十八庚午二十九辛未三十壬申三十一癸酉夏臯甲戌二乙亥三丙子四丁丑五戊寅六己卯七庚辰八辛巳九壬午十癸未十一甲申夏發乙酉二丙戌三丁亥四戊子五己丑六庚寅七辛卯八壬辰九癸巳十經辰之丑二千一百七十四甲午十一乙未十二丙申十三丁酉十四戊戌十五己亥十六庚子十七辛丑十八壬寅十九癸卯夏癸甲辰二乙巳三丙午四丁未五戊申六己酉七庚戌八辛亥九壬子十癸丑十一甲寅十二乙卯十三丙辰十四丁巳十五戊午十六己未十七庚申十八辛酉十九壬戌二十癸亥二十一經辰之寅二千一百七十五甲子二十二乙丑二