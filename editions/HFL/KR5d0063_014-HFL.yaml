front:
  text: 皇極經世卷第五之中詠二
  hash: sha256:f548aa33afe1fb4904ef5f8bc9d80b0d4f11d10a64a2dd2e67e25e5220900af2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0063_HFL_014-001a, image: hfl/0709/0709-103.png}
body:
  text: 三川邵堯夫撰以運經世之四觀物篇之二十八經元之甲一經會之午七經運之丙一百八十三經世之子二千一百八十五經世之子二千一百八十五甲子商王祖辛十年乙丑丙寅丁卯戊辰己巳庚午商王祖辛崩弟沃丁立辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之丑二千一百八十六甲午商王沃甲二十四年乙未商王沃甲崩國亂兄祖丁立丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之寅二千一百八十七甲子商王祖丁二十九年乙丑丙寅丁卯商王祖丁崩國亂沃甲之子南庚立戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰商王南庚崩國亂祖丁之子陽甲立諸侯不朝癸巳經世之卯二千一百八十八甲午商王陽甲二年乙未丙申丁酉戊戌己亥商王陽甲崩弟盤庚立復歸于亳改號曰殷庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之辰二千一百八十九甲子商王盤庚二十五年乙丑丙寅丁卯商王盤庚崩弟小辛立戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子商王小辛崩弟小乙立己丑庚寅辛卯壬辰癸巳經世之巳二千一百九十甲午商王小乙六年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰商王小乙崩子武丁踐位是謂高宗甘盤爲相以夢求傅說得之丁巳戊午己未庚申辛酉壬戌癸亥經世之午二千一百九十一甲子商王武丁八年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之未二千一百九十二甲午商王武丁三十八年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯商王高宗崩弟祖庚立丙辰丁巳戊午己未庚申辛酉壬戌商王祖庚崩弟祖甲立癸亥經世之申二千一百九十三甲子商王祖甲二年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳周文王生經世之酉二千一百九十四甲午商王祖甲三十二年乙未商王祖甲崩子廪辛踐位丙申丁酉戊戌己亥庚子辛丑商王廪辛崩弟庚丁立壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌商王庚丁崩子武乙踐位徙居河北癸亥經世之戌二千一百九十五甲子商王武乙二年乙丑丙寅商王武乙震死太丁立丁卯戊辰己巳商王太丁崩子帝乙踐位庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯周文王始即諸侯位庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之亥二千一百九十六甲午商王帝乙二十五年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午商王帝乙崩次子受辛立是謂之紂丁未戊申己酉庚戌辛亥壬子癸丑甲寅始嬖妲已乙卯丙辰丁巳戊午己未庚申辛酉商囚文王于羑里壬戌癸亥商紂乃放文王歸于國錫命爲西方諸侯伯皇極經世之五以運經世之五觀物篇之二十九經元之甲一經會之午七經運之丁一百八十四經世之子二千一百九十七經世之子二千一百九十七甲子商王受辛十八年西伯伐崇自岐徙居豐乙丑周西伯伐宻須丙寅周西伯戡黎丁卯周西伯伐邘戊辰己巳周文王没元子發踐位是謂武王葬文王于畢庚午辛未壬申癸酉甲戌乙亥丙子丁丑周武王東觀兵于盟津戊寅商王受殺太師比干囚箕子微子以祭器奔周己卯吕尚相武王伐商師逾盟津大陳兵于商郊敗之于牧野殺紂立其子武庚爲後還歸在豐踐天子位南面朝諸侯大誥天下以子月爲歲始曰年與民更始庚辰命管叔蔡叔霍叔守邶鄘衛之三邑謂之三監辛巳壬午癸未甲申乙酉周武王崩元子誦踐位是謂成王周公爲太師召公爲太保二公分治陜洛受顧命率天下諸侯夾輔王室葬武王于畢丙戌三監及淮夷叛周公東征大誥天下丁亥戊子三監平始黜商命殺武庚命微子啓于宋以杞商後封康叔于衛以保商民命箕子于高麗辟管叔于商囚蔡叔于郭鄰降霍叔爲庶人不齒東征淮夷魯侯伯禽誓師于費淮夷平遂踐奄肅愼來賀己丑庚寅徃營成周命召公相宅辛卯壬辰成周旣成周公分政成周東郊以王命誥多士癸巳經世之丑二千一百九十八甲午周成王九年乙未丙申周公没命君陳分政成周東郊葬周公于畢丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌周成王崩召公畢公受顧命輔元子釗踐位是謂康王癸亥周康王元年命畢公代君陳分政成周東郊經世之寅二千一百九十九甲子周康王二年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子周康王崩子瑕踐位是謂昭王己丑庚寅辛卯壬辰癸巳經世之卯二千二百甲午周昭王六年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之辰二千二百一甲子周昭王三十六年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯周昭王南巡不返子滿立是謂穆王庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之巳二千二百二甲午周穆王十五年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之午二千二百三甲子周穆王四十五年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌周穆王崩子繄扈踐位是謂共王乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌周共王崩子囏踐位是謂懿王丁亥戊子己丑庚寅辛卯壬辰癸巳經世之未二千二百四甲午周懿王八年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥周懿王崩穆王子辟方立是謂孝王壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之申二千二百五甲子周孝王十三年乙丑丙寅周孝王崩懿王子燮立是謂夷王國自此衰矣丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午周夷王崩子起踐位是謂厲王癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之酉二千二百六甲午周厲王十二年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑周厲王好利以榮公爲卿甲寅乙卯丙辰殺諫臣以爲謗己者丁巳戊午己未周厲王爲國人所逐出奔彘周召二伯行政謂之共和太子靜匿于召公家文武之德自此盡矣庚申辛酉壬戌癸亥經世之戌二千二百七甲子周厲王四十二年在彘乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉周厲王死于彘周召二伯立太子靜是謂宣王有仲山甫尹吉甫方叔申伯爲輔大修文武之功甲戌周宣王北伐獫狁至于太原吉甫爲將乙亥周宣王南征荆蠻方叔爲將丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之亥二千二百八甲午周宣王二十一年乙未宣王封弟友于鄭丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳伐魯立孝公丙午丁未戊申己酉庚戌辛亥壬子伐姜戎師敗于千畝遂失南國癸丑料民于太原甲寅乙卯丙辰丁巳戊午己未周宣王崩太子宫涅踐位是謂幽王庚申辛酉壬戌始嬖褒姒癸亥皇極經世卷第五之中
