  text: 三川邵堯夫撰以會經運之十一觀物篇之二十三經日之甲一經月之午七經星之壬一百八十九經辰之子二千二百五十七甲子十五麟德乙丑十六丙寅十七乾封丁卯十八戊辰十九總章己巳二十庚午二十一咸亨辛未二十二壬申二十三癸酉二十四甲戌二十五上元乙亥二十六丙子二十七儀鳳丁丑二十八戊寅二十九己卯三十調露庚辰三十一永隆辛巳三十二開耀壬午三十三永淳癸未三十四弘道甲申唐中宗嗣聖武后廢帝爲陵王遷之均立豫章王旦改元文明再改元光宅乙酉二武后徙帝于房丙戌三丁亥四戊子五己丑六武后改元永昌庚寅七武后改元載初又改國爲周元曰天授豫章王旦爲皇嗣辛卯八壬辰九武后改元如意再改長壽癸巳十經辰之丑二千二百五十八甲午十一武后改元延乾乙未十二武后改元證聖再改元天册萬歲丙申十三武后改元萬歲登封再改萬歲通天丁酉十四武后改元神功戊戌十五武后改元聖曆召帝房陵復政己亥十六庚子十七武后改元久視辛丑十八武后改元大足再改元長安壬寅十九癸卯二十甲辰二十一乙巳二十二復唐改元神龍中宗年號丙午二十三丁未二十四景龍戊申二十五己酉二十六庚戌唐睿宗景雲辛亥二壬子唐玄宗先天癸丑二開元甲寅三乙卯四丙辰五丁巳六戊午七己未八庚申九辛酉十壬戌十一癸亥十二經辰之寅二千二百五十九甲子十三乙丑十四丙寅十五丁卯十六戊辰十七己巳十八庚午十九辛未二十壬申二十一癸酉二十二甲戌二十三乙亥二十四丙子二十五楊妃入宫丁丑二十六戊寅二十七己卯二十八庚辰二十九辛巳三十壬午三十一天寶癸未三十二甲申三十三乙酉三十四丙戌三十五丁亥三十六戊子三十七己丑三十八庚寅三十九辛卯四十壬辰四十一癸巳四十二經辰之卯二千二百六十甲午四十三乙未四十四丙申唐肅宗至德丁酉二戊戌三乾元己亥四庚子五上元辛丑六壬寅七寶應癸卯唐代宗廣德甲辰二乙巳三永泰丙午四大曆丁未五戊申六己酉七庚戌八辛亥九壬子十癸丑十一甲寅十二乙卯十三丙辰十四丁巳十五戊午十六己未十七庚申唐德宗建中辛酉二壬戌三癸亥四經辰之辰二千二百六十一甲子五興元乙丑六貞元丙寅七丁卯八戊辰九己巳十庚午十一辛未十二壬申十三癸酉十四甲戌十五乙亥十六丙子十七丁丑十八戊寅十九己卯二十庚辰二十一辛巳二十二壬午二十三癸未二十四甲申二十五乙酉二十六順宗不及年丙戌唐憲宗元和丁亥二戊子三己丑四庚寅五辛卯六壬辰七癸巳八經辰之巳二千二百六十二甲午九乙未十丙申十一丁酉十二戊戌十三己亥十四庚子十五辛丑唐穆宗長慶壬寅二癸卯三甲辰四乙巳唐敬宗寶曆丙午二丁未唐文宗大和戊申二己酉三庚戌四辛亥五壬子六癸丑七甲寅八乙卯九丙辰十開成丁巳十一戊午十二己未十三庚申十四辛酉唐武宗會昌壬戌二癸亥三經辰之午二千二百六十三甲子四乙丑五丙寅六丁卯唐宣宗大平戊辰二己巳三庚午四辛未五壬申六癸酉七甲戌八乙亥九丙子十丁丑十一戊寅十二己卯十三庚辰唐懿宗咸通辛巳二壬午三癸未四甲申五乙酉六丙戌七丁亥八戊子九己丑十庚寅十一辛卯十二壬辰十三癸巳十四經辰之未二千二百六十四甲午唐僖宗乾符乙未二丙申三王仙芝陷淮南丁酉四黄巢陷沂鄆戊戌五己亥六庚子七廣明黄巢䧟兩京稱齊金統辛丑八中和壬寅九癸卯十黄巢走藍關甲辰十一乙巳十二光啓丙午十三建身王潮據福州丁未十四二戊申十五文德三己酉唐昭宗龍紀四錢鏐據杭州王建據咸都庚戌二五二二辛亥三六三三楊行宻據揚州壬子四景福七四四二癸丑五八五五三甲寅六乾寧九六六四李茂貞據鳳翔乙卯七十七七五二丙辰八十一八八六三丁巳九十二九九七四戊午十光化閩王審知十十八五己未十一二十一十一九六庚申十二三十二十二十七辛酉十三天復四十三十三十一八壬戌十四五十四封越王十四十二封吴王九癸亥十五六十五十五十三十經辰之申二千二百六十五甲子十六天祐七十六十六十四十一乙丑唐哀帝八十七十七吴渥立十二丙寅二九十八十八二十三丁卯梁全忠開平十十九十九三十四戊辰二十一二十蜀王建稱帝吴渭立十五己巳三十二二十一二武成二十六庚午四十三二十二三三十七辛未五乾化十四二十三四四十八壬申梁友珪鳳歷十五二十四五五十九癸酉梁友貞乾化十六二十五六六二十甲戌二十七二十六七七二十一乙亥三貞明十八二十七八八二十二丙子四十九二十八九通正九二十三丁丑五二十二十九十天漢十二十四南漢劉陟乾亨戊寅六二十一三十十一天光十一二十五二己卯七二十二三十一蜀王衍乾德十二渭帝武義二十六三庚辰八二十三三十二二二二十七四辛巳九龍德二十四三十三三吴溥立順義二十八五壬午十二十五三十四四二二十九六癸未後唐莊宗同光二十六三十五五三附于後唐七甲申二二十七三十六六四八乙酉三滅蜀閩延翰三十七蜀亡五九曰龍丙戌後唐明宗大成閩延鈞三十八六十丁亥二二三十九七十一契丹耶德光天戊子三三四十八十二大有二己丑四四四十一九十三三庚寅五長興五四十二十十四四辛卯六六四十三十一十五五壬辰七七四十四十二十六六癸巳後唐閔帝八吴王元瓘十三十七七經辰之酉二千二百六十六甲午後唐從坷清泰九二蜀孟知祥明德十四十八八乙未二閩永和王昶三蜀孟昶明德十五天祚十九九丙申晋敬塘天福二通文四二十六二十十丁酉二三五三南唐半昇元二十一十一戊戌三四