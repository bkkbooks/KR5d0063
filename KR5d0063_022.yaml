body:
  text: 三川邵堯夫撰觀物外篇天數五地數五合而為十數之全也天以一而變四地以一而變四四者有體也而其一者無體也是謂有無之極也天之體數四而用者三不用者一也地之體數四而用者三不用者一也是故無體之一以况自然也不用之一以况道也用之者三以况天地人也體者八變用者六變是以八卦之象不易者四反易者二以六卦變而成八也重卦之象不易者八反易者二十八以三十六變而成六十四也故爻止于六卦盡于八策窮于三十六而重卦極于六十四也卦成于八重于六十四爻成于六策窮于三十六而重于三百八十四也天有四時一時四月一月四十日四四十六而各去其一是以一時三月一月三十日也四時體數也三月三十日用數也體雖具四而其一常不用也故用者止于三而極于九也體數常偶故有四有十二用數常奇故有三有九大數不足而小數常盈者何也以其大者不可見而小者可見也故時止乎四月止乎三而日盈乎十也是以人之交體有四而指有十也天見乎南而潛乎北極于六而餘于七是以人知其前昧其後而略其左右也天體數四而用三地體數四而用三天尅地地尅天而尅者在地猶晝之餘分在夜也是以天三而地四天有三辰地有四行也然地之大且見且隱其餘分之謂邪天有二正地有二正而共用二變以成八卦也天有四正地有四正共用二十八變以成六十四卦也是以小成之卦正者四變者二共六卦也大成之卦正者八變者二十八共三十六卦也乾坤離坎為三十六卦之祖也兊震巽艮為二十八卦之祖也乾七子兊六子離五子震四子巽三子坎二子艮一子坤全陰故無子乾七子坤六子兊五子艮四子離三子坎二子震一子巽剛故無子乾坤七變是以晝夜之極不過七分也兊艮六變是以月止于六共為十二也離坎五變是以日止于五共為十也震巽四變是以體止于四共為八也卦之正變共三十六而爻又有二百一十六則用數之策也三十六去四則三十二也又去四則二十八也又去四則二十四也故卦數三十二位去四而言之也天數二十八位去八而言之也地數二十四位去十二而言之也四者乾坤離坎也八者并頤孚大小過也十二者兊震泰既濟也日有八位而用止于七去乾而言之也月有八位用止于六去兊而言之也星有八位用止于五去離而言之也辰有八位用止于四去震而言之也日有八位而數止于七去泰而言之也月自兊起者月不能及日之數也故十二月常餘十二日也陽無十故不足于後陰無一故不足于首乾陽中陽不可變故一年止舉十二月也震陰中陽不可變故一日之十二時不可見也兊陽中陰離陰中陽皆可變故日月之數可分也是陰數以十二起陽數以三十起常存二六也舉年見月舉月見日舉日見時陽統陰也是天四變含地四變日之變含月與星辰之變也是以一卦含四卦也日一位月一位星一位辰一位日有四位月有四位星有四位辰有四位四四有十六位此一變而日月之數窮矣天有四變地有四變變有長也有消也十有六變而天地之數窮矣日起於一月起於二星起於三辰起於四引而伸之陽數常六陰數常二而大小之運窮三百六十變為十二萬九千六百十二萬九千六百變為一百六十七億九千六百一十六萬一百六十七億九千六百一十六萬變為二萬八千二百一十一兆九百九十萬七千四百五十六億以三百六十為時以一十二萬九千六百為日以一百六十七億九千六百分而為三十以當一年十二月之數而進退六日矣三百六十以當一時之數隨小運之進退以當晝夜之時也十六變之數去其交數取其用數得二萬八千二百一十一兆九百九十一萬七千四百五十六億二萬八千二百一十一兆九百九十一萬七千四百五十六億分而為十二限前六限為長後六限為消每限得三十億九千九百六十八萬之一百六十七億九千六百一十六萬每一百六十七億九千六百一十六萬衍開一分進六十日也六限開六分進三百六十日也猶有餘分之一故開七分進三百六十六日也其退亦若是矣十二萬九千六百去其三者交數也取其七者用數也用數三而成于六加餘分故有七也七之得九萬七百二十年半之得四萬五千三百六十年以進六日也日有晝夜數有朓朒以成十有二日也每三千六百年進一日凡四萬三千二百年進十有二日也餘二千一百六十年以進餘分之六合交數之二千一百六十年共進十有二分以為閏也故小運之變凡六十而成三百六十有六日也乾為一乾之五爻分而為大有以當三百六十之數也乾之四爻分而為小畜以當十二萬九千六百之數也乾之三爻分而為履以當一百六十七億九千六百一十六萬之數也乾之二爻分而為同人以當二萬八千二百一十一兆九百九十萬七千四百五十六億之數也乾之六爻分而為姤以當是謂分數也分大為小皆自上而六故以陽數當之如一分為十二十一分為三百六十也天統乎體故八變而終于十六地分乎用故六變而終于十二天起於一而終于地起於十二而終于二百四秭六千九百八十萬七千三百八十一垓五千四百九十一萬八千四百九十九兆七百二十萬億也一生二為夬當十二之數也二生四為大壯當四千三百二十之數也四生八為泰當五億五千九百八十七萬二千之數也八生十六為臨當九百四十四兆三千六百九十九萬六千九百一十五億二千萬之數也十六生三十二為復當之數也三十二生六十四為坤當無極之數也是謂長數也長小為大皆自下而上故以陰數當之有地然後有二有二然后有晝夜二三以變錯綜而成故易以二而生數以十二而變而一非數也非數而數以之成也天行不息未嘗有晝夜人居地上以為晝夜故以地上之數為人之用也天自臨以上地自師以上運數也天自同人以下地自遁以下年數也運數則在天者也年數則在地者也天自賁以上地自艮以上用數也天自明夷以下地自否以下交數也天自震以上地自𣈆以上有數也天自益以下地自豫以下無數也天之有數起乾而止震餘入于無者天辰不見也地去一而起十二者地火常潛也故天以體為基而常隱其基地以用為本而常藏其用也一時止于三月一月止于三十日皆去其辰數也是以八八之卦六十四而不變者八可變者七七八五十六其義亦由此矣陽爻晝數也陰爻夜數也天地相銜陰陽相交故晝夜相離剛柔相錯春夏陽也故晝數多夜數少秋冬陰也故晝數少夜數多體數之策三百八十四去乾坤離坎之策為用數三百六十體數之用二百七十去乾與離坎之策為用數之用二百五十二也體數之用二百七十其一百五十六為陽一百一十四為陰去離之策得一百五十二陽一百一十二陰為實用之數也蓋陽去離而用乾陰去坤而用坎也是以天之陽策一百一十二去其陰也地之陰策一百一十二陽策四十去其南北之陽也極南大暑極北大寒物不能生是以去之也其四十為天之餘分邪陽侵陰晝侵夜是以在地也合之為一百五十二陽一百一十二陰也陽去乾之策陰去坎之策得一百四十四陽一百八陰為用數之用也陽三十六三之為一百八陰三十六三之為一百八三陽三陰陰陽各半也陽有餘分之一為三十六合之為一百四十四陽一百八陰也故體數之用二百七十而實用者二百六十四用數之用二百五十二也卦有六十四而用止乎三十六爻有三百八十四而用止于二百一十有六也六十四分而為二百五十六是以一卦去其初上之爻亦二百五十六也此生物之數也故離坎為生物之主以離四陽坎四陰故生物者必四也陽一百一十二陰一百一十二去其離坎之爻則二百一十六也陰陽之四十共為二百五十六也是以八卦用六爻乾坤主之也六爻用四位離坎主之也故天之昏曉不生物而日中生物地之南北不生物而中央生物也體數何為者也生物者也用數何為者也運行者也運行者天也生物者地也天以獨運故以用數自相乘而以用數之用為生物之時也地耦而生故以體數之用陽乘陰為生物之數也天數三故六六而又六之是以乾之策二百一十六也數兩故十二而十二之是以坤之策百四十有四也乾用九故三其八為二十四而九之亦二百一十有六兩其八為十六而九之亦百四十有四也坤用六故三其十二為三十六而六之亦二百一十有六也兩其十二為二十四而六之亦百四十有四也坤以十二之二十六之四六之一與半為乾之餘分則乾得二百五十二坤得一百八也陽四卦十二爻八陽四陰以三十六乘其陽以二十四乘其陰則三百八十四也卦之反對皆六陽六陰也在易則六陽六陰者十有二對也去四止者八陽四陰八陰四陽者各六對也十陽二陰十陰二陽者各三對也體有三百八十四而用止于三百六十何也以乾坤離坎之不用也乾坤離坎之不用何也乾坤離坎之不用所以成三百六十之用也故萬物變易而四者不變也夫惟不變是以能變也用止于三百六十而有三百六十六何也數之嬴也數之嬴則何用也乾之全用也乾坤不用則離坎用半也乾全用者何也陽主嬴也乾坤不用者何也獨陽不生寡陰不成也離坎用半何也離東坎西當陰陽之半為春秋晝夜之門也或用乾或用離坎何也主嬴而言之故用乾也主嬴分而言之則陽侵陰晝侵夜故用離坎也乾主嬴故全用也陰主虛故坤全不用也陽侵陰陰侵陽故離坎用半也是以天之南全見而北全不見東西各半見也離坎陰陽之限也故離當寅坎當申而數常踰之者蓋陰陽之溢也然用數不過乎寅交數不過乎申或離當卯坎當酉乾四十八而四分之一分為陰所尅坤四十八而四分之一分為所尅之陽也故乾得三十六而坤得十二也陽主進是以進之為三百六十日陰主消是以十二月消十二日也順數之乾一兊二離三震四巽五坎六艮七坤八逆數之震一離兌二乾三巽四坎艮五坤六也乾四十八兌三十離二十四震十坤十二艮二十坎三十六巽四十乾三十六坤十二離兊巽二十八坎艮震二十兊離上正更思之圓數有一方數有二奇偶之義也六即一也十二即二也天圓而地方圓者數之起一而積六方者數之起一而積八變之則起四而積十二也六者常以六變八者常以八變而十二者亦以八變自然之道也八者天地之體也六者天之用也十二者地之用也天變方為圓而常存其一地分一為四而常執其方天變其體而不變其用也地變其用而不變其體也六者并其一而為七十二者并其四而為十六也陽主進故天并其一而為七陰主退故地去其四而止於十二也是陽常存一而陰常晦一也故天地之體止於八而天之用極于七地之用止于十二也圓者刓方以為用故一變四四去其一則三也三變九九去其三則六也方者引圓以為體故一變三並之四也四變十二并之十六也故用數成於三而極於六體數成於四而極于十六也是以圓者徑一而圍三起一而積六方者分一而為四分四而為十六皆自然之道也一役二以生三三去其一則二也三生九九去其一則八也去其三則六也故一役三三復役二也三役九九復役八與六也是以二生四八生十六六生十二也三并一則為四九并三則為十二十二又并四則為十六故四以一為本三為用十二以三為本九為用十六以四為本十二為用更思之陽尊而神尊故役物神故藏用是以道生天地萬物而不自見也天地萬物亦取法乎道矣陽者道之用陰者道之體陽用陰陰用陽以陽為用則尊陰以陰為用則尊陽也陰幾於道故以况道也六變而三十六矣八變而成六十四矣十二變而成三百八十四矣六六而變之八八六十四變而成三百八十四矣八八而變之七七四十九變而成三百八十四矣圓者六變六六而進之故六十變而三百六十矣方者八變故八八而成六十四矣陽主進是以進之為六十也圓者星也曆紀之數其肇於此乎方者土也畫州井地之法其倣於此乎蓋圓者河圖之數方者洛書之文故犧文因之而造易禹箕敘之而作範也蓍數不以六而以七何也并其餘分也去其餘分則六故策數三十六也是以五十者六十四閏歲之策也其用四十有九六十四卦一歲之策也歸奇卦一猶一歲之閏也卦直去四者何也天變而地效之是以蓍去一則卦去四也圓者徑一圍三重之則六方者徑一圍四重之則八也裁方而為圓天之所以運行分大而為小地所生化故天用六變地用四變也一八為九裁為七八裁為六十六裁為十二二十四裁為十八三十二裁為二十四四十裁為三十四十八裁為三十六五十六裁為四十二六十四裁為四十八也一分為四八分為三十二十六分為六十四以至九十六分為三百八十四也一生六六生十二十二生十八十八生二十四二十四生三十三十生三十六引而伸之六十變而生三百六十矣此運行之數也四生十二十二生二十二十生二十八二十八生三十六此生物之數也故乾之陽策三十六兌離巽之陽策二十八震坎艮之陽策二十坤之陽策十二也圓者一變則生六去一則五也二變則生十二去二則十也三變則生十八去三則十五也四變則二十四去四則二十也五變則三十去五則二十五也六變則三十六去六則三十也是以存之則六六去之則五五也五則四而存一也四則三而存一也二則一而存一也故一生二去一則一也二生三去一則二也三生四去一則三也四生五去一則四也是故二以一為本三以二為本四以三為本五以四為本六以五為本也更思之方者一變而為四四生八并四而為十二八生十二并八而為二十十二生十六并十二而為二十八十六生二十并十六而為三十六也一生三并而為四也十二生二十并而為三十二也二十八生三十六并而為六十四也更思之易之大衍何數也聖人之倚數也天數二十五合之為五十地數三十合之為六十故曰五位相得而各有合也五十者蓍之數也六十者卦數也五者蓍之小衍也數五十為大衍也八者卦之小成也六十四為大成也蓍德圓以况天之數故七七四十九也五十者存一而言之也卦德方以况地之數故八八六十四也六十者去四而言之也蓍者用數也卦者體數也用以體為基故存一也體以用為本故去四也圓者本一方者本四故蓍存一而卦去四也蓍之用數七若其餘分亦存一之義也挂其一亦去一之義也蓍之用數挂一以象三其餘四十八則一卦之策也四其十二為四十八也十二去三而用九四八三十二所去之策也四九三十六所用之策也以當乾之三十六陽爻也十二去五而用七四五二十所去之策也四七二十八所用之策也以當兌離之二十八陽爻也十二去六而用六四六二十四所去之策也四六二十四所用之策也以當坤之半二十四陰爻也十二去四而用八四四十六所去之策也四八三十二所用之策也以當艮坎之二十四爻并上卦之八陰為三十四爻也是故七九為陽六八為陰也九者陽之極數六者陰之極數數極則反故為卦之變也震巽無策者以當不用之數天以剛為德故柔者不見地以柔為體故剛者不生是震巽不用也乾用九故其策九也四之者以應四時一時九十日也坤用六故其策亦六也奇數四有一有二有三有四也策數四有六有七有八有九合而為八數以應方數之八變也歸奇合卦之數有六謂五與四四也九與八八也五與四八也九與四八也五與八八也九與四四也以應圓數之六變也奇數極於四而五不用策數極于九而十不用五則一也十則二也故去五十而用四十九也奇不用五策不用十有無之極也以况自然之數也卦有六十四而用止六十者何也六十卦者三百六十爻也故甲子止于六十也六甲而天道窮矣是以策數應之三十六與二十四合之則六十也三十二與二十八合之亦六十也乾四十八坤十二震二十巽四十離兊三十二坎艮二十八合之為六十蓍數全故陽策也三十六與二十八合之為六十四也卦數去其四故陰策二十四與三十二合之為五十六也九進之為三十六皆陽數也故為陽中之陽七進之為二十八先陽而後陰也故為陽中之陰六進之為二十四皆陰數也故為陰中之陰八進之為三十二先陰而後陽也故為陰中之陽蓍四進之則百卦四進之則百二十百則十也百二十則十二也歸奇合卦之數得五與四四則策數四九也得九與八則策數四六也得五與八八得九與四八則策數皆四七也得九與四四得五與四八則策數皆四八也為九者一變以應乾也為六者一變以應坤也為七者二變以應兊與離也為八者二變以應艮與坎也五與四四去卦一之數則四八三十二也九與八八去卦一之數則四六二十四也五與八八九與四八去卦一之數則四五二十也九與四四五與四八去卦一之數則四四十六也故去其三四五六之數以成九八七六之策也天一地二天三地四天五地六天七地八天九地十參伍以變錯綜其數也如天地之相銜晝夜之相交也一者數之始而非數也故二二為四三三為九四四為十六五五為二十五六六為三十六七七為四十九八八為六十四九九為八十一而一不可變也百則十也十則一也亦不可變也是故數去其一而極于九皆用其變者也五五二十五天數也六六三十六乾之策數也七七四十九大衍之用數也八八六十四卦數也九九八十一玄範之數也大衍之數其算法之源乎是以算數之起不過乎方圓曲直也陰無一陽無十乘數生數也除數消數也算法雖多不出乎此矣陽得陰而生陰得陽而成故蓍數四而九卦數四而十也猶幹支之相錯幹以六終而支以五終也三四十二也二六亦十二也二其十二二十四也三八亦二十四也四六亦二十四也三其十二三十六也四九亦三十六也六六亦三十六也四其十二四十八也三其十六亦四十八也六八亦四十八也五其十二六十也三其二十亦六十也六其十亦六十也之相符也四九三十六也六六三十六也陽六而又兼陰六之半是以九也故六者言之陰陽各三也以三爻言之天地人各三也陰陽之中各有天地人天地人之中各有陰陽故參天兩地而倚數也太極既分兩儀立矣陽下交於陰陰上交於陽四象生矣陽交於陰陰交於陽而生天之四象剛交於柔柔交於剛而生地之四象於是八卦成矣八卦相錯然後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四故曰分陰分陽迭用柔剛易六位而成章也十分為百百為分千千分為萬猶根之有幹幹之有枝枝之有葉愈大則愈少愈細則愈繁合之斯為一衍之斯為萬是故乾以分之坤以翕之震以長之巽以消之長則分分則消消則翕也乾坤定位也震巽一交也兊離坎艮再交也故震陽少而陰尚多也巽陰少而陽尚多也兊離陽浸多也坎艮陰浸多也是以辰與火不見也一氣分而陰陽判得陽之多者為天得陰之多者為地是故陰陽半而形質具焉陰陽偏而性情分焉形質各分則多陽者為剛也多陰者為柔也性情又分則多陽者陽之極也多陰者陰之極也兊離巽得陽之多者也艮坎震得陰之多者也以為天地用也乾陽極坤陰極是以不用也乾四分取一以與坤坤四分取一以奉乾乾坤合而生六子三男皆陽也三女皆陰也兌分一陽以與艮坎分一陰以奉離震巽以二相易合而言之陰陽各半是以水火相生而相尅然後既成萬物也乾坤之名位不可易也坎離名可易而位不可易也震巽位可易而名不可易也兊艮名與位皆可易也離肖乾坎肖坤中孚肖乾頤肖離小過肖坤大過肖坎是以乾坤離坎中孚頤大過小過皆不可易者也離在天而當夜故陽中有陰也坎在地而當晝故陰中有陽也震始交陰而陽生巽始消陽而陰生兊陽長也艮陰長也震兊在天之陰也巽艮在地之陽也故震兊上陰而下陽巽艮上陽而下陰天以始生言之故陰上而陽下交泰之義也地以既成言之故陽上而陰下尊卑之位也乾坤定上下之位離坎列左右之門天地之所闔闢日月之所出入是以春夏秋冬晦朔弦望晝夜長短行度盈縮莫不由乎此矣無極之前陰含陽也有象之後陽分陰也陰為陽之母陽為陰之父故母孕長男而為復父生長女而為姤是以陽起於復而陰起於姤也性非體不成體非性不生陽以陰為體陰以陽為性動者性也靜者體也在天則陽動而陰靜在地則陽靜而陰動性得體而靜體隨性而動是以陽舒而陰疾也更詳之陽不能獨立必得陰而後立故陽以陰為基陰不能自見必待陽而後見故陰以陽為唱陽知其始而享其成陰效其法而終其勞陽能知而陰不能知陽能見而陰不能見也能知能見者為有故陽性有而陰性無也陽有所不遍而陰無所不遍也陽有去陰常居也無不遍而常居者為實故陽體虛而陰體實也自下而上謂之升自上而下謂之降升者生也降者消也故陽生於下而陰生於上是以萬物皆反生陰生陽陽生陰陰復生陽陽復生陰是以循環而無窮也天地之本其起於中乎是以乾坤屢變而不離乎中人居天地之中心居人之中日中則盛月中則盈故君子貴中也本一氣也生則為陽消則為陰故二者一而已矣六者三而已矣八者四而已矣是以言天而不言地言君而不言臣言父而不言子言夫而不言婦也然天得地而萬物生君得臣而萬化行父得子夫得婦而家道成故有一則有二有二則有四有三則有六有四則有八陰陽生而分二儀二儀交而生四象四象交而成八卦八卦交而生萬物故二儀生天地之類四象定天地之體四象生八卦之類八卦定日月之體八卦生萬物之類重卦定萬物之體類者生之序也體者象之交也推類者必本乎生觀體者必由乎象生則未來而逆推象則既成而順觀是故日月一類物同出而異處也異處而同象也推此以往物奚逃哉天變時而地應物時則陰變而陽應物則陽變而陰應故時可逆知物必順成是以陽迎而陰隨陰逆而陽順語其體則天分而為地地分而為萬物而道不可分也其終則萬物歸地地歸天天歸道是以君子貴道也有變則必有應也故變于內者應于外變于外者應于內變于下者應于上變于上者應于下也天變而日應之故變者從天而應者法日也是以日紀乎星月會於辰水生於土火潛於石飛者棲木走者依草心肺之相聯肝膽之相屬無它應變之道也本乎天者親上本乎地者親下故變之與應常反對也陽交於陰而生蹄角之類也剛交於柔而生根荄之類也陰交於陽而生羽翼之類也柔交於剛而生枝幹之類也天交於地地交於天故有羽而走者足而騰者草中有木木中有草也各以類而推之則生物之類不逃數矣走者便於下飛者利於上從其類也陸中之物水中必具者猶影象也陸多走水多飛者交也是故巨于陸者必細于水巨于水者必細于陸也虎豹之毛猶草也鷹鸇之羽猶木也木者星之子是以果實象之葉陰也華實陽也枝葉耎而根幹堅也人之骨巨而體繁木之幹巨而葉繁應天地之數也動者體橫植者體縱人宜橫而反縱也飛者有翅走者有趾人之兩手翅也兩足趾也飛者食木走者食草人皆兼之而又食飛走也故最貴於萬物也體必交而後生故陽與剛交而生心肺陽與柔交而生肝膽柔與陰交而生腎與膀胱剛與陰交而生脾胃心生目膽生耳脾生鼻腎生口肺生骨肝生肉胃生髓膀胱生血故乾為心兊為脾離為膽震為腎坤為血艮為肉坎為髓巽為骨泰為目中孚為鼻既濟為耳頤為口大過為肺未濟為胃小過為肝否為膀胱天地有八象人有十六象何也合天地而生人合父母而生子故有十六象也心居肺膽居肝何也言性者必歸之天言體者必歸之地地中有天石中有火是以心膽象之也心膽之倒懸何也草木者地之本體也人與草木反生是以倒懸也口目橫而鼻縱何也體必交也故動者冝縱而反橫植者冝橫而反縱皆交也天有四時地有四方人有四支是以指節可以觀天掌文可以察地天地之理具乎指掌矣可不貴之哉神統於心氣統於腎形統於首形氣交而神主乎其中三才之道也人之四攴各有脈也一脈三部一部三候以應天數也心藏神腎藏精脾藏魂膽藏魄胃受物而化之傳氣於肺傳血於肝而傳水穀於脬腸矣天圓而地方天南高而北下是以望之如倚蓋焉地東南下西北高是以東南多水西北多山也天覆地地載天天地相函故天上有地地上有天天渾渾於上而不可測也故觀斗數以占天也斗之所建天之行也魁建子杓建寅星以寅為晝也斗有七星是以晝不過乎七分也更詳之天行所以為晝夜日行所以為寒暑夏淺冬深天地之交也左旋右行天日之交也日朝在東夕在西隨天之行也夏在北冬在南隨天之交也天一周而超一星應日之行也春酉正夏午正秋卯正冬子正應日之交也日以遲為進月以疾為退日月一會而加半日減半日是以為閏餘也日一大運而進六日月一大運而退六日是以為閏差也日行陽度則盈行陰度則縮賔主之道也月去日則明盈而遲近日則生而疾君臣之義也陽消則生陰故日下而月西出也陰盛則敵陽故日望而月東出也天為父日為子故天左旋日右行日為夫月為婦故日東出月西生也日月相食數之交也日望月則月食月掩日則日食猶木火之相尅也是以君子用智小人用力日隨天而轉月隨日而行星隨月而見故星法月月法日日法天天半明半晦日半盈半縮月半盈半虧星半動半靜陰陽之變化天晝夜常見日見於晝月見於夜而半不見星半見於夜貴賤之等也月晝可見也故為陽中之陰星夜可見也故為陰中之陽天奇而地耦是以占天文者觀星而已察地理者觀山水而已觀星而天體見矣觀山水而地體見矣天體容物地體負物是故體幾於道也極南大暑極北大寒故南融而北結萬物之死地也夏則日隨斗而北冬則日隨斗而南故天地交而寒暑和寒暑和而物乃生也天以剛為德故柔者不見地以柔為體故剛者不生是以震巽天之陽也地陰也有陽而陰效之故至陰者辰也至陽者日也皆在乎天而地則水火而已是以地上皆有質之物陰伏陽而形質生陽伏陰而性情生是以陽生陰陰生陽陽剋陰陰尅陽陽之不可伏者不見於地陰之不可尅者不見於天伏陽之少者其體必柔是以畏陽而為陽所用伏陽之多者其體必剛是以禦陽而為陰所用故水火動而隨陽土石靜而隨陰也陽生陰故水先成陰生陽故火後成陰陽相生也體性相須也是以陽去則陰竭陰盡則陽滅金火相守則流火木相得則然從其類也水遇寒則結遇火則竭從其所勝也陽得陰而為雨陰得陽而為風剛得柔而為雲柔得剛而為雷無陰則不能為雨無陽則不能為雷雨柔也而屬陰陰不能獨立故待陽而後興雷剛也屬體體不能自用必待陽而後發也有意必有言有言必有象有象必有數數立則象生象生則言用言用則意顯象數則筌蹄也言意則魚兔也得魚兔而忘筌蹄則可也以筌蹄而求魚兔則未見其得也天變而人效之故元亨利貞易之變也人行而天應之故吉凶悔吝易之應也以元亨為變則利貞為應以吉凶為應則悔吝為變元則吉吉則利應之亨則凶凶則應之以貞悔則吉吝則凶是以變中有應應中有變也變中之應天道也故元為變則亨應之利為變則應之以貞應中之變人事也故變則凶應則吉變則吝應則悔也悔者吉之兆也吝者凶之本是以君子從天不從人元者春也仁也春者時之始仁者德之長時則未盛而德足以長人故言德而不言時亨者夏也禮也夏者時之盛禮者德之文盛則必衰而文不足救之故言時而不言德故曰大哉乾元而上之有悔也利者秋也義也秋者時之成義者德之方萬物方成而獲利義者不通於利故言時而不言德也貞者冬也智也冬者時之末智者德之衰貞則吉不貞則凶故言德而不言時也故曰利貞者性情也至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位兊艮為耦以應地之方也王者之法其盡於是矣乾坤天地之本離坎天地之用是以易始於乾坤中於離坎終於既未濟而泰否為上經之中咸恆為下經之首皆言乎其用也坤統三女於西南乾統三男於東北上經起於三下經終於四皆交泰之義也故易者用也乾用九坤用六大衍用四十九而潛龍勿用也大哉用乎吾於此見聖人之心矣道生天天生地及其功成而身退故子繼父禪是以乾退一位也乾坤交而為泰變而為雜卦也乾坤坎離為上篇之用兊艮震巽為下篇之用也頤中孚大過小過為三篇之正也易者一陰一陽之謂也震兊始交者也故當朝夕之位離坎交之極也故當子午之位巽艮雖不交而陰陽猶雜也故當用中之偏位乾坤純陰陽也故當不用之位乾坤縱而六子橫易之本也震兊橫而六卦縱易之用也象起於形數起於質名起於言意起於用天下之數出於理違乎理則入於術世人以數而入術故失於理也天下之事皆以道致之則休戚不能至矣天之陽在南而陰在北地之陰在南而陽在北人之陽在上而陰在下既交則陽下而陰上天以理盡而不可以形盡渾天之術以形盡天可乎辰數十二日月交會謂之辰辰天之體也天之體無物之氣也精義入神以致用也不精義則不能入神不能入神則不能致用也為治之道必通其變不可以膠柱猶春之時不可行冬之令也陽數一衍之為十十干之類是也陰數二衍之為十二十二攴十二月之類是也元亨利貞之德各包吉凶悔吝之事雖行乎德若違于時亦或凶矣初與上同然上亦不及初之進也二與五同然二之陰中不及五之陽中也三與四同然三處下卦之上不若四之近五也天之陽在南故日處之地之剛在北故山處之所以地高西北天高東南也天之神棲於日人之神棲乎目人之神寤則棲心寐則棲腎所以象天元晝夜之道也雲行雨施電激雷震亦是從其類也吹噴吁呵風雨雲霧皆當相須也萬物各有太極兩儀四象八卦之次亦有古今之象雲有水火土石之具化類亦然二至相去東西之度凡一百八十南北之度凡六十冬至之月所行如夏至之日夏至之月所行如冬至之日四正者乾坤坎離也觀其象無反覆之變所以為正也木之攴幹土石之所成所以不易葉花水火之所成故變而易也自然而然者天也唯聖人能索之效法者人也若時行時止雖人也亦天生者性天也成者形地也日入地中構精之象也體四而變六兼神與氣也氣變必六故三百六十也凡事為之極幾十之十則可止矣若夏至之日止于六十兼之以晨昏分之庶幾乎十之七也東赤南白西黃北黑此五色也驗之于曉午暮夜之時可見之矣圖雖無文吾終日言而未嘗離乎是蓋天地萬物之理盡在其中矣冬至之子中陰之極春分之卯中陽之中夏至之午中陽之極秋分之酉中陰之中凡三百六十中分之則一百八十此春秋二分相去之數也燈之明暗之境日月之象也月者日之影也情者性之影也心性而膽情性神而情鬼水者火之地火者水之氣黑者白之地寒者暑之地心為太極又曰道為太極形可分神不可分草伏之獸毛如草之叢林棲之鳥羽如林之葉類使之然也陰事太半蓋陽一而陰二也冬至之後為呼夏至之後為吸此天地一歲之呼吸也皇極經世卷第十二之上
